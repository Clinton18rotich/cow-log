<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🦺 CoW Log</title>
    <meta name="theme-color" content="#0d1117">
    <link rel="manifest" href="manifest.json">
    <style>
        :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#f78166;--green:#3fb950;--red:#f85149;--yellow:#d2991d;--blue:#58a6ff;--purple:#a371f7}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;font-size:15px;line-height:1.5}
        .header{background:var(--card);padding:16px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
        .header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .header h1{font-size:1.2rem;color:var(--accent)}
        .header .date{font-size:.8rem;color:var(--muted)}
        .settings-toggle{background:var(--border);color:var(--text);border:none;padding:4px 10px;border-radius:6px;font-size:.7rem;cursor:pointer}
        .project-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:.75rem;color:var(--muted)}
        .project-info .label{font-size:.6rem;text-transform:uppercase;letter-spacing:.5px}
        .project-info input,.project-info select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-size:.72rem;width:100%;font-family:inherit}
        .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:12px 16px}
        .stat-card{background:var(--card);padding:10px 6px;border-radius:12px;text-align:center;border:1px solid var(--border)}
        .stat-card .count{font-size:1.4rem;font-weight:700}.stat-card .label{font-size:.55rem;color:var(--muted);text-transform:uppercase;margin-top:2px}
        .count.red{color:var(--red)}.count.green{color:var(--green)}.count.blue{color:var(--blue)}.count.yellow{color:var(--yellow)}.count.purple{color:var(--purple)}
        .tabs{display:flex;gap:4px;padding:0 16px;margin-bottom:10px;overflow-x:auto;scrollbar-width:none}
        .tabs::-webkit-scrollbar{display:none}
        .tab{padding:7px 14px;border-radius:20px;font-size:.72rem;white-space:nowrap;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-weight:500}
        .tab.active{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:600}
        .content{padding:0 16px}.panel{display:none}.panel.active{display:block}
        .entry-card{background:var(--card);border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid var(--border);border-left:4px solid var(--border)}
        .diary-card{border-left-color:var(--blue)}.inspection-card{border-left-color:var(--green)}.ncr-card{border-left-color:var(--red)}.instruction-card{border-left-color:var(--yellow)}
        .entry-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:6px}
        .entry-title{font-weight:600;font-size:.85rem}
        .badge{font-size:.6rem;padding:3px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
        .badge-pass{background:rgba(63,185,80,.15);color:var(--green)}.badge-fail{background:rgba(248,81,73,.15);color:var(--red)}
        .badge-open{background:rgba(248,81,73,.15);color:var(--red)}.badge-closed{background:rgba(63,185,80,.15);color:var(--green)}
        .badge-pending{background:rgba(210,153,29,.15);color:var(--yellow)}.badge-info{background:rgba(88,166,255,.15);color:var(--blue)}
        .entry-meta{font-size:.65rem;color:var(--muted);margin-bottom:6px;display:flex;flex-wrap:wrap;gap:10px}
        .entry-desc{font-size:.78rem;line-height:1.5;color:#c9d1d9}
        .entry-section{background:var(--bg);border-radius:8px;padding:8px 10px;margin-top:6px;font-size:.72rem}
        .section-label{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
        .fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#0d1117;border:none;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 16px rgba(247,129,102,.3);z-index:200;font-weight:700}
        .fab:active{transform:scale(.92)}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end}
        .modal{background:var(--card);width:100%;border-radius:20px 20px 0 0;padding:18px;max-height:85vh;overflow-y:auto;border:1px solid var(--border);border-bottom:none}
        .modal h2{font-size:.95rem;margin-bottom:14px;color:var(--accent)}
        .form-group{margin-bottom:10px}
        .form-group label{display:block;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;font-weight:600}
        .modal input,.modal textarea,.modal select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.8rem;font-family:inherit}
        .modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--accent)}
        .modal textarea{min-height:80px;resize:vertical}
        .btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
        .btn{padding:10px 16px;border-radius:10px;border:none;font-weight:600;font-size:.8rem;cursor:pointer;flex:1;min-width:70px}
        .btn:active{opacity:.8}
        .btn-primary{background:var(--accent);color:#0d1117}.btn-secondary{background:var(--border);color:var(--text)}
        .btn-danger{background:var(--red);color:#fff}.btn-whatsapp{background:#25D366;color:#fff}
        .btn-small{padding:5px 10px;font-size:.65rem;border-radius:6px;flex:0}
        .media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
        .media-thumb{aspect-ratio:1;background:var(--card);border-radius:8px;border:1px solid var(--border);overflow:hidden;cursor:pointer}
        .media-thumb img{width:100%;height:100%;object-fit:cover}
        .media-thumb .placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.8rem}
        .media-preview{display:flex;flex-wrap:wrap;gap:5px}
        .media-preview-item{width:65px;height:65px;border-radius:8px;border:1px solid var(--border);overflow:hidden;position:relative}
        .media-preview-item img{width:100%;height:100%;object-fit:cover}
        .remove-media{position:absolute;top:1px;right:1px;background:var(--red);color:#fff;width:18px;height:18px;border-radius:50%;border:none;font-size:.55rem;cursor:pointer}
        .media-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px}
        .media-viewer{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .media-viewer img,.media-viewer video{max-width:95%;max-height:70vh;border-radius:8px}
        .close-btn{position:absolute;top:16px;right:16px;background:var(--red);color:#fff;width:36px;height:36px;border-radius:50%;border:none;font-size:1.1rem;cursor:pointer;z-index:501}
        .report-preview{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px;font-family:monospace;font-size:.68rem;line-height:1.7;white-space:pre-wrap;max-height:55vh;overflow-y:auto}
        /* Report photos */
        .report-photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:8px 0}
        .report-photo{background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border)}
        .report-photo img{width:100%;height:auto;display:block}
        .report-photo .caption{font-size:.6rem;color:var(--muted);padding:4px 8px;background:rgba(0,0,0,.5)}
        .search-bar{margin-bottom:10px}
        .search-bar input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.8rem}
        .empty-state{text-align:center;padding:40px 16px;color:var(--muted)}
        .empty-state .icon{font-size:2.5rem;margin-bottom:10px;opacity:.5}
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green);color:#0d1117;padding:8px 20px;border-radius:20px;font-weight:600;font-size:.75rem;z-index:400;animation:toastIn .3s ease}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(15px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        .settings-panel{display:none;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
        .settings-panel.show{display:block}
        .report-section{margin-bottom:16px}
        .report-section h3{font-size:.8rem;color:var(--accent);margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px}
        @media print{body{background:#fff;color:#000;font-size:10pt}.header,.stats-row,.tabs,.fab,.btn,.search-bar,.modal-overlay,.toast,.settings-panel{display:none!important}.panel{display:none!important}#panel-report{display:block!important}.report-preview{background:#fff;border:none;color:#000;max-height:none;overflow:visible;font-size:9pt}.report-photo-grid{grid-template-columns:repeat(2,1fr);page-break-inside:avoid}.report-photo{break-inside:avoid;border:1px solid #ccc}.report-photo img{max-height:200px;object-fit:contain}}
        @media(min-width:600px){.content{max-width:650px;margin:0 auto}.stats-row{max-width:650px;margin:0 auto}}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row">
            <h1>🦺 CoW Log</h1>
            <div style="display:flex;align-items:center;gap:8px;">
                <button class="settings-toggle" id="settingsToggle">⚙️</button>
                <span class="date" id="currentDate"></span>
            </div>
        </div>
        <div class="settings-panel" id="settingsPanel">
            <div class="project-info">
                <div><div class="label">Project Name *</div><input type="text" id="projectName" placeholder="e.g., Riverside Apartments"></div>
                <div><div class="label">Contract No</div><input type="text" id="contractNo" placeholder="e.g., RAP/CW/2026/001"></div>
                <div><div class="label">Contractor *</div><input type="text" id="contractorName" placeholder="e.g., BuildRight Construction Ltd"></div>
                <div><div class="label">Default Location *</div><input type="text" id="defaultLocation" placeholder="e.g., Block A, Floor 3"></div>
                <div><div class="label">Clerk of Works Name</div><input type="text" id="cowName" placeholder="Your name"></div>
                <div><div class="label">Weather</div><select id="weatherSelect"><option>☀️ Sunny</option><option>⛅ Partly Cloudy</option><option>☁️ Overcast</option><option>🌧️ Rain</option><option>⛈️ Storm</option></select></div>
                <div style="grid-column:1/-1;margin-top:4px;"><button class="btn btn-primary btn-small" onclick="saveProjectSettings()">💾 Save Settings</button><span style="font-size:.6rem;color:var(--muted);margin-left:8px;">Auto-fills all forms</span></div>
            </div>
        </div>
        <div id="compactInfo" style="font-size:.68rem;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;">
            <span>🏗️ <strong id="displayProject">—</strong></span>
            <span>👷 <strong id="displayContractor">—</strong></span>
            <span>📍 <strong id="displayLocation">—</strong></span>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card"><div class="count blue" id="diaryCount">0</div><div class="label">Diary</div></div>
        <div class="stat-card"><div class="count green" id="inspectionCount">0</div><div class="label">Inspections</div></div>
        <div class="stat-card"><div class="count red" id="ncrCount">0</div><div class="label">Open NCRs</div></div>
        <div class="stat-card"><div class="count yellow" id="instructionCount">0</div><div class="label">SI</div></div>
        <div class="stat-card"><div class="count purple" id="photoCount">0</div><div class="label">Media</div></div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="diary">📔 Diary</button>
        <button class="tab" data-tab="inspections">✅ Inspect</button>
        <button class="tab" data-tab="ncr">🚨 NCRs</button>
        <button class="tab" data-tab="instructions">📋 SI</button>
        <button class="tab" data-tab="photos">📸 Media</button>
        <button class="tab" data-tab="report">📄 Report</button>
    </div>

    <div class="content">
        <div class="panel active" id="panel-diary"><div class="search-bar"><input type="text" placeholder="🔍 Search diary entries..." id="diarySearch"></div><div id="diaryEntries"></div></div>
        <div class="panel" id="panel-inspections"><div id="inspectionEntries"></div></div>
        <div class="panel" id="panel-ncr"><div id="ncrEntries"></div></div>
        <div class="panel" id="panel-instructions"><div id="instructionEntries"></div></div>
        <div class="panel" id="panel-photos"><div id="photoGallery"></div></div>
        <div class="panel" id="panel-report"><div id="reportContent"></div></div>
    </div>

    <button class="fab" id="fabBtn">+</button>
    <div id="modalContainer"></div>
    <div id="toastContainer"></div>
    <div id="mediaViewer"></div>

    <script>
    // ============================================
    // DATA STORE
    // ============================================
    const MK='cowlog_media_v4', AK='cowlog_app_v4', PK='cowlog_project_v2';
    function loadProject(){try{const r=localStorage.getItem(PK);return r?JSON.parse(r):{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'Clerk of Works',weather:'☀️ Sunny',reportCounter:1};}catch(e){return{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'Clerk of Works',weather:'☀️ Sunny',reportCounter:1};}}
    function saveProject(p){localStorage.setItem(PK,JSON.stringify(p));}
    let project=loadProject();
    function loadMedia(){try{const r=localStorage.getItem(MK);return r?JSON.parse(r):[];}catch(e){return[];}}
    function saveMedia(arr){if(arr.length>50)arr=arr.slice(-35);try{localStorage.setItem(MK,JSON.stringify(arr));}catch(e){}}
    function loadApp(){try{const r=localStorage.getItem(AK);return r?JSON.parse(r):{diary:[],inspections:[],ncrs:[],instructions:[],dailyReports:[]};}catch(e){return{diary:[],inspections:[],ncrs:[],instructions:[],dailyReports:[]};}}
    function saveApp(d){localStorage.setItem(AK,JSON.stringify(d));}
    let media=loadMedia(), app=loadApp(), pendingMedia=[];
    window._report='';
    function genId(p){return p+'-'+Date.now()+'-'+Math.random().toString(36).substr(2,5);}
    function fmt(ts){return new Date(ts).toLocaleString('en-KE',{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
    function today(){return new Date().toISOString().split('T')[0];}
    function toast(msg){const c=document.getElementById('toastContainer');c.innerHTML='<div class="toast">'+msg+'</div>';setTimeout(()=>c.innerHTML='',2000);}
    function loc(){return project.defaultLocation||'Site';}
    function contractor(){return project.contractorName||'Contractor';}

    function updateStats(){
        document.getElementById('diaryCount').textContent=app.diary.length;
        document.getElementById('inspectionCount').textContent=app.inspections.length;
        document.getElementById('ncrCount').textContent=app.ncrs.filter(n=>n.status==='open').length;
        document.getElementById('instructionCount').textContent=app.instructions.length;
        document.getElementById('photoCount').textContent=media.length;
    }

    // ============================================
    // SETTINGS UI
    // ============================================
    function populateProjectFields(){
        document.getElementById('projectName').value=project.projectName||'';
        document.getElementById('contractNo').value=project.contractNo||'';
        document.getElementById('contractorName').value=project.contractorName||'';
        document.getElementById('defaultLocation').value=project.defaultLocation||'';
        document.getElementById('cowName').value=project.cowName||'';
        document.getElementById('weatherSelect').value=project.weather||'☀️ Sunny';
        updateCompactDisplay();
    }
    function updateCompactDisplay(){
        document.getElementById('displayProject').textContent=project.projectName||'—';
        document.getElementById('displayContractor').textContent=project.contractorName||'—';
        document.getElementById('displayLocation').textContent=project.defaultLocation||'—';
    }
    function saveProjectSettings(){
        project.projectName=document.getElementById('projectName').value.trim();
        project.contractNo=document.getElementById('contractNo').value.trim();
        project.contractorName=document.getElementById('contractorName').value.trim();
        project.defaultLocation=document.getElementById('defaultLocation').value.trim();
        project.cowName=document.getElementById('cowName').value.trim()||'Clerk of Works';
        project.weather=document.getElementById('weatherSelect').value;
        saveProject(project);
        updateCompactDisplay();
        document.getElementById('settingsPanel').classList.remove('show');
        toast('✅ Settings saved!');
    }
    document.addEventListener('DOMContentLoaded',()=>{document.getElementById('settingsToggle').addEventListener('click',()=>{const p=document.getElementById('settingsPanel');p.classList.toggle('show');if(p.classList.contains('show'))populateProjectFields();});});

    // ============================================
    // MEDIA HANDLING
    // ============================================
    function openCamera(){
        const inp=document.createElement('input');inp.type='file';inp.accept='image/*,video/*';inp.capture='environment';inp.style.display='none';
        document.body.appendChild(inp);
        inp.addEventListener('change',async function(){for(let f of inp.files)await processFile(f);refreshMediaPreview();toast('📸 '+inp.files.length+' captured');document.body.removeChild(inp);});
        inp.click();
    }
    function openGallery(){
        const inp=document.createElement('input');inp.type='file';inp.accept='image/*,video/*';inp.multiple=true;inp.style.display='none';
        document.body.appendChild(inp);
        inp.addEventListener('change',async function(){for(let f of inp.files)await processFile(f);refreshMediaPreview();toast('🖼️ '+inp.files.length+' added');document.body.removeChild(inp);});
        inp.click();
    }
    function processFile(file){return new Promise(resolve=>{const reader=new FileReader();reader.onload=function(e){let dataUrl=e.target.result;const type=file.type.startsWith('video/')?'video':'image';if(type==='image'&&dataUrl.length>200000){const img=new Image();img.onload=function(){const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>800){h=Math.round(h*(800/w));w=800;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);dataUrl=c.toDataURL('image/jpeg',0.5);addPending(dataUrl,type,file.name);resolve();};img.src=dataUrl;}else{addPending(dataUrl,type,file.name);resolve();}};reader.readAsDataURL(file);});}
    function addPending(dataUrl,type,name){pendingMedia.push({id:genId('med'),type,dataUrl,fileName:name||'photo.jpg',timestamp:new Date().toISOString(),label:'',entryId:null});}
    function refreshMediaPreview(){const c=document.getElementById('mediaPreviewContainer');if(!c){setTimeout(refreshMediaPreview,100);return;}if(!pendingMedia.length){c.innerHTML='<p style="font-size:.7rem;color:var(--muted);text-align:center;padding:10px;">Tap 📷 or 🖼️ above</p>';return;}c.innerHTML='<div class="media-preview">'+pendingMedia.map((m,i)=>'<div class="media-preview-item">'+(m.type==='video'?'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;">🎬</div>':'<img src="'+m.dataUrl+'" style="width:100%;height:100%;object-fit:cover;">')+'<button class="remove-media" onclick="removePending('+i+')">✕</button></div>').join('')+'</div>';}
    function removePending(i){pendingMedia.splice(i,1);refreshMediaPreview();}
    function commitMedia(entryId){if(!pendingMedia.length)return;pendingMedia.forEach(m=>{m.entryId=entryId;media.push({...m});});saveMedia(media);pendingMedia=[];updateStats();}
    function viewMedia(mediaId){const item=media.find(m=>m.id===mediaId);if(!item)return;const v=document.getElementById('mediaViewer');let content=item.type==='video'?'<video src="'+item.dataUrl+'" controls style="max-width:95%;max-height:65vh;border-radius:8px;"></video>':'<img src="'+item.dataUrl+'" style="max-width:95%;max-height:65vh;border-radius:8px;">';v.innerHTML='<div class="media-viewer" onclick="closeViewer()"><button class="close-btn">✕</button>'+content+'<div style="color:var(--text);font-size:.75rem;margin-top:12px;text-align:center;"><p>'+(item.label||'Photo')+'</p><p style="font-size:.65rem;color:#888;">'+fmt(item.timestamp)+'</p><div style="margin-top:8px;display:flex;gap:6px;justify-content:center;"><button class="btn btn-small btn-primary" onclick="event.stopPropagation();shareMedia(\''+mediaId+'\')">📤 Share</button><button class="btn btn-small btn-danger" onclick="event.stopPropagation();deleteMediaItem(\''+mediaId+'\')">🗑️</button></div></div></div>';}
    function closeViewer(){document.getElementById('mediaViewer').innerHTML='';}
    function deleteMediaItem(id){if(!confirm('Delete?'))return;media=media.filter(m=>m.id!==id);saveMedia(media);closeViewer();refreshAll();toast('🗑️ Deleted');}
    async function shareMedia(id){const item=media.find(m=>m.id===id);if(!item)return;if(navigator.share){try{const r=await fetch(item.dataUrl);const b=await r.blob();await navigator.share({title:'Site Photo',files:[new File([b],item.fileName,{type:b.type})]});toast('📤 Shared!');}catch(e){shareWA('📸 Photo — '+fmt(item.timestamp));}}else{shareWA('📸 Photo — '+fmt(item.timestamp));}}
    function shareWA(text){window.open('https://wa.me/?text='+encodeURIComponent(text.substring(0,1500)),'_blank');}

    // ============================================
    // RENDERERS
    // ============================================
    function renderDiary(filter=''){
        const c=document.getElementById('diaryEntries');let entries=app.diary;
        if(filter){const q=filter.toLowerCase();entries=entries.filter(e=>e.title.toLowerCase().includes(q)||e.description.toLowerCase().includes(q));}
        entries.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
        if(!entries.length){c.innerHTML='<div class="empty-state"><div class="icon">📔</div><p>No diary entries yet</p></div>';return;}

    // ============================================
    // REPORT — WITH ACTUAL PHOTOS EMBEDDED
    // ============================================
    function renderReport(){
        const td=today();
        const diaryToday=app.diary.filter(e=>e.timestamp.startsWith(td));
        const inspToday=app.inspections.filter(e=>e.timestamp.startsWith(td));
        const ncrsOpen=app.ncrs.filter(e=>e.status==='open');
        const siToday=app.instructions.filter(e=>e.timestamp.startsWith(td));
        const rdate=new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        const pn=project.projectName||'Project';
        const cn=project.contractNo||'N/A';
        const con=project.contractorName||'N/A';
        const rn='COW-'+String(project.reportCounter||1).padStart(3,'0');

        // Collect all today's photos
        const allPhotos=[];
        diaryToday.forEach(e=>{media.filter(m=>m.entryId===e.id&&m.type==='image').forEach(m=>allPhotos.push({...m,source:e.title,sourceType:'Diary'}));});
        inspToday.forEach(e=>{media.filter(m=>m.entryId===e.id&&m.type==='image').forEach(m=>allPhotos.push({...m,source:e.checklistType,sourceType:'Inspection'}));});

        // Build text report
        let textReport='═══════════════════════════════════════════════\n';
        textReport+='  CLERK OF WORKS — DAILY SITE REPORT\n';
        textReport+='═══════════════════════════════════════════════\n\n';
        textReport+='REPORT NO:     '+rn+'\nDATE:          '+rdate+'\nPROJECT:       '+pn+'\nCONTRACT NO:   '+cn+'\nCONTRACTOR:    '+con+'\nREPORTED BY:   '+(project.cowName||'Clerk of Works')+'\n';
        textReport+='───────────────────────────────────────────────\n\n';
        textReport+='1. WORK PROGRESS\n';
        if(diaryToday.length){diaryToday.forEach((e,i)=>{textReport+='\n'+(i+1)+'. '+e.title+'\n   Location: '+e.location+'\n   '+e.description.replace(/\n/g,'\n   ')+'\n';if(e.labourCount)textReport+='   Labour: '+e.labourCount+'\n';if(e.issuesIdentified)textReport+='   ⚠️ '+e.issuesIdentified+'\n';});}else{textReport+='\n   No diary entries today.\n';}
        textReport+='\n2. INSPECTIONS\n';
        if(inspToday.length){inspToday.forEach(e=>{textReport+='\n   '+e.checklistType+' — '+e.result.toUpperCase()+'\n   Location: '+e.location+'\n';e.items.forEach(i=>{textReport+='   '+(i.passed?'✅':'❌')+' '+i.label+'\n';});if(e.notes)textReport+='   Notes: '+e.notes+'\n';});}else{textReport+='\n   No inspections today.\n';}
        textReport+='\n3. OUTSTANDING NCRs\n';
        if(ncrsOpen.length){ncrsOpen.forEach(e=>{textReport+='   • NCR-'+e.id.split('-')[1]+': '+e.title+' ['+e.severity+'] — '+e.location+'\n';});}else{textReport+='\n   None.\n';}
        textReport+='\n4. SITE INSTRUCTIONS\n';
        if(siToday.length){siToday.forEach(e=>{textReport+='   • SI-'+e.id.split('-')[1]+': '+e.issuedTo+' — '+e.description.substring(0,80)+'\n';});}else{textReport+='\n   None issued today.\n';}
        if(allPhotos.length){textReport+='\n5. SITE PHOTOS ('+allPhotos.length+')\n';allPhotos.forEach((p,i)=>{textReport+='   Photo '+(i+1)+': '+p.source+' — '+fmt(p.timestamp)+'\n';});}
        textReport+='\n═══════════════════════════════════════════════\n  REPORT END — '+rdate+'\n═══════════════════════════════════════════════\n';
        textReport+='\n  SIGNED: ................    DATE: ................\n  '+(project.cowName||'Clerk of Works')+'\n';

        window._report = textReport;

        // Build HTML report with embedded photos
        let html='<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">'+
            '<button class="btn btn-small btn-primary" onclick="copyReport()">📋 Copy Text</button>'+
            '<button class="btn btn-small btn-secondary" onclick="printReport()">🖨️ Print</button>'+
            '<button class="btn btn-small btn-whatsapp" onclick="shareReportWhatsApp()">📱 WhatsApp</button>'+
            '<button class="btn btn-small btn-secondary" onclick="saveReport()">💾 Save & Next</button>'+
        '</div>';

        // Summary badges
        html+='<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;">'+
            '<span class="badge badge-info">📔 Diary: '+diaryToday.length+'</span>'+
            '<span class="badge '+(inspToday.some(i=>i.result==='fail')?'badge-fail':'badge-pass')+'">✅ Insp: '+inspToday.length+'</span>'+
            '<span class="badge badge-open">🚨 Open NCRs: '+ncrsOpen.length+'</span>'+
            '<span class="badge badge-pending">📸 Photos: '+allPhotos.length+'</span>'+
        '</div>';

        // Report content with photos
        html+='<div class="report-preview" id="reportText">'+textReport+'</div>';

        // Photo gallery in report
        if(allPhotos.length>0){
            html+='<div class="report-section" style="margin-top:16px;">'+
                '<h3>📸 SITE PHOTOS ('+allPhotos.length+')</h3>'+
                '<div class="report-photo-grid">'+
                    allPhotos.map((p,i)=>'<div class="report-photo" onclick="viewMedia(\''+p.id+'\')">'+
                        '<img src="'+p.dataUrl+'" alt="Photo '+(i+1)+'" style="width:100%;">'+
                        '<div class="caption">📷 '+(i+1)+'. '+p.source+'<br><small>'+fmt(p.timestamp)+'</small></div>'+
                    '</div>').join('')+
                '</div>'+
            '</div>';
        }

        document.getElementById('reportContent').innerHTML=html;
    }

    function refreshAll(){renderDiary();renderInspections();renderNCRs();renderInstructions();renderPhotos();updateStats();}

    function showDiaryForm(editId){const ex=editId?app.diary.find(e=>e.id===editId):null;pendingMedia=[];const defLoc=ex?ex.location:loc();const h='<div class="form-group"><label>Title *</label><input type="text" id="dt" value="'+(ex?ex.title:'')+'" placeholder="e.g., Concreting — 3rd Floor Slab"></div><div class="form-group"><label>Activity</label><select id="da"><option>Work in Progress</option><option>Material Delivery</option><option>Inspection</option><option>Meeting</option><option>Delay/Issue</option><option>General</option></select></div><div class="form-group"><label>Location</label><input type="text" id="dl" value="'+defLoc+'"></div><div class="form-group"><label>Description *</label><textarea id="dd" placeholder="Describe work observed...">'+(ex?ex.description:'')+'</textarea></div><div class="form-group"><label>Labour</label><input type="text" id="dlb" value="'+(ex?ex.labourCount||'':'')+'"></div><div class="form-group"><label>Equipment</label><input type="text" id="deq" value="'+(ex?ex.equipmentUsed||'':'')+'"></div><div class="form-group"><label>Materials</label><textarea id="dmt" style="min-height:45px;">'+(ex?ex.materialsDelivered||'':'')+'</textarea></div><div class="form-group"><label>Issues</label><textarea id="dis" style="min-height:45px;">'+(ex?ex.issuesIdentified||'':'')+'</textarea></div><div class="form-group"><label>📸 Photos</label><div class="media-actions"><button type="button" class="btn btn-primary" onclick="openCamera()">📷 Camera</button><button type="button" class="btn btn-secondary" onclick="openGallery()">🖼️ Gallery</button></div><div id="mediaPreviewContainer" style="margin-top:6px;"></div></div>';showModal(ex?'✏️ Edit Diary':'📔 New Diary Entry',h,()=>{const title=document.getElementById('dt').value.trim();const desc=document.getElementById('dd').value.trim();if(!title||!desc){alert('Title and description required');return false;}const entry={id:ex?ex.id:genId('di'),title,activityType:document.getElementById('da').value,location:document.getElementById('dl').value,description:desc,labourCount:document.getElementById('dlb').value,equipmentUsed:document.getElementById('deq').value,materialsDelivered:document.getElementById('dmt').value,issuesIdentified:document.getElementById('dis').value,weather:project.weather,timestamp:ex?ex.timestamp:new Date().toISOString()};if(ex){const i=app.diary.findIndex(e=>e.id===editId);if(i>-1)app.diary[i]=entry;}else{app.diary.push(entry);}commitMedia(entry.id);saveApp(app);});if(ex&&ex.activityType){setTimeout(()=>{const s=document.getElementById('da');if(s)s.value=ex.activityType;},100);}setTimeout(refreshMediaPreview,200);}

    function showInspectionForm(){const lists={'Concrete Pour':['Formwork checked','Reinforcement correct','Cover blocks placed','Grade confirmed','Slump test done','Vibrators ready','Curing plan ready'],'Steel Reinforcement':['Bar sizes correct','Spacing correct','Laps correct','Chairs placed','Clean & rust-free'],'Blockwork':['Block type correct','Mortar 1:4','Plumb & level','Wall ties','DPC in place','Openings correct'],'Excavation':['Setting out checked','Depth correct','Bottom firm','Safety batter','Dewatering'],'Waterproofing':['Surface prepared','Primer applied','Membrane lapped','Detailing correct','Protection board','Ponding test']};window._lists=lists;pendingMedia=[];let h='<div class="form-group"><label>Type *</label><select id="ct" onchange="window._ul()"><option value="">— Select —</option>';Object.keys(lists).forEach(k=>h+='<option value="'+k+'">'+k+'</option>');h+='</select></div><div class="form-group"><label>Location</label><input type="text" id="il" value="'+loc()+'"></div><div class="form-group"><label>Items</label><div id="ci" style="background:var(--bg);border-radius:8px;padding:4px 10px;border:1px solid var(--border);"><p style="color:var(--muted);text-align:center;padding:14px;">Select checklist type</p></div></div><div class="form-group"><label>Notes</label><textarea id="in"></textarea></div><div class="form-group"><label>📸 Photos</label><div class="media-actions"><button type="button" class="btn btn-primary" onclick="openCamera()">📷 Camera</button><button type="button" class="btn btn-secondary" onclick="openGallery()">🖼️ Gallery</button></div><div id="mediaPreviewContainer" style="margin-top:6px;"></div></div>';showModal('✅ Inspection',h,()=>{const type=document.getElementById('ct').value;if(!type){alert('Select checklist type');return false;}const cbs=document.querySelectorAll('#ci input[type=checkbox]');const cmts=document.querySelectorAll('#ci .ic');const items=Array.from(cbs).map((cb,i)=>({label:cb.nextElementSibling.textContent.replace(/\s*$/,''),passed:cb.checked,comment:cmts[i]?cmts[i].value:''}));const entry={id:genId('ins'),checklistType:type,location:document.getElementById('il').value,items,result:items.every(i=>i.passed)?'pass':'fail',notes:document.getElementById('in').value,timestamp:new Date().toISOString()};app.inspections.push(entry);commitMedia(entry.id);saveApp(app);});window._ul=function(){const type=document.getElementById('ct').value;const c=document.getElementById('ci');if(!type||!window._lists[type]){c.innerHTML='<p style="color:var(--muted);text-align:center;padding:14px;">Select checklist type</p>';return;}c.innerHTML=window._lists[type].map((item,i)=>'<div style="display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid var(--border);font-size:.75rem;"><input type="checkbox" id="it'+i+'" checked><label for="it'+i+'" style="flex:1;">'+item+'</label><input type="text" class="ic" placeholder="Comment" style="width:30%;padding:3px 6px;font-size:.65rem;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text);"></div>').join('');};setTimeout(refreshMediaPreview,200);}

    // ============================================
    function deleteEntry(type,id){if(!confirm('Delete?'))return;app[type]=app[type].filter(e=>e.id!==id);media=media.filter(m=>m.entryId!==id);saveApp(app);saveMedia(media);refreshAll();toast('🗑️ Deleted');}
    function closeNCR(id){const n=app.ncrs.find(n=>n.id===id);if(!n)return;const c=prompt('Closeout comment:');if(c===null)return;n.status='closed';n.closeoutComment=c;n.closedDate=new Date().toISOString();saveApp(app);refreshAll();toast('✅ Closed');}
    function ackSI(id){const s=app.instructions.find(s=>s.id===id);if(!s)return;s.status='acknowledged';s.acknowledgedDate=new Date().toISOString();saveApp(app);refreshAll();toast('✍️ Acknowledged');}
    function copyReport(){navigator.clipboard.writeText(window._report||'').then(()=>toast('📋 Text copied!'));}
    function printReport(){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));const rt=document.querySelector('[data-tab="report"]');if(rt)rt.classList.add('active');document.getElementById('panel-report').classList.add('active');renderReport();setTimeout(()=>window.print(),400);}
    function shareReportWhatsApp(){shareWA(window._report||'No report generated.');}
    function saveReport(){project.reportCounter=(project.reportCounter||1)+1;saveProject(project);app.dailyReports.push({id:genId('rpt'),content:window._report||'',date:today(),timestamp:new Date().toISOString(),reportNo:'COW-'+String(project.reportCounter-1).padStart(3,'0')});saveApp(app);toast('💾 Saved! Next: COW-'+String(project.reportCounter).padStart(3,'0'));renderReport();}

    // ============================================
    // INIT
    // ============================================
    function init(){
        document.getElementById('currentDate').textContent=new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        populateProjectFields();updateCompactDisplay();
        document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');const panel=document.getElementById('panel-'+tab.dataset.tab);if(panel)panel.classList.add('active');if(tab.dataset.tab==='report')renderReport();if(tab.dataset.tab==='photos')renderPhotos();});});
        document.getElementById('fabBtn').addEventListener('click',showFABMenu);
        document.getElementById('diarySearch').addEventListener('input',e=>renderDiary(e.target.value));
        refreshAll();
    }
    document.addEventListener('DOMContentLoaded',init);
    </script>
</body>
</html>
