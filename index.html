<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🦺 CoW Log Pro</title><meta name="theme-color" content="#0d1117"><link rel="manifest" href="manifest.json">
    <style>
        :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#f78166;--green:#3fb950;--red:#f85149;--yellow:#d2991d;--blue:#58a6ff;--purple:#a371f7;--cyan:#39d2c0;--orange:#ff8c42;--pink:#f778ba}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;font-size:15px;line-height:1.5}
        .header{background:var(--card);padding:14px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}.header h1{font-size:1.1rem;color:var(--accent)}.header .date{font-size:.75rem;color:var(--muted)}.settings-toggle{background:var(--border);color:var(--text);border:none;padding:3px 8px;border-radius:5px;font-size:.65rem;cursor:pointer}
        .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:8px 12px}
        .stat-card{background:var(--card);padding:6px 3px;border-radius:8px;text-align:center;border:1px solid var(--border)}.stat-card .count{font-size:1.1rem;font-weight:700}.stat-card .label{font-size:.45rem;color:var(--muted);text-transform:uppercase;margin-top:1px}
        .count.red{color:var(--red)}.count.green{color:var(--green)}.count.blue{color:var(--blue)}.count.yellow{color:var(--yellow)}.count.purple{color:var(--purple)}.count.orange{color:var(--orange)}
        .tabs{display:flex;gap:1px;padding:0 8px;margin-bottom:6px;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{padding:5px 7px;border-radius:14px;font-size:.58rem;white-space:nowrap;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-weight:500}.tab.active{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:600}
        .content{padding:0 10px}.panel{display:none}.panel.active{display:block}
        .entry-card{background:var(--card);border-radius:8px;padding:8px;margin-bottom:5px;border:1px solid var(--border);border-left:3px solid var(--border)}
        .diary-card{border-left-color:var(--blue)}.inspection-card{border-left-color:var(--green)}.ncr-card{border-left-color:var(--red)}.instruction-card{border-left-color:var(--yellow)}
        .entry-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;gap:3px}.entry-title{font-weight:600;font-size:.75rem}
        .badge{font-size:.5rem;padding:2px 5px;border-radius:6px;font-weight:600;white-space:nowrap}.badge-pass{background:rgba(63,185,80,.15);color:var(--green)}.badge-fail{background:rgba(248,81,73,.15);color:var(--red)}.badge-open{background:rgba(248,81,73,.15);color:var(--red)}.badge-closed{background:rgba(63,185,80,.15);color:var(--green)}.badge-pending{background:rgba(210,153,29,.15);color:var(--yellow)}.badge-info{background:rgba(88,166,255,.15);color:var(--blue)}
        .entry-meta{font-size:.58rem;color:var(--muted);margin-bottom:3px;display:flex;flex-wrap:wrap;gap:6px}.entry-desc{font-size:.68rem;line-height:1.3;color:#c9d1d9}.entry-section{background:var(--bg);border-radius:5px;padding:5px 6px;margin-top:3px;font-size:.63rem}.section-label{font-size:.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
        .fab{position:fixed;bottom:18px;right:18px;width:46px;height:46px;border-radius:50%;background:var(--accent);color:#0d1117;border:none;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 14px rgba(247,129,102,.3);z-index:200;font-weight:700}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end}.modal{background:var(--card);width:100%;border-radius:16px 16px 0 0;padding:14px;max-height:85vh;overflow-y:auto;border:1px solid var(--border)}.modal h2{font-size:.85rem;margin-bottom:10px;color:var(--accent)}
        .form-group{margin-bottom:7px}.form-group label{display:block;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;font-weight:600}.modal input,.modal textarea,.modal select{width:100%;padding:7px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.72rem;font-family:inherit}.modal textarea{min-height:50px;resize:vertical}
        .btn-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}.btn{padding:7px 12px;border-radius:7px;border:none;font-weight:600;font-size:.7rem;cursor:pointer;flex:1;min-width:50px}.btn-primary{background:var(--accent);color:#0d1117}.btn-secondary{background:var(--border);color:var(--text)}.btn-small{padding:3px 7px;font-size:.55rem;border-radius:4px;flex:0}
        .report-preview{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:monospace;font-size:.6rem;line-height:1.5;white-space:pre-wrap;max-height:45vh;overflow-y:auto}
        .search-bar{margin-bottom:6px}.search-bar input{width:100%;padding:7px 10px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.72rem}
        .empty-state{text-align:center;padding:25px 10px;color:var(--muted)}.empty-state .icon{font-size:1.8rem;margin-bottom:6px;opacity:.5}
        .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--green);color:#0d1117;padding:5px 14px;border-radius:14px;font-weight:600;font-size:.65rem;z-index:400}
        .settings-panel{display:none;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:6px}.settings-panel.show{display:block}
        .trade-category{background:var(--card);border-radius:8px;padding:8px;margin-bottom:6px;border:1px solid var(--border)}
        .trade-category h3{font-size:.75rem;margin-bottom:6px;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:4px}
        .checklist-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
        .checklist-btn{padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.65rem;text-align:left;cursor:pointer}
        .checklist-btn:active{background:var(--accent);color:#0d1117}
        @media print{body{background:#fff;color:#000}.header,.stats-row,.tabs,.fab,.btn,.search-bar,.modal-overlay,.toast,.settings-panel{display:none!important}.panel{display:none!important}#panel-report{display:block!important}.report-preview{background:#fff;border:none;color:#000;max-height:none;overflow:visible}}
        @media(min-width:600px){.content{max-width:700px;margin:0 auto}.stats-row{max-width:700px;margin:0 auto}}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row"><h1>🦺 CoW Log Pro</h1><div style="display:flex;align-items:center;gap:4px;"><button class="settings-toggle" id="settingsToggle">⚙️</button><span class="date" id="currentDate"></span></div></div>
        <div class="settings-panel" id="settingsPanel"><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:.65rem;"><div><div class="section-label">Project</div><input type="text" id="projectName"></div><div><div class="section-label">Contract No</div><input type="text" id="contractNo"></div><div><div class="section-label">Contractor</div><input type="text" id="contractorName"></div><div><div class="section-label">Default Location</div><input type="text" id="defaultLocation"></div><div><div class="section-label">CoW Name</div><input type="text" id="cowName"></div><div><div class="section-label">PIN (4 digits)</div><input type="password" id="appPin" maxlength="4" placeholder="0000=off"></div><div style="grid-column:1/-1;"><button class="btn btn-primary btn-small" onclick="saveProjectSettings()">💾 Save</button><button class="btn btn-secondary btn-small" onclick="restoreData()" style="margin-left:4px;">📥 Restore</button></div></div></div>
        <div id="compactInfo" style="font-size:.58rem;color:var(--muted);display:flex;gap:8px;"><span>🏗️ <strong id="displayProject">—</strong></span><span>👷 <strong id="displayContractor">—</strong></span></div>
    </div>
    <div class="stats-row"><div class="stat-card"><div class="count blue" id="diaryCount">0</div><div class="label">Diary</div></div><div class="stat-card"><div class="count green" id="inspectionCount">0</div><div class="label">Insp</div></div><div class="stat-card"><div class="count red" id="ncrCount">0</div><div class="label">NCRs</div></div><div class="stat-card"><div class="count orange" id="matLowCount">0</div><div class="label">Stock</div></div><div class="stat-card"><div class="count purple" id="rfiCount">0</div><div class="label">RFIs</div></div></div>
    <div class="tabs"><button class="tab active" data-tab="diary">📔</button><button class="tab" data-tab="inspections">✅</button><button class="tab" data-tab="ncr">🚨</button><button class="tab" data-tab="instructions">📋</button><button class="tab" data-tab="rfi">📤RFI</button><button class="tab" data-tab="drawings">📐</button><button class="tab" data-tab="materials">🧱</button><button class="tab" data-tab="concrete">🧪</button><button class="tab" data-tab="tests">🔬</button><button class="tab" data-tab="delays">🚧</button><button class="tab" data-tab="attendance">👷</button><button class="tab" data-tab="photos">📸</button><button class="tab" data-tab="report">📄</button></div>
    <div class="content">
        <div class="panel active" id="panel-diary"><div class="search-bar"><input type="text" placeholder="🔍 Search..." id="diarySearch"></div><div id="diaryEntries"></div></div>
        <div class="panel" id="panel-inspections"><div id="inspectionEntries"></div></div>
        <div class="panel" id="panel-ncr"><div id="ncrEntries"></div></div>
        <div class="panel" id="panel-instructions"><div id="instructionEntries"></div></div>
        <div class="panel" id="panel-rfi"><div id="rfiEntries"></div></div>
        <div class="panel" id="panel-drawings"><div id="drawingEntries"></div></div>
        <div class="panel" id="panel-materials"><div id="materialEntries"></div></div>
        <div class="panel" id="panel-concrete"><div id="concreteEntries"></div></div>
        <div class="panel" id="panel-tests"><div id="testEntries"></div></div>
        <div class="panel" id="panel-delays"><div id="delayEntries"></div></div>
        <div class="panel" id="panel-attendance"><div id="attendanceEntries"></div></div>
        <div class="panel" id="panel-photos"><div id="photoGallery"></div></div>
        <div class="panel" id="panel-report"><div id="reportContent"></div></div>
    </div>
    <button class="fab" id="fabBtn">+</button>
    <div id="modalContainer"></div><div id="toastContainer"></div><div id="mediaViewer"></div>

    <script>
    // ============================================
    // COMPLETE DATA STORE
    // ============================================
    const MK='cowlog_media_v9',AK='cowlog_app_v9',PK='cowlog_project_v7';
    function loadProject(){try{const r=localStorage.getItem(PK);return r?JSON.parse(r):{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'CoW',weather:'☀️ Sunny',reportCounter:1,pin:'',lastBackup:''};}catch(e){return{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'CoW',weather:'☀️ Sunny',reportCounter:1,pin:'',lastBackup:''};}}
    function saveProject(p){localStorage.setItem(PK,JSON.stringify(p));}
    let project=loadProject();
    function loadMedia(){try{const r=localStorage.getItem(MK);return r?JSON.parse(r):[];}catch(e){return[];}}
    function saveMedia(arr){if(arr.length>50)arr=arr.slice(-35);try{localStorage.setItem(MK,JSON.stringify(arr));}catch(e){}}
    function loadApp(){try{const r=localStorage.getItem(AK);return r?JSON.parse(r):{diary:[],inspections:[],ncrs:[],instructions:[],rfis:[],drawings:[],materials:[],materialLog:[],concrete:[],materialTests:[],delays:[],attendance:[],dailyReports:[]};}catch(e){return{diary:[],inspections:[],ncrs:[],instructions:[],rfis:[],drawings:[],materials:[],materialLog:[],concrete:[],materialTests:[],delays:[],attendance:[],dailyReports:[]};}}
    function saveApp(d){localStorage.setItem(AK,JSON.stringify(d));}
    let media=loadMedia(),app=loadApp(),pendingMedia=[];
    window._report='';
    function genId(p){return p+'-'+Date.now()+'-'+Math.random().toString(36).substr(2,5);}
    function fmt(ts){return new Date(ts).toLocaleString('en-KE',{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
    function fmtDate(ts){return new Date(ts).toLocaleDateString('en-KE',{year:'numeric',month:'short',day:'numeric'});}
    function today(){return new Date().toISOString().split('T')[0];}
    function toast(msg){const c=document.getElementById('toastContainer');c.innerHTML='<div class="toast">'+msg+'</div>';setTimeout(()=>c.innerHTML='',2000);}
    function loc(){return project.defaultLocation||'Site';}
    function contractor(){return project.contractorName||'Contractor';}
    function updateStats(){document.getElementById('diaryCount').textContent=app.diary.length;document.getElementById('inspectionCount').textContent=app.inspections.length;document.getElementById('ncrCount').textContent=app.ncrs.filter(n=>n.status==='open').length;document.getElementById('matLowCount').textContent=app.materials.filter(m=>parseFloat(m.currentStock||0)<=parseFloat(m.minStock||0)).length;document.getElementById('rfiCount').textContent=app.rfis.filter(r=>r.status==='open').length;}
    function populateProjectFields(){document.getElementById('projectName').value=project.projectName||'';document.getElementById('contractNo').value=project.contractNo||'';document.getElementById('contractorName').value=project.contractorName||'';document.getElementById('defaultLocation').value=project.defaultLocation||'';document.getElementById('cowName').value=project.cowName||'';document.getElementById('appPin').value=project.pin||'';updateCompactDisplay();}
    function updateCompactDisplay(){document.getElementById('displayProject').textContent=project.projectName||'—';document.getElementById('displayContractor').textContent=project.contractorName||'—';}
    function saveProjectSettings(){project.projectName=document.getElementById('projectName').value.trim();project.contractNo=document.getElementById('contractNo').value.trim();project.contractorName=document.getElementById('contractorName').value.trim();project.defaultLocation=document.getElementById('defaultLocation').value.trim();project.cowName=document.getElementById('cowName').value.trim()||'CoW';project.pin=document.getElementById('appPin').value.trim();saveProject(project);updateCompactDisplay();document.getElementById('settingsPanel').classList.remove('show');toast('✅ Saved!');}
    document.addEventListener('DOMContentLoaded',()=>{document.getElementById('settingsToggle').addEventListener('click',()=>{const p=document.getElementById('settingsPanel');p.classList.toggle('show');if(p.classList.contains('show'))populateProjectFields();});});

    // MEDIA
    function openCamera(){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.setAttribute('capture','environment');inp.style.display='none';document.body.appendChild(inp);inp.addEventListener('change',async function(){for(let f of this.files)await processFile(f);refreshMediaPreview();toast('📸 '+this.files.length+' captured');document.body.removeChild(inp);});inp.click();}
    function openGallery(){const inp=document.createElement('input');inp.type='file';inp.accept='image/*,video/*';inp.multiple=true;inp.style.display='none';document.body.appendChild(inp);inp.addEventListener('change',async function(){for(let f of this.files)await processFile(f);refreshMediaPreview();toast('🖼️ '+this.files.length+' added');document.body.removeChild(inp);});inp.click();}
    function processFile(file){return new Promise(resolve=>{const reader=new FileReader();reader.onload=function(e){let dataUrl=e.target.result;const type=file.type.startsWith('video/')?'video':'image';if(type==='image'&&dataUrl.length>150000){const img=new Image();img.onload=function(){const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>700){h=Math.round(h*(700/w));w=700;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);dataUrl=c.toDataURL('image/jpeg',0.4);addPending(dataUrl,type,file.name);resolve();};img.src=dataUrl;}else{addPending(dataUrl,type,file.name);resolve();}};reader.readAsDataURL(file);});}
    function addPending(dataUrl,type,name){pendingMedia.push({id:genId('med'),type,dataUrl,fileName:name||'photo.jpg',timestamp:new Date().toISOString(),label:'',entryId:null});}
    function refreshMediaPreview(){const c=document.getElementById('mediaPreviewContainer');if(!c){setTimeout(refreshMediaPreview,100);return;}if(!pendingMedia.length){c.innerHTML='<p style="font-size:.6rem;color:var(--muted);text-align:center;padding:6px;">Tap 📷 or 🖼️</p>';return;}c.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:3px;">'+pendingMedia.map((m,i)=>'<div style="width:50px;height:50px;border-radius:5px;overflow:hidden;position:relative;"><img src="'+m.dataUrl+'" style="width:100%;height:100%;object-fit:cover;"><button style="position:absolute;top:1px;right:1px;background:var(--red);color:#fff;width:14px;height:14px;border-radius:50%;border:none;font-size:.45rem;cursor:pointer;" onclick="removePending('+i+')">✕</button></div>').join('')+'</div>';}
    function removePending(i){pendingMedia.splice(i,1);refreshMediaPreview();}
    function commitMedia(entryId){if(!pendingMedia.length)return;pendingMedia.forEach(m=>{m.entryId=entryId;media.push({...m});});saveMedia(media);pendingMedia=[];updateStats();}

    // ============================================
    // COMPLETE INSPECTION CHECKLISTS — ALL TRADES
    // ============================================
    const ALL_CHECKLISTS = {
        // EARTHWORKS & EXCAVATION
        'Excavation — General':['Setting out checked & approved','Depth to formation level correct','Bottom of excavation firm & undisturbed','Safety batter/slope provided (or shoring)','Dewatering system working','Services located & protected','Spoil placed >2m from edge','Approval obtained before blinding'],
        'Trench Excavation':['Line & level checked','Trench width as per drawing','Depth to invert correct','Bottom graded to falls','Pipe bedding prepared','Shoring in place if >1.5m deep','Safe access/egress provided','Groundwater controlled'],
        'Backfill & Compaction':['Material approved (selected fill)','Compaction tested (min 95% MDD)','Layers max 150mm thick','Moisture content optimal','No debris/organic matter','Services protected before backfill','Compaction record kept'],

        // CONCRETE WORKS
        'Concrete — Pre-Pour':['Formwork inspected — dimensions, alignment','Reinforcement as per structural drawings','Cover blocks placed (correct size)','Concrete grade confirmed','Slump test equipment ready','Poker vibrators available (2 min)','Curing plan in place','Pour card signed by Engineer','Area clean & free of debris'],
        'Concrete — During Pour':['Slump test done & recorded','Concrete placed within 30 min of mixing','No segregation observed','Compaction adequate (no honeycombing)','Construction joints at correct locations','Cube samples taken & labelled','Pour completed within planned section'],
        'Concrete — Post-Pour':['Curing started within 2 hours','Curing method correct (water/membrane)','Formwork not removed before min time','Surface finished as specified','No cracks/honeycomb observed','Cube samples delivered to lab','Temperature monitored if mass concrete'],

        // FORMWORK
        'Formwork Inspection':['Material as specified (steel/timber)','Dimensions correct','Plumb & level within tolerance','Joints tight (no grout loss)','Release agent applied','Ties & bracing adequate','Propping system to approved design','Openings & box-outs correct'],

        // STEEL REINFORCEMENT
        'Steel Reinforcement':['Bar sizes & grades as per BBS','Spacing within tolerance (±10mm)','Lap lengths correct (per code)','Couplers torqued to specification','Chairs & spacers at correct spacing','Clean & free from rust/contamination','Approved shop drawings on site','Previous NCRs closed out'],

        // BLOCKWORK & MASONRY
        'Blockwork / Masonry':['Block type & strength confirmed','Mortar mix ratio 1:4 (cement:sand)','Plumb & level within 5mm/storey','Wall ties at correct spacing','Damp proof course in place','Openings as per drawings','Bond pattern correct','Joints fully filled & struck','Curing applied'],
        'Stone Masonry':['Stone quality checked','Dressing as specified','Mortar mix correct','Through stones provided','Bond pattern maintained','Plumb & alignment checked','Joint thickness consistent','Curing applied'],

        // STRUCTURAL STEEL
        'Structural Steel — Erection':['Members as per fabrication drawings','Bolts grade & size correct','Torque applied to spec','Alignment & plumb checked','Base plates grouted','Welds visually inspected','NDT testing arranged','Corrosion protection applied','Hold points signed off'],

        // ROOFING
        'Roof Structure':['Trusses/rafters as per design','Timber treated if specified','Connections & bracing correct','Anchorage to structure adequate','Sag rods/tie rods installed','Purlin spacing as per spec'],
        'Roof Covering':['Material as specified (tiles/sheets)','Underlay/insulation installed','Fixing method correct','Laps & joints weatherproof','Ridge & hip details correct','Valley & gutter details correct','Flashings installed','Roof tested for leaks'],

        // WATERPROOFING
        'Waterproofing — General':['Substrate prepared — smooth, clean, dry','Primer applied per specification','Membrane type & thickness correct','Laps minimum 100mm','Detailing at junctions/penetrations','Protection board placed immediately','Fillets at internal angles','Ponding test completed (24hrs)'],
        'Tanking / Basement WP':['System as per design','Blinding layer in place','Fillets at wall/floor junction','Membrane continuous up wall','Protection board installed','Drainage system behind walls','Water bars at construction joints'],

        // PLUMBING & DRAINAGE
        'Plumbing — Supply Pipework':['Pipe material as specification','Pipe sizes correct','Insulation on hot water pipes','Clipping & supports at correct spacing','Stop valves installed at each floor','Backflow prevention fitted','Pressure reducing valves where required','Pipework identified & labelled'],
        'Plumbing — Pressure Test':['System filled & all air vented','Test pressure applied (1.5x working)','Pressure held for minimum 1 hour','All joints & fittings inspected','No pressure drop observed','Test gauge calibrated & certified','Test certificate completed & signed'],
        'Plumbing — Drainage Above Ground':['Pipe material & type correct','Gradient checked (min 1:60 for 100mm)','Joints properly sealed','Traps installed on all fixtures','Vent pipes connected to stack','Rodding eyes accessible','Brackets at correct spacing','Sound insulation where required'],
        'Plumbing — Below Ground Drainage':['Trench line & level checked','Bedding material correct','Pipe laid to correct gradient','Joints tested before backfill','Access chambers at correct positions','Water test on completed runs','Backfill with selected material','Marker tape installed'],
        'Plumbing — Sanitary Ware':['Fixtures as per schedule','Fixed securely to wall/floor','Level & alignment correct','Connections to services correct','Sealant applied at junctions','All fixtures tested for function','Access panels for concealed cisterns'],

        // ELECTRICAL
        'Electrical — Containment':['Conduit/trunking type as spec','Route as per drawings','Supports at correct spacing','Joints mechanically continuous','Bends within allowed radius','Sealed against water ingress','Fire barriers where passing through walls'],
        'Electrical — Cabling':['Cable type & size as per schedule','Installed without damage','Bending radius respected','Identification labels on both ends','Segregation of services maintained','Fire-rated cables where specified','Testing: IR & continuity'],
        'Electrical — Distribution':['DB location as per drawing','DB securely mounted & level','Incoming supply terminated correctly','MCB/RCD ratings as per schedule','Circuit identification complete','Earth bonding to structure','Test certificates completed'],
        'Electrical — Lighting & Power':['Fittings as per schedule','Positions as per reflected ceiling plan','Switching correctly wired','Socket outlets at correct height','Earth continuity verified','RCD protection where required','Functional test — all circuits'],
        'Electrical — Earthing & Lightning':['Earth electrode installed','Earth resistance tested (<10 ohms)','Bonding to all services','Lightning conductors installed','Joints welded or clamped','Test certificates issued'],

        // MECHANICAL / HVAC
        'HVAC — Ductwork':['Duct size & route as per drawing','Material gauge correct','Joints sealed & airtight','Insulation applied (where specified)','Supports at correct spacing','Fire dampers installed','Volume control dampers accessible','System pressure tested'],
        'HVAC — Plant Installation':['Equipment as per schedule','Foundations/plinths correct','Anti-vibration mounts installed','Services connected correctly','Controls wired & calibrated','Test run completed','Noise levels checked','O&M manuals received'],

        // FIRE SERVICES
        'Fire Fighting — Pipework':['Pipe material & size as spec','Route as per approved drawing','Supports fire-rated','Joints mechanically sound','Pressure test at 1.5x working','Flow test completed','Valves accessible & labelled'],
        'Fire Fighting — Equipment':['Hose reels installed & tested','Fire extinguishers in place','Sprinkler heads unobstructed','Fire hydrants accessible','Alarm system connected','Fire panel operational','Cause & effect tested'],

    function startInspection(name){
        const items=ALL_CHECKLISTS[name];
        if(!items)return;
        let h='<div class="form-group"><label>Checklist</label><input type="text" value="'+name+'" disabled></div>';
        h+='<div class="form-group"><label>Location</label><input type="text" id="il" value="'+loc()+'"></div>';
        h+='<div class="form-group"><label>Items ('+items.length+')</label><div style="background:var(--bg);border-radius:5px;padding:4px 6px;border:1px solid var(--border);">';
        items.forEach((item,i)=>{h+='<div style="display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--border);font-size:.65rem;"><input type="checkbox" id="it'+i+'" checked><label for="it'+i+'">'+item+'</label></div>';});
        h+='</div></div><div class="form-group"><label>Notes</label><textarea id="in"></textarea></div><div class="form-group"><label>📸 Photos</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;"><button type="button" class="btn btn-primary btn-small" onclick="openCamera()">📷</button><button type="button" class="btn btn-secondary btn-small" onclick="openGallery()">🖼️</button></div><div id="mediaPreviewContainer" style="margin-top:3px;"></div></div>';
        pendingMedia=[];
        showModal('✅ '+name,h,()=>{
            const cbs=document.querySelectorAll('#it'+Array.from({length:items.length},(_,i)=>i).join(', #it'));
            const checkedItems=items.map((item,i)=>({label:item,passed:document.getElementById('it'+i)?.checked||false}));
            const entry={id:genId('ins'),checklistType:name,location:document.getElementById('il').value,items:checkedItems,result:checkedItems.every(i=>i.passed)?'pass':'fail',notes:document.getElementById('in').value,timestamp:new Date().toISOString()};
            app.inspections.push(entry);
            commitMedia(entry.id);
            saveApp(app);
        });
        setTimeout(refreshMediaPreview,200);
    }

    function addCubeResult(id,days){const cube=app.concrete.find(c=>c.id===id);const r=prompt(days+'-day (N/mm²):');if(!r||isNaN(r))return;cube['result'+days]=parseFloat(r);saveApp(app);refreshAll();}

    function renderTests(){const c=document.getElementById('testEntries');const entries=[...app.materialTests].sort((a,b)=>new Date(b.testDate)-new Date(a.testDate));if(!entries.length){c.innerHTML='<div class="empty-state"><div class="icon">🔬</div><p>No tests</p><button class="btn btn-primary btn-small" onclick="showTestForm()">➕</button></div>';return;}c.innerHTML='<button class="btn btn-primary btn-small" style="margin-bottom:6px;" onclick="showTestForm()">➕ Test</button>'+entries.map(e=>'<div class="entry-card" style="border-left-color:var(--green);"><div class="entry-header"><span>🔬 '+e.material+' — '+e.testType+'</span><span class="badge '+(e.result==='Pass'?'badge-pass':'badge-fail')+'">'+e.result+'</span></div><div class="entry-meta"><span>'+fmtDate(e.testDate)+'</span><span>'+e.lab+'</span></div></div>').join('');}
    function showTestForm(){const h='<div class="form-group"><label>Material</label><select id="testMat"><option>Concrete</option><option>Steel</option><option>Soil</option><option>Aggregates</option><option>Cement</option><option>Blocks</option></select></div><div class="form-group"><label>Test Type</label><select id="testType"><option>Compressive Strength</option><option>Tensile Strength</option><option>Sieve Analysis</option><option>Proctor Density</option><option>Slump Test</option></select></div><div class="form-group"><label>Date</label><input type="date" id="testDate" value="'+today()+'"></div><div class="form-group"><label>Lab</label><input type="text" id="testLab"></div><div class="form-group"><label>Result</label><select id="testResult"><option>Pass</option><option>Fail</option><option>Pending</option></select></div><div class="form-group"><label>Value</label><input type="text" id="testValue"></div>';showModal('🔬 Test',h,()=>{app.materialTests.push({id:genId('tst'),material:document.getElementById('testMat').value,testType:document.getElementById('testType').value,testDate:document.getElementById('testDate').value,lab:document.getElementById('testLab').value,result:document.getElementById('testResult').value,testValue:document.getElementById('testValue').value});saveApp(app);});}

    function renderDelays(){const c=document.getElementById('delayEntries');const entries=[...app.delays].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));if(!entries.length){c.innerHTML='<div class="empty-state"><div class="icon">🚧</div><p>No delays</p><button class="btn btn-primary btn-small" onclick="showDelayForm()">➕</button></div>';return;}c.innerHTML='<button class="btn btn-primary btn-small" style="margin-bottom:6px;" onclick="showDelayForm()">➕ Delay</button>'+entries.map(e=>'<div class="entry-card" style="border-left-color:var(--red);"><div class="entry-header"><span>🚧 '+e.cause+'</span><span class="badge badge-open">'+e.duration+'d</span></div><div class="entry-meta"><span>'+fmtDate(e.date)+'</span><span>📍 '+e.location+'</span></div></div>').join('');}
    function showDelayForm(){const h='<div class="form-group"><label>Date</label><input type="date" id="delayDate" value="'+today()+'"></div><div class="form-group"><label>Cause *</label><input type="text" id="delayCause"></div><div class="form-group"><label>Days</label><input type="number" id="delayDays" value="1"></div><div class="form-group"><label>Impact</label><select id="delayImpact"><option>Minor</option><option>Moderate</option><option>Major</option><option>Critical</option></select></div>';showModal('🚧 Delay',h,()=>{const c=document.getElementById('delayCause').value.trim();if(!c)return false;app.delays.push({id:genId('dly'),date:document.getElementById('delayDate').value,cause:c,duration:document.getElementById('delayDays').value,impact:document.getElementById('delayImpact').value,location:loc()});saveApp(app);});}

    function renderAttendance(){const c=document.getElementById('attendanceEntries');const td=today();const todayE=app.attendance.filter(e=>e.date===td);if(!todayE.length){c.innerHTML='<div class="empty-state"><div class="icon">👷</div><p>No attendance</p><button class="btn btn-primary btn-small" onclick="showAttendanceForm()">➕</button></div>';return;}const groups={};todayE.forEach(e=>{if(!groups[e.category])groups[e.category]=[];groups[e.category].push(e);});let h='<div style="display:flex;gap:3px;margin-bottom:6px;"><span class="badge badge-info">'+fmtDate(td)+'</span><span class="badge badge-pending">👷 '+todayE.reduce((s,e)=>s+(parseInt(e.count)||0),0)+'</span></div>';Object.keys(groups).forEach(cat=>{h+='<div class="entry-card"><div class="entry-header"><span>👷 '+cat+'</span><span class="badge badge-info">'+groups[cat].reduce((s,e)=>s+(parseInt(e.count)||0),0)+'</span></div></div>';});h+='<button class="btn btn-small btn-primary" onclick="showAttendanceForm()">➕</button>';c.innerHTML=h;}
    function showAttendanceForm(){const h='<div class="form-group"><label>Category</label><select id="attCat"><option>Contractor Staff</option><option>Skilled Labour</option><option>Unskilled Labour</option><option>Subcontractor</option><option>Visitor</option></select></div><div class="form-group"><label>Name</label><input type="text" id="attName"></div><div class="form-group"><label>Count</label><input type="number" id="attCount" value="1"></div>';showModal('👷 Add',h,()=>{app.attendance.push({id:genId('att'),date:today(),category:document.getElementById('attCat').value,name:document.getElementById('attName').value,count:document.getElementById('attCount').value});saveApp(app);});}

    function renderPhotos(){const c=document.getElementById('photoGallery');if(!media.length){c.innerHTML='<div class="empty-state"><div class="icon">📸</div><p>No media</p></div>';return;}c.innerHTML='<div style="display:flex;gap:3px;margin-bottom:6px;"><button class="btn btn-small btn-primary" onclick="openCamera()">📷</button><button class="btn btn-small btn-secondary" onclick="openGallery()">🖼️</button></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:3px;">'+[...media].reverse().map(m=>'<div style="aspect-ratio:1;background:var(--card);border-radius:5px;overflow:hidden;cursor:pointer;" onclick="viewMedia(\''+m.id+'\')"><img src="'+m.dataUrl+'" style="width:100%;height:100%;object-fit:cover;" loading="lazy"></div>').join('')+'</div>';}
    function viewMedia(id){const item=media.find(m=>m.id===id);if(!item)return;document.getElementById('mediaViewer').innerHTML='<div style="position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;display:flex;align-items:center;justify-content:center;" onclick="this.remove()"><img src="'+item.dataUrl+'" style="max-width:95%;max-height:80vh;border-radius:6px;"></div>';}

    function renderReport(){
        const td=today();const dt=app.diary.filter(e=>e.timestamp.startsWith(td));const it=app.inspections.filter(e=>e.timestamp.startsWith(td));const no=app.ncrs.filter(e=>e.status==='open');const at=app.attendance.filter(e=>e.date===td);const ml=app.materialLog.filter(e=>e.date===td);const lowMat=app.materials.filter(m=>parseFloat(m.currentStock||0)<=parseFloat(m.minStock||0));
        const rdate=new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        const pn=project.projectName||'Project',con=project.contractorName||'N/A';
        let tr='══════════════════════════════\n  CLERK OF WORKS — DAILY REPORT\n══════════════════════════════\n\nPROJECT: '+pn+'  CONTRACTOR: '+con+'\nDATE: '+rdate+'\n\n1. WORK PROGRESS\n';
        dt.length?dt.forEach((e,i)=>{tr+='\n'+(i+1)+'. '+e.title+'\n   '+e.description.substring(0,120)+'\n';}):tr+='\n   No entries.\n';
        tr+='\n2. INSPECTIONS ('+it.length+')\n';it.length?it.forEach(e=>{tr+='   '+e.checklistType+' — '+e.result.toUpperCase()+' ('+e.items.filter(i=>i.passed).length+'/'+e.items.length+')\n';}):tr+='   None.\n';
        tr+='\n3. NCRs OPEN: '+no.length+'\n';no.length?no.forEach(e=>{tr+='   • '+e.title+'\n';}):tr+='   None.\n';
        tr+='\n4. ATTENDANCE: '+(at.reduce((s,e)=>s+(parseInt(e.count)||0),0)||0)+'\n';
        tr+='\n5. MATERIALS\n   Used: '+ml.filter(l=>l.type==='usage').reduce((s,l)=>s+parseFloat(l.quantity||0),0)+'\n   Delivered: '+ml.filter(l=>l.type==='delivery').length+' items\n';
        if(lowMat.length){tr+='   ⚠️ LOW: ';lowMat.forEach(m=>{tr+=m.name+'('+m.currentStock+') ';});tr+='\n';}
        tr+='\n══════════════════════════════\n  '+(project.cowName||'CoW')+'\n';
        window._report=tr;
        document.getElementById('reportContent').innerHTML='<div style="display:flex;gap:3px;margin-bottom:8px;"><button class="btn btn-small btn-primary" onclick="copyReport()">📋</button><button class="btn btn-small btn-secondary" onclick="printReport()">🖨️</button><button class="btn btn-small btn-secondary" onclick="shareWA(window._report)">📱</button><button class="btn btn-small btn-secondary" onclick="saveReport()">💾</button></div><div class="report-preview">'+tr+'</div>';
    }

    function refreshAll(){renderDiary();renderInspections();renderNCRs();renderInstructions();renderRFIs();renderDrawings();renderMaterials();renderConcrete();renderTests();renderDelays();renderAttendance();renderPhotos();updateStats();}

    function showModal(title,html,cb){const mc=document.getElementById('modalContainer');mc.innerHTML='<div class="modal-overlay" id="mo"><div class="modal"><h2>'+title+'</h2><div id="mf">'+html+'</div><div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="ms">Save</button></div></div></div>';document.getElementById('ms').addEventListener('click',()=>{const r=cb();if(r!==false){closeModal();refreshAll();toast('✅ Saved!');}});document.getElementById('mo').addEventListener('click',e=>{if(e.target.id==='mo')closeModal();});}
    function closeModal(){document.getElementById('modalContainer').innerHTML='';}

    function showDiaryForm(editId){const ex=editId?app.diary.find(e=>e.id===editId):null;const h='<div class="form-group"><label>Title *</label><input type="text" id="dt" value="'+(ex?ex.title:'')+'"></div><div class="form-group"><label>Location</label><input type="text" id="dl" value="'+(ex?ex.location:loc())+'"></div><div class="form-group"><label>Description *</label><textarea id="dd">'+(ex?ex.description:'')+'</textarea></div><div class="form-group"><label>📸 Photos</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;"><button type="button" class="btn btn-primary btn-small" onclick="openCamera()">📷</button><button type="button" class="btn btn-secondary btn-small" onclick="openGallery()">🖼️</button></div><div id="mediaPreviewContainer" style="margin-top:3px;"></div></div>';pendingMedia=[];showModal(ex?'✏️ Edit':'📔 New Diary',h,()=>{const t=document.getElementById('dt').value.trim(),d=document.getElementById('dd').value.trim();if(!t||!d)return false;const entry={id:ex?ex.id:genId('di'),title:t,location:document.getElementById('dl').value,description:d,timestamp:ex?ex.timestamp:new Date().toISOString()};if(ex){const i=app.diary.findIndex(e=>e.id===editId);if(i>-1)app.diary[i]=entry;}else{app.diary.push(entry);}commitMedia(entry.id);saveApp(app);});setTimeout(refreshMediaPreview,200);}
    function showNCRForm(){const h='<div class="form-group"><label>Title *</label><input type="text" id="nt"></div><div class="form-group"><label>Severity</label><select id="ns"><option>Minor</option><option selected>Major</option><option>Critical</option></select></div><div class="form-group"><label>Location</label><input type="text" id="nl" value="'+loc()+'"></div><div class="form-group"><label>Description *</label><textarea id="nd"></textarea></div><div class="form-group"><label>Action *</label><textarea id="na"></textarea></div>';showModal('🚨 NCR',h,()=>{const t=document.getElementById('nt').value.trim(),d=document.getElementById('nd').value.trim(),a=document.getElementById('na').value.trim();if(!t||!d||!a)return false;app.ncrs.push({id:genId('ncr'),title:t,severity:document.getElementById('ns').value,location:document.getElementById('nl').value,description:d,actionRequired:a,status:'open',timestamp:new Date().toISOString()});saveApp(app);});}
    function showInstructionForm(){const h='<div class="form-group"><label>Issued To *</label><input type="text" id="st" value="'+contractor()+'"></div><div class="form-group"><label>Instruction *</label><textarea id="sd"></textarea></div>';showModal('📋 SI',h,()=>{const t=document.getElementById('st').value.trim(),d=document.getElementById('sd').value.trim();if(!t||!d)return false;app.instructions.push({id:genId('si'),issuedTo:t,description:d,location:loc(),status:'issued',timestamp:new Date().toISOString()});saveApp(app);});}

    function showFABMenu(){const mc=document.getElementById('modalContainer');mc.innerHTML='<div class="modal-overlay" id="fo" style="align-items:flex-end;justify-content:center;"><div class="modal" style="text-align:center;max-width:320px;"><h2>➕ Add New</h2><button class="btn btn-primary" style="margin-bottom:2px;width:100%;" onclick="closeModal();showDiaryForm();">📔 Diary</button><button class="btn btn-primary" style="margin-bottom:2px;width:100%;background:var(--green);" onclick="closeModal();showInspectionMenu();">✅ Inspection</button><button class="btn btn-primary" style="margin-bottom:2px;width:100%;background:var(--red);" onclick="closeModal();showNCRForm();">🚨 NCR</button><button class="btn btn-primary" style="margin-bottom:2px;width:100%;background:var(--yellow);color:#0d1117;" onclick="closeModal();showInstructionForm();">📋 SI</button><button class="btn btn-primary" style="margin-bottom:2px;width:100%;background:var(--pink);" onclick="closeModal();showRFIForm();">📤 RFI</button><button class="btn btn-primary" style="margin-bottom:2px;width:100%;background:var(--orange);" onclick="closeModal();showMaterialForm();">🧱 Material</button><button class="btn btn-primary" style="margin-bottom:2px;width:100%;background:var(--cyan);" onclick="closeModal();showConcreteForm();">🧪 Cube</button><button class="btn btn-primary" style="margin-bottom:2px;width:100%;background:var(--green);" onclick="closeModal();showTestForm();">🔬 Test</button><button class="btn btn-primary" style="margin-bottom:2px;width:100%;background:var(--red);" onclick="closeModal();showDelayForm();">🚧 Delay</button><button class="btn btn-primary" style="margin-bottom:2px;width:100%;background:var(--purple);" onclick="closeModal();showAttendanceForm();">👷 Attend</button><button class="btn btn-primary" style="margin-bottom:2px;width:100%;background:var(--blue);" onclick="closeModal();showDrawingForm();">📐 Drawing</button><button class="btn btn-secondary" style="width:100%;" onclick="closeModal();">Cancel</button></div></div>';document.getElementById('fo').addEventListener('click',e=>{if(e.target.id==='fo')closeModal();});}

    function deleteEntry(type,id){if(!confirm('Delete?'))return;app[type]=app[type].filter(e=>e.id!==id);saveApp(app);refreshAll();}
    function closeNCR(id){const n=app.ncrs.find(n=>n.id===id);const c=prompt('Closeout:');if(c===null)return;n.status='closed';n.closeoutComment=c;n.closedDate=new Date().toISOString();saveApp(app);refreshAll();}
    function ackSI(id){const s=app.instructions.find(s=>s.id===id);s.status='acknowledged';saveApp(app);refreshAll();}
    function copyReport(){navigator.clipboard.writeText(window._report||'').then(()=>toast('📋 Copied!'));}
    function printReport(){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelector('[data-tab="report"]').classList.add('active');document.getElementById('panel-report').classList.add('active');renderReport();setTimeout(()=>window.print(),400);}
    function saveReport(){project.reportCounter=(project.reportCounter||1)+1;saveProject(project);app.dailyReports.push({id:genId('rpt'),content:window._report||'',date:today()});saveApp(app);toast('💾 Saved!');}
    function shareWA(text){window.open('https://wa.me/?text='+encodeURIComponent(text.substring(0,1500)),'_blank');}
    function backupData(){const backup={project,app,media,date:new Date().toISOString()};const blob=new Blob([JSON.stringify(backup)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='cowlog-backup-'+today()+'.json';a.click();project.lastBackup=today();saveProject(project);toast('💾 Backup!');}
    function restoreData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.style.display='none';document.body.appendChild(inp);inp.addEventListener('change',function(){const reader=new FileReader();reader.onload=function(e){try{const data=JSON.parse(e.target.result);if(!data.project||!data.app)return;if(!confirm('Restore?'))return;project=data.project;app=data.app;media=data.media||[];saveProject(project);saveApp(app);saveMedia(media);refreshAll();populateProjectFields();toast('✅ Restored!');}catch(err){}};reader.readAsText(this.files[0]);document.body.removeChild(inp);});inp.click();}

    function init(){
        document.getElementById('currentDate').textContent=new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        populateProjectFields();updateCompactDisplay();
        document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');const panel=document.getElementById('panel-'+tab.dataset.tab);if(panel)panel.classList.add('active');if(tab.dataset.tab==='report')renderReport();});});
        document.getElementById('fabBtn').addEventListener('click',showFABMenu);
        document.getElementById('diarySearch').addEventListener('input',e=>renderDiary(e.target.value));
        refreshAll();
    }
    document.addEventListener('DOMContentLoaded',init);
    </script>
</body>
</html>
