<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🦺 CoW Log Pro</title><meta name="theme-color" content="#0d1117"><link rel="manifest" href="manifest.json">
    <style>
        :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#f78166;--green:#3fb950;--red:#f85149;--yellow:#d2991d;--blue:#58a6ff;--purple:#a371f7;--cyan:#39d2c0}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;font-size:15px;line-height:1.5}
        .header{background:var(--card);padding:16px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.header h1{font-size:1.2rem;color:var(--accent)}.header .date{font-size:.8rem;color:var(--muted)}.settings-toggle{background:var(--border);color:var(--text);border:none;padding:4px 10px;border-radius:6px;font-size:.7rem;cursor:pointer}
        .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:10px 14px}
        .stat-card{background:var(--card);padding:8px 4px;border-radius:10px;text-align:center;border:1px solid var(--border)}.stat-card .count{font-size:1.2rem;font-weight:700}.stat-card .label{font-size:.5rem;color:var(--muted);text-transform:uppercase;margin-top:1px}
        .count.red{color:var(--red)}.count.green{color:var(--green)}.count.blue{color:var(--blue)}.count.yellow{color:var(--yellow)}.count.purple{color:var(--purple)}.count.cyan{color:var(--cyan)}
        .tabs{display:flex;gap:2px;padding:0 12px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{padding:6px 10px;border-radius:16px;font-size:.65rem;white-space:nowrap;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-weight:500}.tab.active{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:600}
        .content{padding:0 12px}.panel{display:none}.panel.active{display:block}
        .entry-card{background:var(--card);border-radius:10px;padding:10px;margin-bottom:6px;border:1px solid var(--border);border-left:3px solid var(--border)}
        .diary-card{border-left-color:var(--blue)}.inspection-card{border-left-color:var(--green)}.ncr-card{border-left-color:var(--red)}.instruction-card{border-left-color:var(--yellow)}.concrete-card{border-left-color:var(--cyan)}.attendance-card{border-left-color:var(--purple)}
        .entry-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;gap:4px}.entry-title{font-weight:600;font-size:.8rem}
        .badge{font-size:.55rem;padding:2px 6px;border-radius:8px;font-weight:600;white-space:nowrap}.badge-pass{background:rgba(63,185,80,.15);color:var(--green)}.badge-fail{background:rgba(248,81,73,.15);color:var(--red)}.badge-open{background:rgba(248,81,73,.15);color:var(--red)}.badge-closed{background:rgba(63,185,80,.15);color:var(--green)}.badge-pending{background:rgba(210,153,29,.15);color:var(--yellow)}.badge-info{background:rgba(88,166,255,.15);color:var(--blue)}
        .entry-meta{font-size:.6rem;color:var(--muted);margin-bottom:4px;display:flex;flex-wrap:wrap;gap:8px}.entry-desc{font-size:.72rem;line-height:1.4;color:#c9d1d9}.entry-section{background:var(--bg);border-radius:6px;padding:6px 8px;margin-top:4px;font-size:.68rem}.section-label{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px}
        .fab{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;background:var(--accent);color:#0d1117;border:none;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 16px rgba(247,129,102,.3);z-index:200;font-weight:700}.fab:active{transform:scale(.92)}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end}.modal{background:var(--card);width:100%;border-radius:18px 18px 0 0;padding:16px;max-height:85vh;overflow-y:auto;border:1px solid var(--border)}.modal h2{font-size:.9rem;margin-bottom:12px;color:var(--accent)}
        .form-group{margin-bottom:8px}.form-group label{display:block;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;font-weight:600}.modal input,.modal textarea,.modal select{width:100%;padding:8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.75rem;font-family:inherit}.modal textarea{min-height:60px;resize:vertical}
        .btn-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}.btn{padding:8px 14px;border-radius:8px;border:none;font-weight:600;font-size:.75rem;cursor:pointer;flex:1;min-width:60px}.btn-primary{background:var(--accent);color:#0d1117}.btn-secondary{background:var(--border);color:var(--text)}.btn-danger{background:var(--red);color:#fff}.btn-whatsapp{background:#25D366;color:#fff}.btn-small{padding:4px 8px;font-size:.6rem;border-radius:5px;flex:0}
        .media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}.media-thumb{aspect-ratio:1;background:var(--card);border-radius:6px;border:1px solid var(--border);overflow:hidden;cursor:pointer}.media-thumb img{width:100%;height:100%;object-fit:cover}
        .report-preview{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:monospace;font-size:.65rem;line-height:1.6;white-space:pre-wrap;max-height:50vh;overflow-y:auto}
        .search-bar{margin-bottom:8px}.search-bar input{width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.75rem}
        .empty-state{text-align:center;padding:30px 12px;color:var(--muted)}.empty-state .icon{font-size:2rem;margin-bottom:8px;opacity:.5}
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#0d1117;padding:6px 16px;border-radius:16px;font-weight:600;font-size:.7rem;z-index:400;animation:toastIn .3s ease}@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        .settings-panel{display:none;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:8px}.settings-panel.show{display:block}
        .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:280px;margin:20px auto}.pin-btn{aspect-ratio:1;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1.2rem;cursor:pointer}.pin-btn:active{background:var(--accent)}.pin-dots{display:flex;gap:8px;justify-content:center;margin:16px 0}.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--border)}.pin-dot.filled{background:var(--accent);border-color:var(--accent)}
        .sig-pad{border:2px dashed var(--border);border-radius:8px;width:100%;height:120px;background:var(--bg);touch-action:none;cursor:crosshair}
        .progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}.progress-fill{height:100%;border-radius:3px;transition:width .3s}
        .cube-due{border-left:3px solid var(--red)!important}
        @media print{body{background:#fff;color:#000;font-size:9pt}.header,.stats-row,.tabs,.fab,.btn,.search-bar,.modal-overlay,.toast,.settings-panel,.pin-pad{display:none!important}.panel{display:none!important}#panel-report{display:block!important}.report-preview{background:#fff;border:none;color:#000;max-height:none;overflow:visible;font-size:8pt}}
        @media(min-width:600px){.content{max-width:650px;margin:0 auto}.stats-row{max-width:650px;margin:0 auto}}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row"><h1>🦺 CoW Log Pro</h1><div style="display:flex;align-items:center;gap:6px;"><button class="settings-toggle" id="settingsToggle">⚙️</button><span class="date" id="currentDate"></span></div></div>
        <div class="settings-panel" id="settingsPanel"><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:.7rem;"><div><div class="section-label">Project</div><input type="text" id="projectName"></div><div><div class="section-label">Contract No</div><input type="text" id="contractNo"></div><div><div class="section-label">Contractor</div><input type="text" id="contractorName"></div><div><div class="section-label">Default Location</div><input type="text" id="defaultLocation"></div><div><div class="section-label">CoW Name</div><input type="text" id="cowName"></div><div><div class="section-label">PIN Lock (4 digits)</div><input type="password" id="appPin" maxlength="4" placeholder="0000 = no lock"></div><div style="grid-column:1/-1;"><button class="btn btn-primary btn-small" onclick="saveProjectSettings()">💾 Save</button></div></div></div>
        <div id="compactInfo" style="font-size:.62rem;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;"><span>🏗️ <strong id="displayProject">—</strong></span><span>👷 <strong id="displayContractor">—</strong></span><span>📍 <strong id="displayLocation">—</strong></span></div>
    </div>

    <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="count blue" id="diaryCount">0</div><div class="label">Diary</div></div>
        <div class="stat-card"><div class="count green" id="inspectionCount">0</div><div class="label">Insp</div></div>
        <div class="stat-card"><div class="count red" id="ncrCount">0</div><div class="label">NCRs</div></div>
        <div class="stat-card"><div class="count cyan" id="cubeCount">0</div><div class="label">Cubes</div></div>
    </div>

    <div class="tabs" id="tabBar">
        <button class="tab active" data-tab="diary">📔 Diary</button>
        <button class="tab" data-tab="inspections">✅ Insp</button>
        <button class="tab" data-tab="ncr">🚨 NCR</button>
        <button class="tab" data-tab="instructions">📋 SI</button>
        <button class="tab" data-tab="concrete">🧪 Cubes</button>
        <button class="tab" data-tab="attendance">👷 Attend</button>
        <button class="tab" data-tab="photos">📸</button>
        <button class="tab" data-tab="report">📄 Rpt</button>
    </div>

    <div class="content">
        <div class="panel active" id="panel-diary"><div class="search-bar"><input type="text" placeholder="🔍 Search diary..." id="diarySearch"></div><div id="diaryEntries"></div></div>
        <div class="panel" id="panel-inspections"><div id="inspectionEntries"></div></div>
        <div class="panel" id="panel-ncr"><div id="ncrEntries"></div></div>
        <div class="panel" id="panel-instructions"><div id="instructionEntries"></div></div>
        <div class="panel" id="panel-concrete"><div id="concreteEntries"></div></div>
        <div class="panel" id="panel-attendance"><div id="attendanceEntries"></div></div>
        <div class="panel" id="panel-photos"><div id="photoGallery"></div></div>
        <div class="panel" id="panel-report"><div id="reportContent"></div></div>
    </div>

    <button class="fab" id="fabBtn">+</button>
    <div id="modalContainer"></div>
    <div id="toastContainer"></div>
    <div id="mediaViewer"></div>

    <!-- PIN Lock Overlay -->
    <div id="pinOverlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:1000;flex-direction:column;align-items:center;justify-content:center;">
        <div style="font-size:3rem;margin-bottom:16px;">🔐</div>
        <p style="color:var(--muted);margin-bottom:8px;">Enter PIN to unlock</p>
        <div class="pin-dots" id="pinDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
        <div class="pin-pad" id="pinPad"></div>
        <button class="btn btn-small btn-secondary" style="margin-top:12px;" onclick="resetPin()">Clear</button>
    </div>

    <script>
    // ============================================
    // DATA STORE — ALL MODULES
    // ============================================
    const MK='cowlog_media_v6',AK='cowlog_app_v6',PK='cowlog_project_v4';
    function loadProject(){try{const r=localStorage.getItem(PK);return r?JSON.parse(r):{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'Clerk of Works',weather:'☀️ Sunny',reportCounter:1,pin:'',lastBackup:''};}catch(e){return{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'Clerk of Works',weather:'☀️ Sunny',reportCounter:1,pin:'',lastBackup:''};}}
    function saveProject(p){localStorage.setItem(PK,JSON.stringify(p));}
    let project=loadProject();
    function loadMedia(){try{const r=localStorage.getItem(MK);return r?JSON.parse(r):[];}catch(e){return[];}}
    function saveMedia(arr){if(arr.length>60)arr=arr.slice(-40);try{localStorage.setItem(MK,JSON.stringify(arr));}catch(e){}}
    function loadApp(){try{const r=localStorage.getItem(AK);return r?JSON.parse(r):{diary:[],inspections:[],ncrs:[],instructions:[],concrete:[],attendance:[],dailyReports:[],rfis:[],delays:[],materialTests:[]};}catch(e){return{diary:[],inspections:[],ncrs:[],instructions:[],concrete:[],attendance:[],dailyReports:[],rfis:[],delays:[],materialTests:[]};}}
    function saveApp(d){localStorage.setItem(AK,JSON.stringify(d));}
    let media=loadMedia(),app=loadApp(),pendingMedia=[];
    window._report='';
    function genId(p){return p+'-'+Date.now()+'-'+Math.random().toString(36).substr(2,5);}
    function fmt(ts){return new Date(ts).toLocaleString('en-KE',{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
    function fmtDate(ts){return new Date(ts).toLocaleDateString('en-KE',{year:'numeric',month:'short',day:'numeric'});}
    function today(){return new Date().toISOString().split('T')[0];}
    function toast(msg){const c=document.getElementById('toastContainer');c.innerHTML='<div class="toast">'+msg+'</div>';setTimeout(()=>c.innerHTML='',2000);}
    function loc(){return project.defaultLocation||'Site';}
    function contractor(){return project.contractorName||'Contractor';}
    function updateStats(){document.getElementById('diaryCount').textContent=app.diary.length;document.getElementById('inspectionCount').textContent=app.inspections.length;document.getElementById('ncrCount').textContent=app.ncrs.filter(n=>n.status==='open').length;document.getElementById('cubeCount').textContent=app.concrete.filter(c=>!c.result28).length;}

    function populateProjectFields(){document.getElementById('projectName').value=project.projectName||'';document.getElementById('contractNo').value=project.contractNo||'';document.getElementById('contractorName').value=project.contractorName||'';document.getElementById('defaultLocation').value=project.defaultLocation||'';document.getElementById('cowName').value=project.cowName||'';document.getElementById('appPin').value=project.pin||'';updateCompactDisplay();}
    function updateCompactDisplay(){document.getElementById('displayProject').textContent=project.projectName||'—';document.getElementById('displayContractor').textContent=project.contractorName||'—';document.getElementById('displayLocation').textContent=project.defaultLocation||'—';}
    function saveProjectSettings(){project.projectName=document.getElementById('projectName').value.trim();project.contractNo=document.getElementById('contractNo').value.trim();project.contractorName=document.getElementById('contractorName').value.trim();project.defaultLocation=document.getElementById('defaultLocation').value.trim();project.cowName=document.getElementById('cowName').value.trim()||'Clerk of Works';project.pin=document.getElementById('appPin').value.trim();saveProject(project);updateCompactDisplay();document.getElementById('settingsPanel').classList.remove('show');toast('✅ Settings saved!');setupPinLock();}
    document.addEventListener('DOMContentLoaded',()=>{document.getElementById('settingsToggle').addEventListener('click',()=>{const p=document.getElementById('settingsPanel');p.classList.toggle('show');if(p.classList.contains('show'))populateProjectFields();});});

    // ============================================
    // PIN LOCK
    // ============================================
    let pinEntry='';
    function setupPinLock(){
        if(project.pin&&project.pin.length===4){
            document.getElementById('pinOverlay').style.display='flex';
            buildPinPad();
        }else{
            document.getElementById('pinOverlay').style.display='none';
        }
    }
    function buildPinPad(){
        const pad=document.getElementById('pinPad');
        const nums=[1,2,3,4,5,6,7,8,9,'',0,'⌫'];
        pad.innerHTML=nums.map(n=>'<button class="pin-btn" onclick="'+(n==='⌫'?'pinBackspace()':n===''?'return':'pinPress(\''+n+'\')')+'">'+n+'</button>').join('');
    }
    function pinPress(d){if(pinEntry.length>=4)return;pinEntry+=d;updatePinDots();if(pinEntry.length===4)checkPin();}
    function pinBackspace(){pinEntry=pinEntry.slice(0,-1);updatePinDots();}
    function resetPin(){pinEntry='';updatePinDots();}
    function updatePinDots(){const dots=document.querySelectorAll('#pinDots .pin-dot');dots.forEach((d,i)=>{d.classList.toggle('filled',i<pinEntry.length);});}
    function checkPin(){if(pinEntry===project.pin){document.getElementById('pinOverlay').style.display='none';pinEntry='';updatePinDots();toast('🔓 Unlocked');}else{toast('❌ Wrong PIN');setTimeout(resetPin,500);}}

    // ============================================
    // MEDIA
    // ============================================
    function openCamera(){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.setAttribute('capture','environment');inp.style.display='none';document.body.appendChild(inp);inp.addEventListener('change',async function(){for(let f of this.files)await processFile(f);refreshMediaPreview();toast('📸 '+this.files.length+' captured');document.body.removeChild(inp);});inp.click();}
    function openGallery(){const inp=document.createElement('input');inp.type='file';inp.accept='image/*,video/*';inp.multiple=true;inp.style.display='none';document.body.appendChild(inp);inp.addEventListener('change',async function(){for(let f of this.files)await processFile(f);refreshMediaPreview();toast('🖼️ '+this.files.length+' added');document.body.removeChild(inp);});inp.click();}
    function processFile(file){return new Promise(resolve=>{const reader=new FileReader();reader.onload=function(e){let dataUrl=e.target.result;const type=file.type.startsWith('video/')?'video':'image';if(type==='image'&&dataUrl.length>150000){const img=new Image();img.onload=function(){const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>700){h=Math.round(h*(700/w));w=700;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);dataUrl=c.toDataURL('image/jpeg',0.4);addPending(dataUrl,type,file.name);resolve();};img.src=dataUrl;}else{addPending(dataUrl,type,file.name);resolve();}};reader.readAsDataURL(file);});}
    function addPending(dataUrl,type,name){pendingMedia.push({id:genId('med'),type,dataUrl,fileName:name||'photo.jpg',timestamp:new Date().toISOString(),label:'',entryId:null});}
    function refreshMediaPreview(){const c=document.getElementById('mediaPreviewContainer');if(!c){setTimeout(refreshMediaPreview,100);return;}if(!pendingMedia.length){c.innerHTML='<p style="font-size:.65rem;color:var(--muted);text-align:center;padding:8px;">Tap 📷 or 🖼️</p>';return;}c.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:4px;">'+pendingMedia.map((m,i)=>'<div style="width:55px;height:55px;border-radius:6px;overflow:hidden;position:relative;"><img src="'+m.dataUrl+'" style="width:100%;height:100%;object-fit:cover;"><button style="position:absolute;top:1px;right:1px;background:var(--red);color:#fff;width:16px;height:16px;border-radius:50%;border:none;font-size:.5rem;cursor:pointer;" onclick="removePending('+i+')">✕</button></div>').join('')+'</div>';}
    function removePending(i){pendingMedia.splice(i,1);refreshMediaPreview();}
    function commitMedia(entryId){if(!pendingMedia.length)return;pendingMedia.forEach(m=>{m.entryId=entryId;media.push({...m});});saveMedia(media);pendingMedia=[];updateStats();}
    function viewMedia(mediaId){const item=media.find(m=>m.id===mediaId);if(!item)return;const v=document.getElementById('mediaViewer');let content=item.type==='video'?'<video src="'+item.dataUrl+'" controls style="max-width:95%;max-height:65vh;border-radius:8px;"></video>':'<img src="'+item.dataUrl+'" style="max-width:95%;max-height:65vh;border-radius:8px;">';v.innerHTML='<div style="position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;" onclick="document.getElementById(\'mediaViewer\').innerHTML=\'\'"><button style="position:absolute;top:16px;right:16px;background:var(--red);color:#fff;width:32px;height:32px;border-radius:50%;border:none;font-size:1rem;cursor:pointer;">✕</button>'+content+'<div style="color:var(--text);font-size:.7rem;margin-top:10px;text-align:center;"><p>'+(item.label||'Photo')+'</p><p style="font-size:.6rem;color:#888;">'+fmt(item.timestamp)+'</p><div style="margin-top:6px;display:flex;gap:4px;justify-content:center;"><button class="btn btn-small btn-primary" onclick="event.stopPropagation();shareMedia(\''+mediaId+'\')">📤</button><button class="btn btn-small btn-danger" onclick="event.stopPropagation();deleteMediaItem(\''+mediaId+'\')">🗑️</button></div></div></div>';}
    function deleteMediaItem(id){if(!confirm('Delete?'))return;media=media.filter(m=>m.id!==id);saveMedia(media);document.getElementById('mediaViewer').innerHTML='';refreshAll();toast('🗑️ Deleted');}
    async function shareMedia(id){const item=media.find(m=>m.id===id);if(!item)return;if(navigator.share){try{const r=await fetch(item.dataUrl);const b=await r.blob();await navigator.share({title:'Site Photo',files:[new File([b],item.fileName,{type:b.type})]});}catch(e){}}}
    function shareWA(text){window.open('https://wa.me/?text='+encodeURIComponent(text.substring(0,1500)),'_blank');}

    // ============================================
    // RENDERERS — ALL MODULES
    // ============================================
    function renderDiary(filter=''){const c=document.getElementById('diaryEntries');let entries=app.diary;if(filter){const q=filter.toLowerCase();entries=entries.filter(e=>e.title.toLowerCase().includes(q)||e.description.toLowerCase().includes(q));}entries.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));if(!entries.length){c.innerHTML='<div class="empty-state"><div class="icon">📔</div><p>No diary entries</p></div>';return;}c.innerHTML=entries.map(e=>{const em=media.filter(m=>m.entryId===e.id);const colors={'Work in Progress':'badge-info','Material Delivery':'badge-pending','Inspection':'badge-pass','Meeting':'badge-pending','Delay/Issue':'badge-fail','General':'badge-closed'};const ab=e.activityType?'<span class="badge '+(colors[e.activityType]||'badge-info')+'">'+e.activityType+'</span>':'';return '<div class="entry-card diary-card"><div class="entry-header"><span class="entry-title">📔 '+e.title+'</span>'+ab+'</div><div class="entry-meta"><span>'+fmt(e.timestamp)+'</span><span>📍 '+e.location+'</span></div><div class="entry-desc">'+e.description.replace(/\n/g,'<br>')+'</div>'+(em.length?'<div class="entry-section"><div class="section-label">📸 '+em.length+' Photo(s)</div><div class="media-grid">'+em.map(m=>'<div class="media-thumb" onclick="viewMedia(\''+m.id+'\')"><img src="'+m.dataUrl+'" alt="photo"></div>').join('')+'</div></div>':'')+(e.issuesIdentified?'<div class="entry-section" style="border-left:3px solid var(--red);"><div class="section-label">⚠️ Issues</div>'+e.issuesIdentified+'</div>':'')+'<div style="margin-top:4px;display:flex;gap:4px;"><button class="btn btn-small btn-secondary" onclick="addMediaToEntry(\''+e.id+'\')">📸</button><button class="btn btn-small btn-primary" onclick="editDiary(\''+e.id+'\')">✏️</button><button class="btn btn-small btn-secondary" onclick="deleteEntry(\'diary\',\''+e.id+'\')">🗑️</button></div></div>';}).join('');}

    function renderInspections(){const c=document.getElementById('inspectionEntries');const entries=[...app.inspections].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));if(!entries.length){c.innerHTML='<div class="empty-state"><div class="icon">✅</div><p>No inspections</p></div>';return;}c.innerHTML=entries.map(e=>{const em=media.filter(m=>m.entryId===e.id);return '<div class="entry-card inspection-card"><div class="entry-header"><span class="entry-title">✅ '+e.checklistType+'</span><span class="badge '+(e.result==='pass'?'badge-pass':'badge-fail')+'">'+e.result.toUpperCase()+'</span></div><div class="entry-meta"><span>'+fmt(e.timestamp)+'</span><span>📍 '+e.location+'</span><span>'+e.items.filter(i=>i.passed).length+'/'+e.items.length+' OK</span></div><div class="entry-section"><div class="section-label">Items</div>'+e.items.map(i=>'<div style="padding:1px 0;font-size:.65rem;">'+(i.passed?'✅':'❌')+' '+i.label+'</div>').join('')+'</div>'+(e.notes?'<div class="entry-section"><div class="section-label">Notes</div>'+e.notes+'</div>':'')+'<div style="margin-top:4px;"><button class="btn btn-small btn-secondary" onclick="deleteEntry(\'inspections\',\''+e.id+'\')">🗑️</button></div></div>';}).join('');}

    function renderNCRs(){const c=document.getElementById('ncrEntries');const entries=[...app.ncrs].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));if(!entries.length){c.innerHTML='<div class="empty-state"><div class="icon">🚨</div><p>No NCRs</p></div>';return;}c.innerHTML=entries.map(e=>'<div class="entry-card ncr-card"><div class="entry-header"><span class="entry-title">🚨 NCR-'+e.id.split('-')[1]+': '+e.title+'</span><span class="badge '+(e.status==='open'?'badge-open':'badge-closed')+'">'+e.status.toUpperCase()+'</span></div><div class="entry-meta"><span>'+fmt(e.timestamp)+'</span><span>📍 '+e.location+'</span><span>⚠️ '+e.severity+'</span></div><div class="entry-section"><div class="section-label">Description</div>'+e.description+'</div><div class="entry-section" style="border-left:3px solid var(--yellow);"><div class="section-label">Action Required</div>'+e.actionRequired+'</div>'+(e.closeoutComment?'<div class="entry-section" style="border-left:3px solid var(--green);"><div class="section-label">Closeout</div>'+e.closeoutComment+'<br><small>'+fmt(e.closedDate)+'</small></div>':'')+'<div style="margin-top:4px;display:flex;gap:4px;">'+(e.status!=='closed'?'<button class="btn btn-small btn-primary" onclick="closeNCR(\''+e.id+'\')">✅ Close</button>':'')+'<button class="btn btn-small btn-secondary" onclick="deleteEntry(\'ncrs\',\''+e.id+'\')">🗑️</button></div></div>').join('');}

    function renderInstructions(){const c=document.getElementById('instructionEntries');const entries=[...app.instructions].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));if(!entries.length){c.innerHTML='<div class="empty-state"><div class="icon">📋</div><p>No instructions</p></div>';return;}c.innerHTML=entries.map(e=>'<div class="entry-card instruction-card"><div class="entry-header"><span class="entry-title">📋 SI-'+e.id.split('-')[1]+'</span><span class="badge '+(e.status==='acknowledged'?'badge-closed':'badge-open')+'">'+e.status.toUpperCase()+'</span></div><div class="entry-meta"><span>'+fmt(e.timestamp)+'</span><span>👷 '+e.issuedTo+'</span><span>📍 '+e.location+'</span></div><div class="entry-desc">'+e.description+'</div>'+(e.deadline?'<div class="entry-section"><div class="section-label">Deadline</div>⏰ '+e.deadline+'</div>':'')+'<div style="margin-top:4px;">'+(e.status!=='acknowledged'?'<button class="btn btn-small btn-primary" onclick="ackSI(\''+e.id+'\')">✍️ Ack</button>':'')+'<button class="btn btn-small btn-secondary" onclick="deleteEntry(\'instructions\',\''+e.id+'\')">🗑️</button></div></div>').join('');}

    // CONCRETE CUBE REGISTER
    function renderConcrete(){const c=document.getElementById('concreteEntries');const entries=[...app.concrete].sort((a,b)=>new Date(b.pourDate)-new Date(a.pourDate));if(!entries.length){c.innerHTML='<div class="empty-state"><div class="icon">🧪</div><p>No concrete cubes registered</p></div>';return;}
    c.innerHTML='<div style="display:flex;gap:4px;margin-bottom:8px;"><span class="badge badge-open">🔴 Test Due</span><span class="badge badge-closed">🟢 Complete</span></div>'+entries.map(e=>{
    const todayStr=today();const d7=new Date(e.pourDate);d7.setDate(d7.getDate()+7);const d14=new Date(e.pourDate);d14.setDate(d14.getDate()+14);const d28=new Date(e.pourDate);d28.setDate(d28.getDate()+28);
    const due7=todayStr>=d7.toISOString().split('T')[0]&&!e.result7;const due28=todayStr>=d28.toISOString().split('T')[0]&&!e.result28;
    return '<div class="entry-card concrete-card'+(due7||due28?' cube-due':'')+'"><div class="entry-header"><span class="entry-title">🧪 Cube: '+e.cubeId+'</span>'+(due7||due28?'<span class="badge badge-open">DUE</span>':'')+'</div><div class="entry-meta"><span>Pour: '+fmtDate(e.pourDate)+'</span><span>📍 '+e.location+'</span><span>Grade: '+e.grade+'</span></div>'+
    '<div class="entry-section"><div class="section-label">Results</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;text-align:center;font-size:.65rem;">'+
    '<div>7-Day<br>'+(e.result7||'—')+'<br><small>'+(e.result7?'✅':'📅 '+d7.toLocaleDateString('en-KE',{month:'short',day:'numeric'}))+'</small></div>'+
    '<div>14-Day<br>'+(e.result14||'—')+'<br><small>'+(e.result14?'✅':'📅 '+d14.toLocaleDateString('en-KE',{month:'short',day:'numeric'}))+'</small></div>'+
    '<div>28-Day<br>'+(e.result28||'—')+'<br><small>'+(e.result28?'✅':'📅 '+d28.toLocaleDateString('en-KE',{month:'short',day:'numeric'}))+'</small></div>'+
    '<div>Status<br>'+(e.result28?'<span class="badge badge-pass">Done</span>':due28?'<span class="badge badge-open">Due</span>':due7?'<span class="badge badge-pending">7d</span>':'<span class="badge badge-info">Wait</span>')+'</div>'+
    '</div></div>'+
    '<div style="margin-top:4px;display:flex;gap:4px;">'+
    (!e.result7?'<button class="btn btn-small btn-primary" onclick="addCubeResult(\''+e.id+'\',7)">+7d</button>':'')+
    (!e.result14?'<button class="btn btn-small btn-primary" onclick="addCubeResult(\''+e.id+'\',14)">+14d</button>':'')+
    (!e.result28?'<button class="btn btn-small btn-primary" onclick="addCubeResult(\''+e.id+'\',28)">+28d</button>':'')+
    '<button class="btn btn-small btn-secondary" onclick="deleteEntry(\'concrete\',\''+e.id+'\')">🗑️</button></div></div>';}).join('');}

    function addCubeResult(cubeId,days){
        const cube=app.concrete.find(c=>c.id===cubeId);
        if(!cube)return;
        const result=prompt('Enter '+days+'-day strength result (N/mm²):');
        if(!result)return;
        if(days===7)cube.result7=parseFloat(result);
        if(days===14)cube.result14=parseFloat(result);
        if(days===28)cube.result28=parseFloat(result);
        saveApp(app);refreshAll();toast('✅ '+days+'-day result saved');
    }

    // SITE ATTENDANCE
    function renderAttendance(){
        const c=document.getElementById('attendanceEntries');
        const td=today();
        const todayEntries=app.attendance.filter(e=>e.date===td);
        // Group by category
        const groups={};
        todayEntries.forEach(e=>{if(!groups[e.category])groups[e.category]=[];groups[e.category].push(e);});
        if(!Object.keys(groups).length){c.innerHTML='<div class="empty-state"><div class="icon">👷</div><p>No attendance logged today</p></div>';return;}
        let h='<div style="display:flex;gap:4px;margin-bottom:8px;"><span class="badge badge-info">📅 '+fmtDate(td)+'</span><span class="badge badge-pending">👷 Total: '+todayEntries.reduce((s,e)=>s+(parseInt(e.count)||0),0)+'</span></div>';
        Object.keys(groups).forEach(cat=>{
            h+='<div class="entry-card attendance-card"><div class="entry-header"><span class="entry-title">👷 '+cat+'</span><span class="badge badge-info">'+groups[cat].reduce((s,e)=>s+(parseInt(e.count)||0),0)+' workers</span></div>';
            groups[cat].forEach(e=>{
                h+='<div style="font-size:.7rem;padding:2px 0;display:flex;justify-content:space-between;"><span>'+e.name+'</span><span>'+e.count+' | '+e.company+'</span></div>';
            });
            h+='</div>';
        });

    // COMPREHENSIVE REPORT
    function renderReport(){
        const td=today();
        const dt=app.diary.filter(e=>e.timestamp.startsWith(td));
        const it=app.inspections.filter(e=>e.timestamp.startsWith(td));
        const no=app.ncrs.filter(e=>e.status==='open');
        const si=app.instructions.filter(e=>e.timestamp.startsWith(td));
        const at=app.attendance.filter(e=>e.date===td);
        const ct=app.concrete.filter(e=>e.pourDate===td);
        const cd=app.concrete.filter(e=>{const d28=new Date(e.pourDate);d28.setDate(d28.getDate()+28);return td>=d28.toISOString().split('T')[0]&&!e.result28;});
        const rdate=new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        const pn=project.projectName||'Project',con=project.contractorName||'N/A',rn='COW-'+String(project.reportCounter||1).padStart(3,'0');
        const allPhotos=[];dt.forEach(e=>{media.filter(m=>m.entryId===e.id&&m.type==='image').forEach(m=>allPhotos.push({...m,source:e.title}));});it.forEach(e=>{media.filter(m=>m.entryId===e.id&&m.type==='image').forEach(m=>allPhotos.push({...m,source:e.checklistType}));});

        let tr='═══════════════════════════════════════\n  CLERK OF WORKS — DAILY SITE REPORT\n═══════════════════════════════════════\n\n';
        tr+='REPORT: '+rn+'    DATE: '+rdate+'\nPROJECT: '+pn+'    CONTRACTOR: '+con+'\nREPORTED BY: '+(project.cowName||'CoW')+'\n\n';
        tr+='1. WORK PROGRESS\n';
        if(dt.length)dt.forEach((e,i)=>{tr+='\n'+(i+1)+'. '+e.title+'\n   📍 '+e.location+'\n   '+e.description.replace(/\n/g,'\n   ')+'\n';if(e.issuesIdentified)tr+='   ⚠️ '+e.issuesIdentified+'\n';});else tr+='\n   No entries today.\n';
        tr+='\n2. INSPECTIONS\n';
        if(it.length)it.forEach(e=>{tr+='\n   '+e.checklistType+' — '+e.result.toUpperCase()+'\n   📍 '+e.location+'\n';e.items.forEach(i=>{tr+='   '+(i.passed?'✅':'❌')+' '+i.label+'\n';});});else tr+='\n   None today.\n';
        tr+='\n3. NON-CONFORMANCE REPORTS\n   Open: '+no.length+'\n';
        if(no.length)no.forEach(e=>{tr+='   • NCR-'+e.id.split('-')[1]+': '+e.title+' ['+e.severity+']\n';});else tr+='   None outstanding.\n';
        tr+='\n4. SITE INSTRUCTIONS\n   Issued today: '+si.length+'\n';
        if(si.length)si.forEach(e=>{tr+='   • SI-'+e.id.split('-')[1]+': '+e.issuedTo+'\n';});
        tr+='\n5. SITE ATTENDANCE\n   Total personnel: '+(at.reduce((s,e)=>s+(parseInt(e.count)||0),0)||'Not recorded')+'\n';
        if(at.length){const cats={};at.forEach(e=>{if(!cats[e.category])cats[e.category]=0;cats[e.category]+=parseInt(e.count)||0;});Object.keys(cats).forEach(c=>{tr+='   '+c+': '+cats[c]+'\n';});}
        tr+='\n6. CONCRETE CUBES\n   Registered today: '+ct.length+'\n   Awaiting 28-day results: '+cd.length+'\n';
        if(cd.length)cd.forEach(e=>{tr+='   • '+e.cubeId+' — Pour: '+fmtDate(e.pourDate)+' — Grade: '+e.grade+'\n';});
        if(allPhotos.length)tr+='\n7. SITE PHOTOS: '+allPhotos.length+' embedded below\n';
        tr+='\n═══════════════════════════════════════\n  REPORT END — '+rdate+'\n  '+(project.cowName||'Clerk of Works')+'\n═══════════════════════════════════════\n';
        window._report=tr;

        let h='<div style="display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap;"><button class="btn btn-small btn-primary" onclick="copyReport()">📋 Copy</button><button class="btn btn-small btn-secondary" onclick="printReport()">🖨️ Print</button><button class="btn btn-small btn-whatsapp" onclick="shareWA(window._report)">📱 WhatsApp</button><button class="btn btn-small btn-secondary" onclick="saveReport()">💾 Save</button><button class="btn btn-small btn-secondary" onclick="backupData()">💾 Backup</button></div>';
        h+='<div style="display:flex;gap:4px;margin-bottom:8px;"><span class="badge badge-info">📔 '+dt.length+'</span><span class="badge '+(it.some(i=>i.result==='fail')?'badge-fail':'badge-pass')+'">✅ '+it.length+'</span><span class="badge badge-open">🚨 '+no.length+'</span><span class="badge badge-pending">👷 '+(at.reduce((s,e)=>s+(parseInt(e.count)||0),0)||0)+'</span><span class="badge badge-info">🧪 '+ct.length+'</span></div>';
        h+='<div class="report-preview">'+tr+'</div>';
        if(allPhotos.length)h+='<div style="margin-top:12px;"><div class="section-label">📸 SITE PHOTOS ('+allPhotos.length+')</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;">'+allPhotos.map((p,i)=>'<div style="background:var(--card);border-radius:8px;overflow:hidden;cursor:pointer;" onclick="viewMedia(\''+p.id+'\')"><img src="'+p.dataUrl+'" style="width:100%;display:block;"><div style="font-size:.55rem;color:var(--muted);padding:3px 6px;">📷 '+(i+1)+'. '+p.source+'</div></div>').join('')+'</div></div>';
        document.getElementById('reportContent').innerHTML=h;
    }

urCount:document.getElementById('dlb').value,equipmentUsed:document.getElementById('deq').value,materialsDelivered:document.getElementById('dmt').value,issuesIdentified:document.getElementById('dis').value,weather:project.weather,timestamp:ex?ex.timestamp:new Date().toISOString()};if(ex){const i=app.diary.findIndex(e=>e.id===editId);if(i>-1)app.diary[i]=entry;}else{app.diary.push(entry);}commitMedia(entry.id);saveApp(app);});if(ex&&ex.activityType){setTimeout(()=>{const s=document.getElementById('da');if(s)s.value=ex.activityType;},100);}setTimeout(refreshMediaPreview,200);}
    function editDiary(id){showDiaryForm(id);}

    function showInspectionForm(){const lists={'Concrete Pour':['Formwork checked','Reinforcement correct','Cover blocks placed','Grade confirmed','Slump test done','Vibrators ready','Curing plan ready'],'Steel Reinf':['Bar sizes correct','Spacing correct','Laps correct','Chairs placed','Clean & rust-free'],'Blockwork':['Block type correct','Mortar 1:4','Plumb & level','Wall ties','DPC in place','Openings correct'],'Excavation':['Setting out checked','Depth correct','Bottom firm','Safety batter','Dewatering'],'Waterproofing':['Surface prepared','Primer applied','Membrane lapped','Detailing correct','Protection board','Ponding test']};window._lists=lists;pendingMedia=[];let h='<div class="form-group"><label>Type *</label><select id="ct" onchange="window._ul()"><option value="">— Select —</option>';Object.keys(lists).forEach(k=>h+='<option value="'+k+'">'+k+'</option>');h+='</select></div><div class="form-group"><label>Location</label><input type="text" id="il" value="'+loc()+'"></div><div class="form-group"><label>Items</label><div id="ci" style="background:var(--bg);border-radius:6px;padding:4px 8px;border:1px solid var(--border);"><p style="color:var(--muted);text-align:center;padding:10px;">Select checklist</p></div></div><div class="form-group"><label>Notes</label><textarea id="in"></textarea></div><div class="form-group"><label>📸 Photos</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;"><button type="button" class="btn btn-primary btn-small" onclick="openCamera()">📷</button><button type="button" class="btn btn-secondary btn-small" onclick="openGallery()">🖼️</button></div><div id="mediaPreviewContainer" style="margin-top:4px;"></div></div>';showModal('✅ Inspection',h,()=>{const type=document.getElementById('ct').value;if(!type){alert('Select type');return false;}const cbs=document.querySelectorAll('#ci input[type=checkbox]');const items=Array.from(cbs).map(cb=>({label:cb.nextElementSibling.textContent.replace(/\s*$/,''),passed:cb.checked}));const entry={id:genId('ins'),checklistType:type,location:document.getElementById('il').value,items,result:items.every(i=>i.passed)?'pass':'fail',notes:document.getElementById('in').value,timestamp:new Date().toISOString()};app.inspections.push(entry);commitMedia(entry.id);saveApp(app);});window._ul=function(){const type=document.getElementById('ct').value;const c=document.getElementById('ci');if(!type||!window._lists[type]){c.innerHTML='<p style="color:var(--muted);text-align:center;padding:10px;">Select checklist</p>';return;}c.innerHTML=window._lists[type].map((item,i)=>'<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.7rem;"><input type="checkbox" id="it'+i+'" checked><label for="it'+i+'" style="flex:1;">'+item+'</label></div>').join('');};setTimeout(refreshMediaPreview,200);}

    function showNCRForm(){pendingMedia=[];const h='<div class="form-group"><label>Title *</label><input type="text" id="nt"></div><div class="form-group"><label>Severity</label><select id="ns"><option>Minor</option><option selected>Major</option><option>Critical</option></select></div><div class="form-group"><label>Location</label><input type="text" id="nl" value="'+loc()+'"></div><div class="form-group"><label>Responsible</label><input type="text" id="nr" value="'+contractor()+'"></div><div class="form-group"><label>Description *</label><textarea id="nd"></textarea></div><div class="form-group"><label>Action Required *</label><textarea id="na"></textarea></div><div class="form-group"><label>📸 Evidence</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;"><button type="button" class="btn btn-primary btn-small" onclick="openCamera()">📷</button><button type="button" class="btn btn-secondary btn-small" onclick="openGallery()">🖼️</button></div><div id="mediaPreviewContainer" style="margin-top:4px;"></div></div>';showModal('🚨 NCR',h,()=>{const t=document.getElementById('nt').value.trim(),d=document.getElementById('nd').value.trim(),a=document.getElementById('na').value.trim();if(!t||!d||!a){alert('All fields required');return false;}app.ncrs.push({id:genId('ncr'),title:t,severity:document.getElementById('ns').value,location:document.getElementById('nl').value,responsibleParty:document.getElementById('nr').value,description:d,actionRequired:a,status:'open',timestamp:new Date().toISOString()});commitMedia(entry.id);saveApp(app);});setTimeout(refreshMediaPreview,200);}

    function showInstructionForm(){const h='<div class="form-group"><label>Issued To *</label><input type="text" id="st" value="'+contractor()+'"></div><div class="form-group"><label>Location</label><input type="text" id="sl" value="'+loc()+'"></div><div class="form-group"><label>Instruction *</label><textarea id="sd"></textarea></div><div class="form-group"><label>Reference</label><input type="text" id="srf"></div><div class="form-group"><label>Deadline</label><input type="text" id="sdl"></div>';showModal('📋 Site Instruction',h,()=>{const to=document.getElementById('st').value.trim(),desc=document.getElementById('sd').value.trim();if(!to||!desc){alert('All fields required');return false;}app.instructions.push({id:genId('si'),issuedTo:to,location:document.getElementById('sl').value,description:desc,reference:document.getElementById('srf').value,deadline:document.getElementById('sdl').value,status:'issued',timestamp:new Date().toISOString()});saveApp(app);});}

    function addMediaToEntry(entryId){pendingMedia=[];const mc=document.getElementById('modalContainer');mc.innerHTML='<div class="modal-overlay" id="amo"><div class="modal"><h2>📸 Add Photos</h2><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;"><button class="btn btn-primary btn-small" id="ac">📷 Camera</button><button class="btn btn-secondary btn-small" id="ag">🖼️ Gallery</button></div><div id="mediaPreviewContainer" style="margin-top:8px;"></div><div class="btn-row"><button class="btn btn-secondary btn-small" id="ax">Cancel</button><button class="btn btn-primary btn-small" id="as">💾 Save</button></div></div></div>';setTimeout(()=>{document.getElementById('ac').addEventListener('click',openCamera);document.getElementById('ag').addEventListener('click',openGallery);document.getElementById('ax').addEventListener('click',closeModal);document.getElementById('as').addEventListener('click',()=>{commitMedia(entryId);closeModal();refreshAll();toast('📸 Added!');});document.getElementById('amo').addEventListener('click',e=>{if(e.target.id==='amo')closeModal();});refreshMediaPreview();},100);}

    function showFABMenu(){const mc=document.getElementById('modalContainer');mc.innerHTML='<div class="modal-overlay" id="fo" style="align-items:flex-end;justify-content:center;"><div class="modal" style="text-align:center;max-width:350px;"><h2>➕ Add New</h2><button class="btn btn-primary" style="margin-bottom:4px;width:100%;" onclick="closeModal();showDiaryForm();">📔 Diary Entry</button><button class="btn btn-primary" style="margin-bottom:4px;width:100%;background:var(--green);" onclick="closeModal();showInspectionForm();">✅ Inspection</button><button class="btn btn-primary" style="margin-bottom:4px;width:100%;background:var(--red);" onclick="closeModal();showNCRForm();">🚨 NCR</button><button class="btn btn-primary" style="margin-bottom:4px;width:100%;background:var(--yellow);color:#0d1117;" onclick="closeModal();showInstructionForm();">📋 SI</button><button class="btn btn-primary" style="margin-bottom:4px;width:100%;background:var(--cyan);color:#0d1117;" onclick="closeModal();showConcreteForm();">🧪 Cube</button><button class="btn btn-primary" style="margin-bottom:4px;width:100%;background:var(--purple);" onclick="closeModal();showAttendanceForm();">👷 Attendance</button><button class="btn btn-secondary" style="width:100%;" onclick="closeModal();">Cancel</button></div></div>';document.getElementById('fo').addEventListener('click',e=>{if(e.target.id==='fo')closeModal();});}

    // ============================================
    // ACTIONS
    // ============================================
    function deleteEntry(type,id){if(!confirm('Delete?'))return;app[type]=app[type].filter(e=>e.id!==id);if(type==='diary'||type==='inspections')media=media.filter(m=>m.entryId!==id);saveApp(app);saveMedia(media);refreshAll();toast('🗑️ Deleted');}
    function closeNCR(id){const n=app.ncrs.find(n=>n.id===id);if(!n)return;const c=prompt('Closeout comment:');if(c===null)return;n.status='closed';n.closeoutComment=c;n.closedDate=new Date().toISOString();saveApp(app);refreshAll();toast('✅ Closed');}
    function ackSI(id){const s=app.instructions.find(s=>s.id===id);if(!s)return;s.status='acknowledged';s.acknowledgedDate=new Date().toISOString();saveApp(app);refreshAll();toast('✍️ Acknowledged');}
    function copyReport(){navigator.clipboard.writeText(window._report||'').then(()=>toast('📋 Copied!'));}
    function printReport(){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelector('[data-tab="report"]').classList.add('active');document.getElementById('panel-report').classList.add('active');renderReport();setTimeout(()=>window.print(),400);}
    function saveReport(){project.reportCounter=(project.reportCounter||1)+1;saveProject(project);app.dailyReports.push({id:genId('rpt'),content:window._report||'',date:today(),timestamp:new Date().toISOString()});saveApp(app);toast('💾 Saved! Next: COW-'+String(project.reportCounter).padStart(3,'0'));}

    // BACKUP / RESTORE
    function backupData(){
        const backup={project,app,media,date:new Date().toISOString()};
        const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');a.href=url;a.download='cowlog-backup-'+today()+'.json';a.click();
        project.lastBackup=today();saveProject(project);
        toast('💾 Backup downloaded!');
    }
    function restoreData(){
        const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.style.display='none';document.body.appendChild(inp);
        inp.addEventListener('change',function(){
            const reader=new FileReader();
            reader.onload=function(e){
                try{
                    const data=JSON.parse(e.target.result);
                    if(!data.project||!data.app){alert('Invalid backup file');return;}
                    if(!confirm('Restore backup from '+data.date+'? This will replace all current data.'))return;
                    project=data.project;app=data.app;media=data.media||[];
                    saveProject(project);saveApp(app);saveMedia(media);
                    refreshAll();populateProjectFields();updateCompactDisplay();
                    toast('✅ Data restored!');
                }catch(err){alert('Error: '+err.message);}
            };
            reader.readAsText(this.files[0]);
            document.body.removeChild(inp);
        });
        inp.click();
    }

    // ============================================
    // INIT
    // ============================================
    function init(){
        document.getElementById('currentDate').textContent=new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        populateProjectFields();updateCompactDisplay();setupPinLock();
        document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');const panel=document.getElementById('panel-'+tab.dataset.tab);if(panel)panel.classList.add('active');if(tab.dataset.tab==='report')renderReport();if(tab.dataset.tab==='photos')renderPhotos();if(tab.dataset.tab==='concrete')renderConcrete();if(tab.dataset.tab==='attendance')renderAttendance();});});
        document.getElementById('fabBtn').addEventListener('click',showFABMenu);
        document.getElementById('diarySearch').addEventListener('input',e=>renderDiary(e.target.value));
        refreshAll();
    }
    document.addEventListener('DOMContentLoaded',init);
    </script>
