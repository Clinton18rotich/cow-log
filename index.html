<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🦺 CoW Log Pro</title><meta name="theme-color" content="#0d1117"><link rel="manifest" href="manifest.json">
    <style>
        :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#f78166;--green:#3fb950;--red:#f85149;--yellow:#d2991d;--blue:#58a6ff;--purple:#a371f7;--cyan:#39d2c0;--orange:#ff8c42;--pink:#f778ba}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;font-size:15px;line-height:1.5}
        .header{background:var(--card);padding:14px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}.header h1{font-size:1.1rem;color:var(--accent)}.header .date{font-size:.75rem;color:var(--muted)}.settings-toggle{background:var(--border);color:var(--text);border:none;padding:3px 8px;border-radius:5px;font-size:.65rem;cursor:pointer}
        .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:8px 12px}
        .stat-card{background:var(--card);padding:6px 3px;border-radius:8px;text-align:center;border:1px solid var(--border)}.stat-card .count{font-size:1.1rem;font-weight:700}.stat-card .label{font-size:.45rem;color:var(--muted);text-transform:uppercase;margin-top:1px}
        .count.red{color:var(--red)}.count.green{color:var(--green)}.count.blue{color:var(--blue)}.count.yellow{color:var(--yellow)}.count.purple{color:var(--purple)}.count.cyan{color:var(--cyan)}.count.orange{color:var(--orange)}.count.pink{color:var(--pink)}
        .tabs{display:flex;gap:1px;padding:0 8px;margin-bottom:6px;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{padding:5px 7px;border-radius:14px;font-size:.58rem;white-space:nowrap;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-weight:500}.tab.active{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:600}
        .content{padding:0 10px}.panel{display:none}.panel.active{display:block}
        .entry-card{background:var(--card);border-radius:8px;padding:8px;margin-bottom:5px;border:1px solid var(--border);border-left:3px solid var(--border)}
        .diary-card{border-left-color:var(--blue)}.inspection-card{border-left-color:var(--green)}.ncr-card{border-left-color:var(--red)}.instruction-card{border-left-color:var(--yellow)}.concrete-card{border-left-color:var(--cyan)}.attendance-card{border-left-color:var(--purple)}.material-card{border-left-color:var(--orange)}.rfi-card{border-left-color:var(--pink)}.drawing-card{border-left-color:var(--blue)}.delay-card{border-left-color:var(--red)}.test-card{border-left-color:var(--green)}
        .entry-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;gap:3px}.entry-title{font-weight:600;font-size:.75rem}
        .badge{font-size:.5rem;padding:2px 5px;border-radius:6px;font-weight:600;white-space:nowrap}.badge-pass{background:rgba(63,185,80,.15);color:var(--green)}.badge-fail{background:rgba(248,81,73,.15);color:var(--red)}.badge-open{background:rgba(248,81,73,.15);color:var(--red)}.badge-closed{background:rgba(63,185,80,.15);color:var(--green)}.badge-pending{background:rgba(210,153,29,.15);color:var(--yellow)}.badge-info{background:rgba(88,166,255,.15);color:var(--blue)}.badge-low{background:rgba(255,140,66,.15);color:var(--orange)}
        .entry-meta{font-size:.58rem;color:var(--muted);margin-bottom:3px;display:flex;flex-wrap:wrap;gap:6px}.entry-desc{font-size:.68rem;line-height:1.3;color:#c9d1d9}.entry-section{background:var(--bg);border-radius:5px;padding:5px 6px;margin-top:3px;font-size:.63rem}.section-label{font-size:.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
        .fab{position:fixed;bottom:18px;right:18px;width:46px;height:46px;border-radius:50%;background:var(--accent);color:#0d1117;border:none;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 14px rgba(247,129,102,.3);z-index:200;font-weight:700}.fab:active{transform:scale(.92)}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end}.modal{background:var(--card);width:100%;border-radius:16px 16px 0 0;padding:14px;max-height:85vh;overflow-y:auto;border:1px solid var(--border)}.modal h2{font-size:.85rem;margin-bottom:10px;color:var(--accent)}
        .form-group{margin-bottom:7px}.form-group label{display:block;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;font-weight:600}.modal input,.modal textarea,.modal select{width:100%;padding:7px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.72rem;font-family:inherit}.modal textarea{min-height:50px;resize:vertical}.btn-row{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}.btn{padding:7px 12px;border-radius:7px;border:none;font-weight:600;font-size:.7rem;cursor:pointer;flex:1;min-width:50px}.btn-primary{background:var(--accent);color:#0d1117}.btn-secondary{background:var(--border);color:var(--text)}.btn-small{padding:3px 7px;font-size:.55rem;border-radius:4px;flex:0}
        .report-preview{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:monospace;font-size:.6rem;line-height:1.5;white-space:pre-wrap;max-height:45vh;overflow-y:auto}
        .search-bar{margin-bottom:6px}.search-bar input{width:100%;padding:7px 10px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.72rem}
        .empty-state{text-align:center;padding:25px 10px;color:var(--muted)}.empty-state .icon{font-size:1.8rem;margin-bottom:6px;opacity:.5}
        .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--green);color:#0d1117;padding:5px 14px;border-radius:14px;font-weight:600;font-size:.65rem;z-index:400;animation:toastIn .3s ease}@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        .settings-panel{display:none;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:6px}.settings-panel.show{display:block}
        .sig-pad{border:2px dashed var(--border);border-radius:6px;width:100%;height:100px;background:var(--bg);touch-action:none;cursor:crosshair}
        .progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}.progress-fill{height:100%;border-radius:2px}
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;font-size:.65rem}
        .calendar-day{padding:6px 2px;border-radius:4px;cursor:pointer}.calendar-day:hover{background:var(--border)}.calendar-day.today{background:var(--accent);color:#0d1117;font-weight:700}.calendar-day.has-entry{background:var(--blue);color:#fff}
        .chart-bar{display:flex;align-items:end;gap:2px;height:60px}.chart-bar div{flex:1;border-radius:2px 2px 0 0;min-width:8px}
        @media print{body{background:#fff;color:#000}.header,.stats-row,.tabs,.fab,.btn,.search-bar,.modal-overlay,.toast,.settings-panel{display:none!important}.panel{display:none!important}#panel-report{display:block!important}.report-preview{background:#fff;border:none;color:#000;max-height:none;overflow:visible}}
        @media(min-width:600px){.content{max-width:700px;margin:0 auto}.stats-row{max-width:700px;margin:0 auto}}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row"><h1>🦺 CoW Log Pro</h1><div style="display:flex;align-items:center;gap:4px;"><button class="settings-toggle" id="settingsToggle">⚙️</button><span class="date" id="currentDate"></span></div></div>
        <div class="settings-panel" id="settingsPanel"><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:.65rem;"><div><div class="section-label">Project</div><input type="text" id="projectName"></div><div><div class="section-label">Contract No</div><input type="text" id="contractNo"></div><div><div class="section-label">Contractor</div><input type="text" id="contractorName"></div><div><div class="section-label">Default Location</div><input type="text" id="defaultLocation"></div><div><div class="section-label">CoW Name</div><input type="text" id="cowName"></div><div><div class="section-label">PIN (4 digits)</div><input type="password" id="appPin" maxlength="4" placeholder="0000=off"></div><div style="grid-column:1/-1;"><button class="btn btn-primary btn-small" onclick="saveProjectSettings()">💾 Save</button><button class="btn btn-secondary btn-small" onclick="restoreData()" style="margin-left:4px;">📥 Restore</button></div></div></div>
        <div id="compactInfo" style="font-size:.58rem;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap;"><span>🏗️ <strong id="displayProject">—</strong></span><span>👷 <strong id="displayContractor">—</strong></span></div>
    </div>
    <div class="stats-row"><div class="stat-card"><div class="count blue" id="diaryCount">0</div><div class="label">Diary</div></div><div class="stat-card"><div class="count green" id="inspectionCount">0</div><div class="label">Insp</div></div><div class="stat-card"><div class="count red" id="ncrCount">0</div><div class="label">NCRs</div></div><div class="stat-card"><div class="count orange" id="matLowCount">0</div><div class="label">Stock</div></div><div class="stat-card"><div class="count pink" id="rfiCount">0</div><div class="label">RFIs</div></div></div>
    <div class="tabs"><button class="tab active" data-tab="diary">📔</button><button class="tab" data-tab="inspections">✅</button><button class="tab" data-tab="ncr">🚨</button><button class="tab" data-tab="instructions">📋</button><button class="tab" data-tab="rfi">📤RFI</button><button class="tab" data-tab="drawings">📐Dwgs</button><button class="tab" data-tab="materials">🧱</button><button class="tab" data-tab="concrete">🧪</button><button class="tab" data-tab="tests">🔬Tests</button><button class="tab" data-tab="delays">🚧Delay</button><button class="tab" data-tab="attendance">👷</button><button class="tab" data-tab="photos">📸</button><button class="tab" data-tab="calendar">📅</button><button class="tab" data-tab="report">📄</button></div>
    <div class="content">
        <div class="panel active" id="panel-diary"><div class="search-bar"><input type="text" placeholder="🔍 Search..." id="diarySearch"></div><div id="diaryEntries"></div></div>
        <div class="panel" id="panel-inspections"><div id="inspectionEntries"></div></div>
        <div class="panel" id="panel-ncr"><div id="ncrEntries"></div></div>
        <div class="panel" id="panel-instructions"><div id="instructionEntries"></div></div>
        <div class="panel" id="panel-rfi"><div id="rfiEntries"></div></div>
        <div class="panel" id="panel-drawings"><div id="drawingEntries"></div></div>
        <div class="panel" id="panel-materials"><div id="materialEntries"></div></div>
        <div class="panel" id="panel-concrete"><div id="concreteEntries"></div></div>
        <div class="panel" id="panel-tests"><div id="testEntries"></div></div>
        <div class="panel" id="panel-delays"><div id="delayEntries"></div></div>
        <div class="panel" id="panel-attendance"><div id="attendanceEntries"></div></div>
        <div class="panel" id="panel-photos"><div id="photoGallery"></div></div>
        <div class="panel" id="panel-calendar"><div id="calendarView"></div></div>
        <div class="panel" id="panel-report"><div id="reportContent"></div></div>
    </div>
    <button class="fab" id="fabBtn">+</button>
    <div id="modalContainer"></div><div id="toastContainer"></div><div id="mediaViewer"></div>
    <div id="pinOverlay" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:1000;flex-direction:column;align-items:center;justify-content:center;"><div style="font-size:2.5rem;margin-bottom:12px;">🔐</div><p style="color:var(--muted);margin-bottom:6px;">Enter PIN</p><div style="display:flex;gap:6px;justify-content:center;margin:12px 0;" id="pinDots"><div style="width:10px;height:10px;border-radius:50%;border:2px solid var(--border);" class="pin-dot"></div><div style="width:10px;height:10px;border-radius:50%;border:2px solid var(--border);" class="pin-dot"></div><div style="width:10px;height:10px;border-radius:50%;border:2px solid var(--border);" class="pin-dot"></div><div style="width:10px;height:10px;border-radius:50%;border:2px solid var(--border);" class="pin-dot"></div></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:250px;" id="pinPad"></div><button class="btn btn-small btn-secondary" style="margin-top:10px;" onclick="resetPin()">Clear</button></div>

    <script>
    // ============================================
    // COMPLETE DATA STORE
    // ============================================
    const MK='cowlog_media_v8',AK='cowlog_app_v8',PK='cowlog_project_v6';
    function loadProject(){try{const r=localStorage.getItem(PK);return r?JSON.parse(r):{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'CoW',weather:'☀️ Sunny',reportCounter:1,pin:'',lastBackup:''};}catch(e){return{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'CoW',weather:'☀️ Sunny',reportCounter:1,pin:'',lastBackup:''};}}
    function saveProject(p){localStorage.setItem(PK,JSON.stringify(p));}
    let project=loadProject();
    function loadMedia(){try{const r=localStorage.getItem(MK);return r?JSON.parse(r):[];}catch(e){return[];}}
    function saveMedia(arr){if(arr.length>50)arr=arr.slice(-35);try{localStorage.setItem(MK,JSON.stringify(arr));}catch(e){}}
    function loadApp(){try{const r=localStorage.getItem(AK);return r?JSON.parse(r):{diary:[],inspections:[],ncrs:[],instructions:[],rfis:[],drawings:[],materials:[],materialLog:[],concrete:[],materialTests:[],delays:[],attendance:[],dailyReports:[]};}catch(e){return{diary:[],inspections:[],ncrs:[],instructions:[],rfis:[],drawings:[],materials:[],materialLog:[],concrete:[],materialTests:[],delays:[],attendance:[],dailyReports:[]};}}
    function saveApp(d){localStorage.setItem(AK,JSON.stringify(d));}
    let media=loadMedia(),app=loadApp(),pendingMedia=[];
    window._report='';
    function genId(p){return p+'-'+Date.now()+'-'+Math.random().toString(36).substr(2,5);}
    function fmt(ts){return new Date(ts).toLocaleString('en-KE',{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
    function fmtDate(ts){return new Date(ts).toLocaleDateString('en-KE',{year:'numeric',month:'short',day:'numeric'});}
    function today(){return new Date().toISOString().split('T')[0];}
    function toast(msg){const c=document.getElementById('toastContainer');c.innerHTML='<div class="toast">'+msg+'</div>';setTimeout(()=>c.innerHTML='',2000);}
    function loc(){return project.defaultLocation||'Site';}
    function contractor(){return project.contractorName||'Contractor';}
    function updateStats(){
        document.getElementById('diaryCount').textContent=app.diary.length;
        document.getElementById('inspectionCount').textContent=app.inspections.length;
        document.getElementById('ncrCount').textContent=app.ncrs.filter(n=>n.status==='open').length;
        document.getElementById('matLowCount').textContent=app.materials.filter(m=>parseFloat(m.currentStock||0)<=parseFloat(m.minStock||0)).length;
        document.getElementById('rfiCount').textContent=app.rfis.filter(r=>r.status==='open').length;
    }
    function populateProjectFields(){document.getElementById('projectName').value=project.projectName||'';document.getElementById('contractNo').value=project.contractNo||'';document.getElementById('contractorName').value=project.contractorName||'';document.getElementById('defaultLocation').value=project.defaultLocation||'';document.getElementById('cowName').value=project.cowName||'';document.getElementById('appPin').value=project.pin||'';updateCompactDisplay();}
    function updateCompactDisplay(){document.getElementById('displayProject').textContent=project.projectName||'—';document.getElementById('displayContractor').textContent=project.contractorName||'—';}
    function saveProjectSettings(){project.projectName=document.getElementById('projectName').value.trim();project.contractNo=document.getElementById('contractNo').value.trim();project.contractorName=document.getElementById('contractorName').value.trim();project.defaultLocation=document.getElementById('defaultLocation').value.trim();project.cowName=document.getElementById('cowName').value.trim()||'CoW';project.pin=document.getElementById('appPin').value.trim();saveProject(project);updateCompactDisplay();document.getElementById('settingsPanel').classList.remove('show');toast('✅ Saved!');setupPinLock();}
    document.addEventListener('DOMContentLoaded',()=>{document.getElementById('settingsToggle').addEventListener('click',()=>{const p=document.getElementById('settingsPanel');p.classList.toggle('show');if(p.classList.contains('show'))populateProjectFields();});});

    // PIN LOCK
    let pinEntry='';
    function setupPinLock(){if(project.pin&&project.pin.length===4){document.getElementById('pinOverlay').style.display='flex';buildPinPad();}else{document.getElementById('pinOverlay').style.display='none';}}
    function buildPinPad(){const pad=document.getElementById('pinPad');pad.innerHTML=[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(n=>'<button class="pin-btn" style="aspect-ratio:1;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1rem;cursor:pointer;" onclick="'+(n==='⌫'?'pinBackspace()':n===''?'return':'pinPress(\''+n+'\')')+'">'+n+'</button>').join('');}
    function pinPress(d){if(pinEntry.length>=4)return;pinEntry+=d;updatePinDots();if(pinEntry.length===4)checkPin();}
    function pinBackspace(){pinEntry=pinEntry.slice(0,-1);updatePinDots();}
    function resetPin(){pinEntry='';updatePinDots();}
    function updatePinDots(){document.querySelectorAll('#pinDots .pin-dot').forEach((d,i)=>{d.style.background=i<pinEntry.length?'var(--accent)':'transparent';d.style.borderColor=i<pinEntry.length?'var(--accent)':'var(--border)';});}
    function checkPin(){if(pinEntry===project.pin){document.getElementById('pinOverlay').style.display='none';pinEntry='';updatePinDots();}else{toast('❌ Wrong PIN');setTimeout(resetPin,500);}}

    // MEDIA
    function openCamera(){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.setAttribute('capture','environment');inp.style.display='none';document.body.appendChild(inp);inp.addEventListener('change',async function(){for(let f of this.files)await processFile(f);refreshMediaPreview();toast('📸 '+this.files.length+' captured');document.body.removeChild(inp);});inp.click();}
    function openGallery(){const inp=document.createElement('input');inp.type='file';inp.accept='image/*,video/*';inp.multiple=true;inp.style.display='none';document.body.appendChild(inp);inp.addEventListener('change',async function(){for(let f of this.files)await processFile(f);refreshMediaPreview();toast('🖼️ '+this.files.length+' added');document.body.removeChild(inp);});inp.click();}
    function processFile(file){return new Promise(resolve=>{const reader=new FileReader();reader.onload=function(e){let dataUrl=e.target.result;const type=file.type.startsWith('video/')?'video':'image';if(type==='image'&&dataUrl.length>150000){const img=new Image();img.onload=function(){const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>700){h=Math.round(h*(700/w));w=700;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);dataUrl=c.toDataURL('image/jpeg',0.4);addPending(dataUrl,type,file.name);resolve();};img.src=dataUrl;}else{addPending(dataUrl,type,file.name);resolve();}};reader.readAsDataURL(file);});}
    function addPending(dataUrl,type,name){pendingMedia.push({id:genId('med'),type,dataUrl,fileName:name||'photo.jpg',timestamp:new Date().toISOString(),label:'',entryId:null});}
    function refreshMediaPreview(){const c=document.getElementById('mediaPreviewContainer');if(!c){setTimeout(refreshMediaPreview,100);return;}if(!pendingMedia.length){c.innerHTML='<p style="font-size:.6rem;color:var(--muted);text-align:center;padding:6px;">Tap 📷 or 🖼️</p>';return;}c.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:3px;">'+pendingMedia.map((m,i)=>'<div style="width:50px;height:50px;border-radius:5px;overflow:hidden;position:relative;"><img src="'+m.dataUrl+'" style="width:100%;height:100%;object-fit:cover;"><button style="position:absolute;top:1px;right:1px;background:var(--red);color:#fff;width:14px;height:14px;border-radius:50%;border:none;font-size:.45rem;cursor:pointer;" onclick="removePending('+i+')">✕</button></div>').join('')+'</div>';}
    function removePending(i){pendingMedia.splice(i,1);refreshMediaPreview();}
    function commitMedia(entryId){if(!pendingMedia.length)return;pendingMedia.forEach(m=>{m.entryId=entryId;media.push({...m});});saveMedia(media);pendingMedia=[];updateStats();}

    // ============================================
    // ALL RENDERERS
    // ============================================
    function renderDiary(filter=''){const c=document.getElementById('diaryEntries');let entries=app.diary;if(filter){const q=filter.toLowerCase();entries=entries.filter(e=>e.title.toLowerCase().includes(q)||e.description.toLowerCase().includes(q));}entries.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));if(!entries.length){c.innerHTML='<div class="empty-state"><div class="icon">📔</div><p>No diary entries</p></div>';return;}c.innerHTML=entries.map(e=>{const em=media.filter(m=>m.entryId===e.id);const colors={'Work in Progress':'badge-info','Material Delivery':'badge-pending','Inspection':'badge-pass','Meeting':'badge-pending','Delay/Issue':'badge-fail','General':'badge-closed'};return '<div class="entry-card diary-card"><div class="entry-header"><span class="entry-title">📔 '+e.title+'</span>'+(e.activityType?'<span class="badge '+(colors[e.activityType]||'badge-info')+'">'+e.activityType+'</span>':'')+'</div><div class="entry-meta"><span>'+fmt(e.timestamp)+'</span><span>📍 '+e.location+'</span></div><div class="entry-desc">'+e.description.replace(/\n/g,'<br>')+'</div>'+(e.issuesIdentified?'<div class="entry-section" style="border-left:3px solid var(--red);"><div class="section-label">⚠️ Issues</div>'+e.issuesIdentified+'</div>':'')+'<div style="margin-top:3px;display:flex;gap:3px;"><button class="btn btn-small btn-secondary" onclick="addMediaToEntry(\''+e.id+'\')">📸</button><button class="btn btn-small btn-primary" onclick="editDiary(\''+e.id+'\')">✏️</button><button class="btn btn-small btn-secondary" onclick="deleteEntry(\'diary\',\''+e.id+'\')">🗑️</button></div></div>';}).join('');}

    // SIGNATURE CAPTURE
    function showSignaturePad(callback){
        let drawing=false;
        const h='<div class="form-group"><label>Sign below</label><canvas id="sigCanvas" class="sig-pad" width="300" height="100"></canvas></div><div style="display:flex;gap:4px;"><button class="btn btn-secondary btn-small" onclick="clearSig()">Clear</button></div>';
        showModal('✍️ Signature',h,()=>{
            const canvas=document.getElementById('sigCanvas');
            if(!canvas)return;
            const sigData=canvas.toDataURL('image/png');
            callback(sigData);
        });
        setTimeout(()=>{
            const canvas=document.getElementById('sigCanvas');
            if(!canvas)return;
            const ctx=canvas.getContext('2d');
            ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.lineCap='round';
            canvas.addEventListener('touchstart',e=>{drawing=true;ctx.beginPath();ctx.moveTo(e.touches[0].clientX-canvas.getBoundingClientRect().left,e.touches[0].clientY-canvas.getBoundingClientRect().top);e.preventDefault();});
            canvas.addEventListener('touchmove',e=>{if(!drawing)return;ctx.lineTo(e.touches[0].clientX-canvas.getBoundingClientRect().left,e.touches[0].clientY-canvas.getBoundingClientRect().top);ctx.stroke();e.preventDefault();});
            canvas.addEventListener('touchend',()=>{drawing=false;});
            canvas.addEventListener('mousedown',e=>{drawing=true;ctx.beginPath();ctx.moveTo(e.offsetX,e.offsetY);});
            canvas.addEventListener('mousemove',e=>{if(!drawing)return;ctx.lineTo(e.offsetX,e.offsetY);ctx.stroke();});
            canvas.addEventListener('mouseup',()=>{drawing=false;});
        },300);
    }
    function clearSig(){const c=document.getElementById('sigCanvas');if(c)c.getContext('2d').clearRect(0,0,c.width,c.height);}

    // CALENDAR VIEW
    function renderCalendar(){
        const c=document.getElementById('calendarView');
        const now=new Date();const month=now.getMonth();const year=now.getFullYear();
        const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();
        const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        let h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><button class="btn btn-small btn-secondary" onclick="changeMonth(-1)">◀</button><strong>'+months[month]+' '+year+'</strong><button class="btn btn-small btn-secondary" onclick="changeMonth(1)">▶</button></div>';
        h+='<div class="calendar-grid"><div style="font-size:.5rem;color:var(--muted);">Sun</div><div style="font-size:.5rem;color:var(--muted);">Mon</div><div style="font-size:.5rem;color:var(--muted);">Tue</div><div style="font-size:.5rem;color:var(--muted);">Wed</div><div style="font-size:.5rem;color:var(--muted);">Thu</div><div style="font-size:.5rem;color:var(--muted);">Fri</div><div style="font-size:.5rem;color:var(--muted);">Sat</div>';
        for(let i=0;i<firstDay;i++)h+='<div></div>';
        for(let d=1;d<=daysInMonth;d++){const ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');const hasDiary=app.diary.some(e=>e.timestamp.startsWith(ds));const hasInsp=app.inspections.some(e=>e.timestamp.startsWith(ds));const cls=(ds===today()?'today':'')+(hasDiary||hasInsp?' has-entry':'');h+='<div class="calendar-day '+cls+'" onclick="showDayEntries(\''+ds+'\')" title="'+ds+'">'+d+'</div>';}
        h+='</div><div id="dayEntries" style="margin-top:8px;"></div>';
        c.innerHTML=h;window._calMonth=month;window._calYear=year;
    }
    function changeMonth(dir){let m=(window._calMonth||new Date().getMonth())+dir;let y=(window._calYear||new Date().getFullYear());if(m<0){m=11;y--;}if(m>11){m=0;y++;}window._calMonth=m;window._calYear=y;const now=new Date();now.setMonth(m);now.setFullYear(y);const fake=new Date();fake.setMonth(m);fake.setFullYear(y);renderCalendar();}
    function showDayEntries(ds){const diary=app.diary.filter(e=>e.timestamp.startsWith(ds));const insp=app.inspections.filter(e=>e.timestamp.startsWith(ds));const c=document.getElementById('dayEntries');if(!diary.length&&!insp.length){c.innerHTML='<p style="font-size:.65rem;color:var(--muted);text-align:center;padding:8px;">No entries for '+fmtDate(ds)+'</p>';return;}let h='<div class="section-label">📅 '+fmtDate(ds)+'</div>';diary.forEach(e=>{h+='<div class="entry-card diary-card"><div class="entry-header"><span class="entry-title">📔 '+e.title+'</span></div><div class="entry-desc">'+e.description.substring(0,100)+'</div></div>';});insp.forEach(e=>{h+='<div class="entry-card inspection-card"><div class="entry-header"><span class="entry-title">✅ '+e.checklistType+'</span><span class="badge '+(e.result==='pass'?'badge-pass':'badge-fail')+'">'+e.result.toUpperCase()+'</span></div></div>';});c.innerHTML=h;}

    // MATERIALS (abbreviated from v8)
    function renderMaterials(){const c=document.getElementById('materialEntries');if(!app.materials.length){c.innerHTML='<div class="empty-state"><div class="icon">🧱</div><p>No materials</p><button class="btn btn-primary btn-small" onclick="showMaterialForm()">➕ Add</button></div>';return;}let h='<div style="display:flex;gap:3px;margin-bottom:6px;"><button class="btn btn-primary btn-small" onclick="showMaterialForm()">➕</button><button class="btn btn-secondary btn-small" onclick="showMaterialUseForm()">📝 Use</button><button class="btn btn-secondary btn-small" onclick="showMaterialDeliveryForm()">🚚 In</button></div><div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:.6rem;"><thead><tr style="color:var(--muted);font-size:.5rem;"><th>Material</th><th>Stock</th><th>Min</th><th></th></tr></thead><tbody>';app.materials.sort((a,b)=>a.name.localeCompare(b.name)).forEach(m=>{const stock=parseFloat(m.currentStock||0),min=parseFloat(m.minStock||0);const pct=min>0?Math.min(100,(stock/min)*100):100;const cls=stock<=0?'stock-out':stock<=min?'stock-low':'';h+='<tr><td><strong>'+m.name+'</strong></td><td class="'+cls+'">'+stock+'</td><td>'+min+'</td><td><button class="btn btn-small btn-primary" onclick="quickUse(\''+m.id+'\')">-</button> <button class="btn btn-small btn-secondary" onclick="quickDeliver(\''+m.id+'\')">+</button></td></tr>';h+='<tr><td colspan="4"><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+(stock<=0?'var(--red)':stock<=min?'var(--orange)':'var(--green)')+';"></div></div></td></tr>';});h+='</tbody></table></div>';c.innerHTML=h;}
    function showMaterialForm(eid=null){const ex=eid?app.materials.find(m=>m.id===eid):null;const h='<div class="form-group"><label>Name *</label><input type="text" id="mn" value="'+(ex?ex.name:'')+'"></div><div class="form-group"><label>Unit</label><select id="mu"><option>Bags (50kg)</option><option>Tonnes</option><option>m³</option><option>Pieces</option><option>Litres</option><option>m²</option></select></div><div class="form-group"><label>Initial Stock</label><input type="number" id="ms" value="'+(ex?ex.initialStock:'0')+'" step="any"></div><div class="form-group"><label>Min Stock</label><input type="number" id="mmin" value="'+(ex?ex.minStock:'0')+'" step="any"></div>';showModal(ex?'Edit Material':'🧱 Add Material',h,()=>{const n=document.getElementById('mn').value.trim();if(!n){alert('Name required');return false;}const entry={id:ex?ex.id:genId('mat'),name:n,unit:document.getElementById('mu').value,initialStock:parseFloat(document.getElementById('ms').value)||0,currentStock:ex?ex.currentStock:parseFloat(document.getElementById('ms').value)||0,minStock:parseFloat(document.getElementById('mmin').value)||0};if(ex){const i=app.materials.findIndex(m=>m.id===eid);if(i>-1)app.materials[i]=entry;}else{app.materials.push(entry);}saveApp(app);});}

    function renderReport(){
        const td=today();const dt=app.diary.filter(e=>e.timestamp.startsWith(td));const it=app.inspections.filter(e=>e.timestamp.startsWith(td));const no=app.ncrs.filter(e=>e.status==='open');const si=app.instructions.filter(e=>e.timestamp.startsWith(td));const at=app.attendance.filter(e=>e.date===td);const ct=app.concrete.filter(e=>e.pourDate===td);const cd=app.concrete.filter(e=>{const d28=new Date(e.pourDate);d28.setDate(d28.getDate()+28);return td>=d28.toISOString().split('T')[0]&&!e.result28;});const ml=app.materialLog.filter(e=>e.date===td);const lowMat=app.materials.filter(m=>parseFloat(m.currentStock||0)<=parseFloat(m.minStock||0));const rfiOpen=app.rfis.filter(r=>r.status==='open');const delays=app.delays.filter(e=>e.date===td);const tests=app.materialTests.filter(e=>e.testDate===td);
        const rdate=new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        const pn=project.projectName||'Project',con=project.contractorName||'N/A',rn='COW-'+String(project.reportCounter||1).padStart(3,'0');
        let tr='══════════════════════════════\n  CLERK OF WORKS — DAILY REPORT\n══════════════════════════════\n\nREPORT: '+rn+'  DATE: '+rdate+'\nPROJECT: '+pn+'  CONTRACTOR: '+con+'\n\n';
        tr+='1. WORK PROGRESS\n';dt.length?dt.forEach((e,i)=>{tr+='\n'+(i+1)+'. '+e.title+'\n   '+e.description.substring(0,150)+'\n';}):tr+='\n   No entries.\n';
        tr+='\n2. INSPECTIONS ('+it.length+')\n';it.length?it.forEach(e=>{tr+='   '+e.checklistType+' — '+e.result.toUpperCase()+'\n';}):tr+='   None.\n';
        tr+='\n3. NCRs — Open: '+no.length+'\n';no.length?no.forEach(e=>{tr+='   • NCR-'+e.id.split('-')[1]+': '+e.title+'\n';}):tr+='   None.\n';
        tr+='\n4. RFIs — Open: '+rfiOpen.length+'\n';rfiOpen.length?rfiOpen.forEach(e=>{tr+='   • RFI-'+e.id.split('-')[1]+': '+e.subject+'\n';}):tr+='   None.\n';
        tr+='\n5. ATTENDANCE — Total: '+(at.reduce((s,e)=>s+(parseInt(e.count)||0),0)||0)+'\n';
        tr+='\n6. MATERIALS\n   Used today: '+ml.filter(l=>l.type==='usage').reduce((s,l)=>s+parseFloat(l.quantity||0),0)+'\n   Deliveries: '+ml.filter(l=>l.type==='delivery').length+'\n';
        if(lowMat.length){tr+='   ⚠️ LOW STOCK:\n';lowMat.forEach(m=>{tr+='   • '+m.name+': '+m.currentStock+' '+m.unit+'\n';});}
        tr+='\n7. CONCRETE — Pending 28-day: '+cd.length+'\n';cd.length?cd.forEach(e=>{tr+='   • '+e.cubeId+' — '+fmtDate(e.pourDate)+'\n';}):tr+='   None.\n';
        if(delays.length){tr+='\n8. DELAYS ('+delays.length+')\n';delays.forEach(e=>{tr+='   • '+e.cause+' — '+e.duration+' days ['+e.impact+']\n';});}
        if(tests.length){tr+='\n9. MATERIAL TESTS ('+tests.length+')\n';tests.forEach(e=>{tr+='   • '+e.material+' — '+e.testType+' ['+e.result+']\n';});}
        tr+='\n══════════════════════════════\n  '+(project.cowName||'CoW')+'\n';
        window._report=tr;
        document.getElementById('reportContent').innerHTML='<div style="display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap;"><button class="btn btn-small btn-primary" onclick="copyReport()">📋 Copy</button><button class="btn btn-small btn-secondary" onclick="printReport()">🖨️ Print</button><button class="btn btn-small btn-secondary" onclick="shareWA(window._report)">📱 WhatsApp</button><button class="btn btn-small btn-secondary" onclick="saveReport()">💾 Save</button><button class="btn btn-small btn-secondary" onclick="backupData()">💾 Backup</button></div><div class="report-preview">'+tr+'</div>';
    }

odal();">Cancel</button></div></div>';document.getElementById('fo').addEventListener('click',e=>{if(e.target.id==='fo')closeModal();});}

    function deleteEntry(type,id){if(!confirm('Delete?'))return;app[type]=app[type].filter(e=>e.id!==id);saveApp(app);refreshAll();}
    function closeNCR(id){const n=app.ncrs.find(n=>n.id===id);const c=prompt('Closeout comment:');if(c===null)return;n.status='closed';n.closeoutComment=c;n.closedDate=new Date().toISOString();saveApp(app);refreshAll();}
    function ackSI(id){const s=app.instructions.find(s=>s.id===id);s.status='acknowledged';s.acknowledgedDate=new Date().toISOString();saveApp(app);refreshAll();}
    function copyReport(){navigator.clipboard.writeText(window._report||'').then(()=>toast('📋 Copied!'));}
    function printReport(){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelector('[data-tab="report"]').classList.add('active');document.getElementById('panel-report').classList.add('active');renderReport();setTimeout(()=>window.print(),400);}
    function saveReport(){project.reportCounter=(project.reportCounter||1)+1;saveProject(project);app.dailyReports.push({id:genId('rpt'),content:window._report||'',date:today(),timestamp:new Date().toISOString()});saveApp(app);toast('💾 Saved!');}
    function shareWA(text){window.open('https://wa.me/?text='+encodeURIComponent(text.substring(0,1500)),'_blank');}
    function backupData(){const backup={project,app,media,date:new Date().toISOString()};const blob=new Blob([JSON.stringify(backup)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='cowlog-backup-'+today()+'.json';a.click();project.lastBackup=today();saveProject(project);toast('💾 Backup!');}
    function restoreData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.style.display='none';document.body.appendChild(inp);inp.addEventListener('change',function(){const reader=new FileReader();reader.onload=function(e){try{const data=JSON.parse(e.target.result);if(!data.project||!data.app){alert('Invalid');return;}if(!confirm('Restore from '+data.date+'?'))return;project=data.project;app=data.app;media=data.media||[];saveProject(project);saveApp(app);saveMedia(media);refreshAll();populateProjectFields();updateCompactDisplay();toast('✅ Restored!');}catch(err){alert('Error');}};reader.readAsText(this.files[0]);document.body.removeChild(inp);});inp.click();}

    function init(){
        document.getElementById('currentDate').textContent=new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        populateProjectFields();updateCompactDisplay();setupPinLock();
        document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');const panel=document.getElementById('panel-'+tab.dataset.tab);if(panel)panel.classList.add('active');if(tab.dataset.tab==='report')renderReport();if(tab.dataset.tab==='calendar')renderCalendar();if(tab.dataset.tab==='materials')renderMaterials();if(tab.dataset.tab==='concrete')renderConcrete();if(tab.dataset.tab==='attendance')renderAttendance();if(tab.dataset.tab==='rfi')renderRFIs();if(tab.dataset.tab==='drawings')renderDrawings();if(tab.dataset.tab==='tests')renderTests();if(tab.dataset.tab==='delays')renderDelays();if(tab.dataset.tab==='photos')renderPhotos();});});
        document.getElementById('fabBtn').addEventListener('click',showFABMenu);
        document.getElementById('diarySearch').addEventListener('input',e=>renderDiary(e.target.value));
        refreshAll();
    }
    document.addEventListener('DOMContentLoaded',init);
    </script>
</body>
</html>
