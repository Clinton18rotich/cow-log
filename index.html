<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CoW Log Pro</title><meta name="theme-color" content="#0a0a0f"><link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        :root{
            --bg:#0a0a0f;--surface:#131320;--surface2:#1a1a2e;--border:#252540;
            --text:#f0f0f5;--text2:#a0a0b8;--text3:#606078;
            --accent:#6c5ce7;--accent2:#a29bfe;--accent-glow:rgba(108,92,231,0.3);
            --green:#00d2a0;--green-bg:rgba(0,210,160,0.1);
            --red:#ff4757;--red-bg:rgba(255,71,87,0.1);
            --yellow:#ffa502;--yellow-bg:rgba(255,165,2,0.1);
            --blue:#4dabf7;--blue-bg:rgba(77,171,247,0.1);
            --purple:#a29bfe;--orange:#ff7f50;
            --radius:16px;--radius-sm:10px;--radius-xs:6px;
            --shadow:0 4px 24px rgba(0,0,0,0.3);--shadow-lg:0 8px 40px rgba(0,0,0,0.5);
            --transition:0.2s cubic-bezier(0.4,0,0.2,1);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
        
        /* Header */
        .header{background:linear-gradient(180deg,var(--surface) 0%,transparent 100%);padding:20px 16px 12px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
        .header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .logo{display:flex;align-items:center;gap:10px}
        .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;box-shadow:0 4px 16px var(--accent-glow)}
        .logo-text h1{font-size:1.1rem;font-weight:700;letter-spacing:-0.3px;background:linear-gradient(135deg,var(--text),var(--text2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .logo-text span{font-size:.65rem;color:var(--text3);font-weight:500}
        .header-actions{display:flex;gap:8px;align-items:center}
        .icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;transition:var(--transition)}
        .icon-btn:active{transform:scale(.92);background:var(--accent);color:#fff;border-color:var(--accent)}

        /* Project bar */
        .project-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
        .project-chip{background:var(--surface2);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:.65rem;color:var(--text2);display:flex;align-items:center;gap:5px;font-weight:500}
        .project-chip .dot{width:6px;height:6px;border-radius:50%}.dot.green{background:var(--green)}.dot.blue{background:var(--blue)}
        .ai-badge{background:linear-gradient(135deg,rgba(162,155,254,.2),rgba(108,92,231,.2));border:1px solid rgba(162,155,254,.3);padding:5px 12px;border-radius:20px;font-size:.6rem;color:var(--accent2);font-weight:600;display:flex;align-items:center;gap:4px}

        /* Stats */
        .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:4px 16px 12px}
        .stat-card{background:var(--surface);border:1px solid var(--border);padding:12px 6px;border-radius:var(--radius-sm);text-align:center;transition:var(--transition);position:relative;overflow:hidden}
        .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:0;transition:var(--transition)}
        .stat-card:hover::before{opacity:1}
        .stat-card .count{font-size:1.5rem;font-weight:800;letter-spacing:-1px}
        .stat-card .label{font-size:.5rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:2px;font-weight:600}
        .count.accent{color:var(--accent2)}.count.green{color:var(--green)}.count.red{color:var(--red)}.count.yellow{color:var(--yellow)}.count.blue{color:var(--blue)}

        /* Tabs */
        .tabs-container{padding:0 16px;margin-bottom:8px}
        .tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:2px;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border)}
        .tabs::-webkit-scrollbar{display:none}
        .tab{padding:8px 14px;border-radius:8px;font-size:.68rem;white-space:nowrap;border:none;background:transparent;color:var(--text3);cursor:pointer;font-weight:500;transition:var(--transition);position:relative}
        .tab.active{background:var(--accent);color:#fff;font-weight:600;box-shadow:0 2px 8px var(--accent-glow)}
        .tab:not(.active):active{background:var(--surface2);color:var(--text)}

        /* Content */
        .content{padding:0 16px}
        .panel{display:none;animation:fadeSlideIn .3s ease}
        .panel.active{display:block}
        @keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

        /* Cards */
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;transition:var(--transition)}
        .card:active{transform:scale(.99)}
        .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
        .card-title{font-weight:600;font-size:.85rem;display:flex;align-items:center;gap:6px}
        .card-subtitle{font-size:.65rem;color:var(--text3);margin-top:2px}
        .badge{font-size:.55rem;padding:4px 8px;border-radius:14px;font-weight:600;letter-spacing:.3px}
        .badge-success{background:var(--green-bg);color:var(--green)}.badge-danger{background:var(--red-bg);color:var(--red)}
        .badge-warning{background:var(--yellow-bg);color:var(--yellow)}.badge-info{background:var(--blue-bg);color:var(--blue)}
        .badge-ai{background:rgba(162,155,254,.15);color:var(--accent2)}
        .card-meta{font-size:.6rem;color:var(--text3);margin-bottom:6px;display:flex;flex-wrap:wrap;gap:10px}
        .card-body{font-size:.72rem;line-height:1.5;color:var(--text2)}
        .card-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}

        /* Buttons */
        .btn{padding:10px 18px;border-radius:var(--radius-xs);border:none;font-weight:600;font-size:.72rem;cursor:pointer;transition:var(--transition);font-family:inherit;display:inline-flex;align-items:center;gap:4px;justify-content:center}
        .btn:active{transform:scale(.95)}
        .btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 12px var(--accent-glow)}
        .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
        .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
        .btn-danger{background:var(--red);color:#fff}
        .btn-success{background:var(--green);color:#000}
        .btn-ai{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 16px var(--accent-glow)}
        .btn-xs{padding:5px 10px;font-size:.6rem;border-radius:6px}
        .btn-sm{padding:7px 14px;font-size:.65rem;border-radius:8px}

        /* Forms */
        .form-group{margin-bottom:10px}
        .form-label{display:block;font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
        .input,.textarea,.select{width:100%;padding:11px 14px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.75rem;font-family:inherit;transition:var(--transition)}
        .input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
        .textarea{min-height:70px;resize:vertical}

        /* FAB */
        .fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;font-size:1.4rem;cursor:pointer;box-shadow:0 4px 20px var(--accent-glow);z-index:200;transition:var(--transition);display:flex;align-items:center;justify-content:center}
        .fab:active{transform:scale(.9) rotate(90deg)}

        /* Modal */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:flex-end;animation:fadeIn .2s ease}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .modal{background:var(--surface);width:100%;border-radius:24px 24px 0 0;padding:20px;max-height:85vh;overflow-y:auto;border:1px solid var(--border);border-bottom:none;box-shadow:var(--shadow-lg)}
        .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
        .modal h2{font-size:.95rem;margin-bottom:14px;font-weight:700}

        /* Toast */
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:24px;font-weight:600;font-size:.7rem;z-index:400;box-shadow:var(--shadow);animation:toastUp .3s ease}
        @keyframes toastUp{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

        /* AI Loading */
        .ai-loading{text-align:center;padding:30px}
        .ai-spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .ai-pulse{animation:pulse 2s ease infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

        /* Empty state */
        .empty-state{text-align:center;padding:40px 20px}
        .empty-icon{width:64px;height:64px;background:var(--surface2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 12px;border:1px solid var(--border)}
        .empty-state h3{font-size:.85rem;margin-bottom:4px}.empty-state p{font-size:.65rem;color:var(--text3)}

        /* Drawing thumbnail */
        .drawing-thumb{width:100%;border-radius:var(--radius-sm);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:var(--transition)}
        .drawing-thumb img{width:100%;display:block}
        .drawing-thumb:active{transform:scale(.98)}

        /* Trade categories */
        .trade-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
        .trade-btn{padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.68rem;text-align:left;cursor:pointer;transition:var(--transition);font-family:inherit;font-weight:500}
        .trade-btn:active{background:var(--accent);border-color:var(--accent);color:#fff}

        .section-title{font-size:.7rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px;font-weight:700}

        /* Report */
        .report-preview{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;font-family:'SF Mono','Fira Code',monospace;font-size:.62rem;line-height:1.6;white-space:pre-wrap;max-height:50vh;overflow-y:auto;color:var(--text2)}

        /* Settings */
        .settings-panel{display:none;margin-bottom:8px}
        .settings-panel.show{display:block}
        .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

        @media(min-width:640px){.content{max-width:640px;margin:0 auto}.header{padding:20px max(16px,calc((100% - 640px)/2)) 12px}.tabs-container{padding:0 max(16px,calc((100% - 640px)/2))}}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div class="logo">
                <div class="logo-icon">🦺</div>
                <div class="logo-text"><h1>CoW Log Pro</h1><span id="currentDate"></span></div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="settingsToggle" title="Settings">⚙️</button>
                <button class="icon-btn" onclick="backupData()" title="Backup">💾</button>
            </div>
        </div>
        <div class="project-bar">
            <div class="project-chip"><span class="dot green"></span> <strong id="displayProject">Project</strong></div>
            <div class="project-chip"><span class="dot blue"></span> <strong id="displayContractor">Contractor</strong></div>
            <div class="project-chip">📍 <span id="displayLocation">Site</span></div>
            <span id="aiStatus"></span>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-grid">
            <div class="form-group"><label class="form-label">Project</label><input class="input" type="text" id="projectName"></div>
            <div class="form-group"><label class="form-label">Contract No</label><input class="input" type="text" id="contractNo"></div>
            <div class="form-group"><label class="form-label">Contractor</label><input class="input" type="text" id="contractorName"></div>
            <div class="form-group"><label class="form-label">Location</label><input class="input" type="text" id="defaultLocation"></div>
            <div class="form-group"><label class="form-label">CoW Name</label><input class="input" type="text" id="cowName"></div>
            <div class="form-group"><label class="form-label">🤖 Gemini API Key</label><input class="input" type="password" id="geminiKey" placeholder="AIzaSy..."></div>
        </div>
        <button class="btn btn-primary btn-sm" style="width:100%;margin-top:8px;" onclick="saveProjectSettings()">💾 Save Settings</button>
        <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:4px;" onclick="restoreData()">📥 Restore from Backup</button>
    </div>

    <div class="stats-row">
        <div class="stat-card"><div class="count blue" id="diaryCount">0</div><div class="label">Diary</div></div>
        <div class="stat-card"><div class="count green" id="inspectionCount">0</div><div class="label">Insp</div></div>
        <div class="stat-card"><div class="count red" id="ncrCount">0</div><div class="label">NCRs</div></div>
        <div class="stat-card"><div class="count yellow" id="matLowCount">0</div><div class="label">Stock</div></div>
        <div class="stat-card"><div class="count accent" id="rfiCount">0</div><div class="label">Drawings</div></div>
    </div>

    <div class="tabs-container">
        <div class="tabs">
            <button class="tab active" data-tab="diary">📔 Diary</button>
            <button class="tab" data-tab="inspections">✅ Inspect</button>
            <button class="tab" data-tab="ncr">🚨 NCR</button>
            <button class="tab" data-tab="instructions">📋 SI</button>
            <button class="tab" data-tab="rfi">📤 RFI</button>
            <button class="tab" data-tab="drawings">📐 DWG</button>
            <button class="tab" data-tab="materials">🧱 Mat</button>
            <button class="tab" data-tab="concrete">🧪 Cube</button>
            <button class="tab" data-tab="report">📄 Report</button>
        </div>
    </div>

    <div class="content">
        <div class="panel active" id="panel-diary"><input class="input" type="text" placeholder="🔍 Search diary entries..." id="diarySearch" style="margin-bottom:8px;"><div id="diaryEntries"></div></div>
        <div class="panel" id="panel-inspections"><div id="inspectionEntries"></div></div>
        <div class="panel" id="panel-ncr"><div id="ncrEntries"></div></div>
        <div class="panel" id="panel-instructions"><div id="instructionEntries"></div></div>
        <div class="panel" id="panel-rfi"><div id="rfiEntries"></div></div>
        <div class="panel" id="panel-drawings"><div id="drawingEntries"></div></div>
        <div class="panel" id="panel-materials"><div id="materialEntries"></div></div>
        <div class="panel" id="panel-concrete"><div id="concreteEntries"></div></div>
        <div class="panel" id="panel-report"><div id="reportContent"></div></div>
    </div>

    <button class="fab" id="fabBtn">+</button>
    <div id="modalContainer"></div>
    <div id="toastContainer"></div>

    <script>
    // DATA STORE
    const MK='cowlog_media_v12',AK='cowlog_app_v12',PK='cowlog_project_v10';
    function loadProject(){try{const r=localStorage.getItem(PK);return r?JSON.parse(r):{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'CoW',geminiKey:'',reportCounter:1};}catch(e){return{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'CoW',geminiKey:'',reportCounter:1};}}
    function saveProject(p){localStorage.setItem(PK,JSON.stringify(p));}
    let project=loadProject();
    function loadApp(){try{const r=localStorage.getItem(AK);return r?JSON.parse(r):{diary:[],inspections:[],ncrs:[],instructions:[],rfis:[],drawings:[],dimensions:[],structuralElements:[],materials:[],materialLog:[],concrete:[],dailyReports:[]};}catch(e){return{diary:[],inspections:[],ncrs:[],instructions:[],rfis:[],drawings:[],dimensions:[],structuralElements:[],materials:[],materialLog:[],concrete:[],dailyReports:[]};}}
    function saveApp(d){localStorage.setItem(AK,JSON.stringify(d));}
    let app=loadApp();
    function genId(p){return p+'-'+Date.now()+'-'+Math.random().toString(36).substr(2,5);}
    function fmt(ts){return new Date(ts).toLocaleString('en-KE',{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
    function fmtDate(ts){return new Date(ts).toLocaleDateString('en-KE',{year:'numeric',month:'short',day:'numeric'});}
    function today(){return new Date().toISOString().split('T')[0];}
    function toast(msg){const c=document.getElementById('toastContainer');c.innerHTML='<div class="toast">'+msg+'</div>';setTimeout(()=>c.innerHTML='',2000);}
    function loc(){return project.defaultLocation||'Site';}
    function hasAI(){return project.geminiKey&&project.geminiKey.length>10;}
    function updateStats(){
        document.getElementById('diaryCount').textContent=app.diary.length;
        document.getElementById('inspectionCount').textContent=app.inspections.length;
        document.getElementById('ncrCount').textContent=app.ncrs.filter(n=>n.status==='open').length;
        document.getElementById('matLowCount').textContent=app.materials.filter(m=>parseFloat(m.currentStock||0)<=parseFloat(m.minStock||0)).length;
        document.getElementById('rfiCount').textContent=app.drawings.length;
    }
    function populateProjectFields(){document.getElementById('projectName').value=project.projectName||'';document.getElementById('contractNo').value=project.contractNo||'';document.getElementById('contractorName').value=project.contractorName||'';document.getElementById('defaultLocation').value=project.defaultLocation||'';document.getElementById('cowName').value=project.cowName||'';document.getElementById('geminiKey').value=project.geminiKey||'';updateCompactDisplay();}
    function updateCompactDisplay(){document.getElementById('displayProject').textContent=project.projectName||'Project';document.getElementById('displayContractor').textContent=project.contractorName||'Contractor';document.getElementById('displayLocation').textContent=project.defaultLocation||'Site';document.getElementById('aiStatus').innerHTML=hasAI()?'<span class="ai-badge">🤖 AI Ready</span>':'';}
    function saveProjectSettings(){project.projectName=document.getElementById('projectName').value.trim();project.contractNo=document.getElementById('contractNo').value.trim();project.contractorName=document.getElementById('contractorName').value.trim();project.defaultLocation=document.getElementById('defaultLocation').value.trim();project.cowName=document.getElementById('cowName').value.trim()||'CoW';project.geminiKey=document.getElementById('geminiKey').value.trim();saveProject(project);updateCompactDisplay();document.getElementById('settingsPanel').classList.remove('show');toast('✅ Settings saved');}
    document.addEventListener('DOMContentLoaded',()=>{document.getElementById('settingsToggle').addEventListener('click',()=>{const p=document.getElementById('settingsPanel');p.classList.toggle('show');if(p.classList.contains('show'))populateProjectFields();});});

    // AI DRAWING ANALYSIS
    async function analyzeDrawingWithAI(drawingId){
        if(!hasAI()){toast('Set Gemini API key in Settings');return;}
        const drawing=app.drawings.find(d=>d.id===drawingId);
        if(!drawing||!drawing.imageData){toast('No drawing image');return;}
        const mc=document.getElementById('modalContainer');
        mc.innerHTML='<div class="modal-overlay"><div class="modal" style="text-align:center;"><div class="modal-handle"></div><h2>🤖 AI Analyzing...</h2><div class="ai-loading"><div class="ai-spinner"></div><p class="ai-pulse" style="color:var(--text2);">Extracting dimensions & structural elements...</p></div></div></div>';
        try{
            const prompt=`Analyze this construction drawing. Return JSON with: drawing_type, scale, dimensions (array of strings), structural_elements (array of {name,size,type}), grid_lines (array), notes (array), materials (array), reinforcement (array). Only JSON.`;
            const img=drawing.imageData.split(',')[1]||drawing.imageData;
            const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${project.geminiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt},{inlineData:{mimeType:'image/jpeg',data:img}}]}],generationConfig:{temperature:0.1}})});
            const d=await r.json();closeModal();
            if(d.error){toast('AI Error: '+d.error.message);return;}
            const txt=d.candidates[0].content.parts[0].text;const jm=txt.match(/\{[\s\S]*\}/);if(!jm){toast('Parse error');return;}
            const ex=JSON.parse(jm[0]);
            if(ex.dimensions)ex.dimensions.forEach(d=>app.dimensions.push({id:genId('dim'),drawingId,label:d,value:'',timestamp:new Date().toISOString()}));
            if(ex.structural_elements)ex.structural_elements.forEach(e=>app.structuralElements.push({id:genId('se'),drawingId,name:e.name||e,size:e.size||'',type:e.type||'',timestamp:new Date().toISOString()}));
            drawing.aiAnalysis={extracted:ex,timestamp:new Date().toISOString()};saveApp(app);
            showAIResults(drawingId,ex);
        }catch(err){closeModal();toast('Error: '+err.message);}
    }
    function showAIResults(drawingId,data){
        const d=app.drawings.find(dw=>dw.id===drawingId);
        let h='<div class="modal-handle"></div><h2>🤖 AI Analysis</h2><p style="color:var(--text3);font-size:.65rem;margin-bottom:12px;">'+d.number+' — '+d.title+'</p>';
        if(data.drawing_type)h+='<div class="card"><div class="card-title">📐 '+data.drawing_type+'</div></div>';
        if(data.scale)h+='<div class="card"><div class="card-title">📏 Scale: '+data.scale+'</div></div>';
        if(data.dimensions&&data.dimensions.length){h+='<div class="card"><div class="card-title">📏 Dimensions ('+data.dimensions.length+')</div>';data.dimensions.forEach(d=>h+='<div style="font-size:.65rem;padding:4px 0;color:var(--text2);">• '+(typeof d==='string'?d:d.label||d)+'</div>');h+='</div>';}

        document.getElementById('currentDate').textContent=new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        populateProjectFields();updateCompactDisplay();
        document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');document.getElementById('panel-'+tab.dataset.tab).classList.add('active');if(tab.dataset.tab==='report')renderReport();});});
        document.getElementById('fabBtn').addEventListener('click',showFABMenu);
        document.getElementById('diarySearch').addEventListener('input',e=>renderDiary(e.target.value));
        refreshAll();
    }
    document.addEventListener('DOMContentLoaded',init);
    </script>
</body>
</html>
