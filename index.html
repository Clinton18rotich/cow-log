<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🦺 CoW Log</title>
    <meta name="theme-color" content="#0d1117">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #e6edf3;
            --muted: #8b949e; --accent: #f78166; --green: #3fb950; --red: #f85149;
            --yellow: #d2991d; --blue: #58a6ff; --purple: #a371f7; --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 100px; -webkit-tap-highlight-color: transparent; font-size: 15px; line-height: 1.5; }
        .header { background: var(--card); padding: 16px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .header h1 { font-size: 1.2rem; color: var(--accent); }
        .header .date { font-size: 0.8rem; color: var(--muted); text-align: right; }
        .project-info { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 0.75rem; color: var(--muted); }
        .project-info .label { color: var(--muted); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .project-info input, .project-info select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 0.75rem; width: 100%; font-family: inherit; }
        .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; padding: 12px 16px; }
        .stat-card { background: var(--card); padding: 12px 8px; border-radius: var(--radius); text-align: center; border: 1px solid var(--border); }
        .stat-card .count { font-size: 1.5rem; font-weight: 700; }
        .stat-card .label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
        .count.red { color: var(--red); } .count.green { color: var(--green); } .count.yellow { color: var(--yellow); } .count.blue { color: var(--blue); } .count.purple { color: var(--purple); }
        .tabs { display: flex; gap: 4px; padding: 0 16px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; white-space: nowrap; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-weight: 500; }
        .tab.active { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 600; }
        .content { padding: 0 16px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .entry-card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); border-left: 4px solid var(--border); }
        .entry-card.diary-card { border-left-color: var(--blue); }
        .entry-card.inspection-card { border-left-color: var(--green); }
        .entry-card.ncr-card { border-left-color: var(--red); }
        .entry-card.instruction-card { border-left-color: var(--yellow); }
        .entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
        .entry-title { font-weight: 600; font-size: 0.9rem; }
        .badge { font-size: 0.65rem; padding: 4px 10px; border-radius: 12px; font-weight: 600; white-space: nowrap; }
        .badge-pass { background: rgba(63,185,80,0.15); color: var(--green); }
        .badge-fail { background: rgba(248,81,73,0.15); color: var(--red); }
        .badge-open { background: rgba(248,81,73,0.15); color: var(--red); }
        .badge-closed { background: rgba(63,185,80,0.15); color: var(--green); }
        .badge-pending { background: rgba(210,153,29,0.15); color: var(--yellow); }
        .badge-info { background: rgba(88,166,255,0.15); color: var(--blue); }
        .entry-meta { font-size: 0.7rem; color: var(--muted); margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 12px; }
        .entry-desc { font-size: 0.8rem; line-height: 1.6; color: #c9d1d9; }
        .entry-section { background: var(--bg); border-radius: 8px; padding: 10px 12px; margin-top: 8px; font-size: 0.75rem; }
        .section-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        .fab { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: #0d1117; border: none; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 20px rgba(247,129,102,0.3); z-index: 200; font-weight: 700; }
        .fab:active { transform: scale(0.92); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; display: flex; align-items: flex-end; animation: fadeIn 0.15s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal { background: var(--card); width: 100%; border-radius: 20px 20px 0 0; padding: 20px; max-height: 88vh; overflow-y: auto; border: 1px solid var(--border); border-bottom: none; }
        .modal h2 { font-size: 1rem; margin-bottom: 16px; color: var(--accent); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; font-weight: 600; }
        .modal input, .modal textarea, .modal select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.85rem; font-family: inherit; }
        .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: var(--accent); }
        .modal textarea { min-height: 90px; resize: vertical; }
        .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border-radius: 10px; border: none; font-weight: 600; font-size: 0.85rem; cursor: pointer; flex: 1; min-width: 80px; }
        .btn:active { opacity: 0.8; }
        .btn-primary { background: var(--accent); color: #0d1117; }
        .btn-secondary { background: var(--border); color: var(--text); }
        .btn-danger { background: var(--red); color: white; }
        .btn-whatsapp { background: #25D366; color: white; }
        .btn-small { padding: 6px 12px; font-size: 0.7rem; border-radius: 6px; flex: 0; }
        .media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .media-thumb { aspect-ratio: 1; background: var(--card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; cursor: pointer; }
        .media-thumb img, .media-thumb video { width: 100%; height: 100%; object-fit: cover; }
        .media-thumb .placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .media-preview { display: flex; flex-wrap: wrap; gap: 6px; }
        .media-preview-item { width: 80px; height: 80px; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .media-preview-item img, .media-preview-item video { width: 100%; height: 100%; object-fit: cover; }
        .remove-media { position: absolute; top: 2px; right: 2px; background: var(--red); color: white; width: 22px; height: 22px; border-radius: 50%; border: none; font-size: 0.7rem; cursor: pointer; }
        .media-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .media-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .media-viewer img, .media-viewer video { max-width: 95%; max-height: 70vh; border-radius: 8px; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: var(--red); color: white; width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 1.2rem; cursor: pointer; z-index: 501; }
        .media-info { color: var(--text); font-size: 0.8rem; margin-top: 16px; text-align: center; }
        .report-preview { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.7rem; line-height: 1.8; white-space: pre-wrap; max-height: 60vh; overflow-y: auto; color: var(--text); }
        .search-bar { margin-bottom: 12px; }
        .search-bar input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 0.85rem; }
        .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: var(--green); color: #0d1117; padding: 10px 24px; border-radius: 20px; font-weight: 600; font-size: 0.8rem; z-index: 400; animation: toastIn 0.3s ease; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @media print { body { background: white; color: black; } .header, .stats-row, .tabs, .fab, .btn, .search-bar, .modal-overlay, .toast { display: none !important; } .panel { display: none !important; } #panel-report { display: block !important; } .report-preview { background: white; border: none; color: black; max-height: none; overflow: visible; } }
        @media (min-width: 600px) { .content { max-width: 600px; margin: 0 auto; } .stats-row { max-width: 600px; margin: 0 auto; } .header { padding: 16px max(16px, calc((100% - 600px)/2)); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row"><h1>🦺 CoW Log</h1><span class="date" id="currentDate"></span></div>
        <div class="project-info">
            <div><div class="label">Project</div><input type="text" id="projectName" value="Riverside Apartments"></div>
            <div><div class="label">Contract No.</div><input type="text" id="contractNo" value="RAP/CW/2026/001"></div>
            <div><div class="label">Contractor</div><input type="text" id="contractorName" value="BuildRight Construction Ltd"></div>
            <div><div class="label">Report No.</div><input type="text" id="reportNo" value="COW-001"></div>
            <div style="grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                <div><div class="label">Weather</div><select id="weatherSelect"><option>☀️ Sunny</option><option>⛅ Partly Cloudy</option><option>☁️ Overcast</option><option>🌧️ Rain</option><option>⛈️ Storm</option></select></div>
                <div><div class="label">Temp</div><input type="text" id="temperature" value="26°C"></div>
            </div>
        </div>
    </div>
    <div class="stats-row">
        <div class="stat-card"><div class="count blue" id="diaryCount">0</div><div class="label">Diary</div></div>
        <div class="stat-card"><div class="count green" id="inspectionCount">0</div><div class="label">Inspections</div></div>
        <div class="stat-card"><div class="count red" id="ncrCount">0</div><div class="label">Open NCRs</div></div>
        <div class="stat-card"><div class="count yellow" id="instructionCount">0</div><div class="label">SI</div></div>
        <div class="stat-card"><div class="count purple" id="photoCount">0</div><div class="label">Media</div></div>
    </div>
    <div class="tabs">
        <button class="tab active" data-tab="diary">📔 Diary</button>
        <button class="tab" data-tab="inspections">✅ Inspect</button>
        <button class="tab" data-tab="ncr">🚨 NCRs</button>
        <button class="tab" data-tab="instructions">📋 SI</button>
        <button class="tab" data-tab="photos">📸 Media</button>
        <button class="tab" data-tab="report">📄 Report</button>
    </div>
    <div class="content">
        <div class="panel active" id="panel-diary"><div class="search-bar"><input type="text" placeholder="🔍 Search diary..." id="diarySearch"></div><div id="diaryEntries"></div></div>
        <div class="panel" id="panel-inspections"><div id="inspectionEntries"></div></div>
        <div class="panel" id="panel-ncr"><div id="ncrEntries"></div></div>
        <div class="panel" id="panel-instructions"><div id="instructionEntries"></div></div>
        <div class="panel" id="panel-photos"><div id="photoGallery"></div></div>
        <div class="panel" id="panel-report"><div id="reportContent"></div></div>
    </div>
    <button class="fab" id="fabBtn">+</button>
    <div id="modalContainer"></div>
    <div id="toastContainer"></div>
    <div id="mediaViewer"></div>

    <script>
    // ============================================
    // COW LOG v3.1 — Fixed Media Handling
    // ============================================
    const STORAGE_KEY = 'cowlog_v3';
    const SETTINGS_KEY = 'cowlog_settings';
    const MEDIA_KEY = 'cowlog_media';

    function loadData() {
        try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : { diary:[], inspections:[], ncrs:[], instructions:[], photos:[], dailyReports:[] }; }
        catch(e) { return { diary:[], inspections:[], ncrs:[], instructions:[], photos:[], dailyReports:[] }; }
    }
    function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
    function loadMedia() {
        try { const r = localStorage.getItem(MEDIA_KEY); return r ? JSON.parse(r) : []; }
        catch(e) { return []; }
    }
    function saveMedia(m) {
        if (m.length > 80) m = m.slice(-60);
        localStorage.setItem(MEDIA_KEY, JSON.stringify(m));
    }
    function loadSettings() {
        try { const r = localStorage.getItem(SETTINGS_KEY); return r ? JSON.parse(r) : {}; }
        catch(e) { return {}; }
    }
    function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

    let appData = loadData();
    let mediaStore = loadMedia();
    let settings = loadSettings();
    let pendingMedia = [];
    window._currentReport = '';

    function genId(p) { return p+'-'+Date.now()+'-'+Math.random().toString(36).substr(2,6); }
    function timeFormat(ts) { return new Date(ts).toLocaleString('en-KE',{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
    function dateOnly(ts) { return new Date(ts).toLocaleDateString('en-KE',{year:'numeric',month:'short',day:'numeric'}); }
    function getToday() { return new Date().toISOString().split('T')[0]; }
    function showToast(msg) { const c=document.getElementById('toastContainer'); c.innerHTML='<div class="toast">'+msg+'</div>'; setTimeout(()=>{c.innerHTML='';},2000); }

    function updateStats() {
        document.getElementById('diaryCount').textContent = appData.diary.length;
        document.getElementById('inspectionCount').textContent = appData.inspections.length;
        document.getElementById('ncrCount').textContent = appData.ncrs.filter(n=>n.status==='open').length;
        document.getElementById('instructionCount').textContent = appData.instructions.length;
        document.getElementById('photoCount').textContent = mediaStore.length;
    }

    // ============================================
    // FIXED: Media Capture & Upload
    // ============================================
    function triggerCamera() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,video/*';
        input.capture = 'environment';
        input.multiple = true;
        input.style.display = 'none';
        document.body.appendChild(input);
        input.addEventListener('change', async function(e) {
            if (e.target.files.length > 0) {
                for (let f of e.target.files) await processFile(f);
                renderMediaPreview();
                showToast('📸 '+e.target.files.length+' captured');
            }
            document.body.removeChild(input);
        });
        input.click();
    }

    function triggerGallery() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,video/*';
        input.multiple = true;
        input.style.display = 'none';
        document.body.appendChild(input);
        input.addEventListener('change', async function(e) {
            if (e.target.files.length > 0) {
                for (let f of e.target.files) await processFile(f);
                renderMediaPreview();
                showToast('📸 '+e.target.files.length+' added');
            }
            document.body.removeChild(input);
        });
        input.click();
    }

    function processFile(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                let dataUrl = e.target.result;
                let type = file.type.startsWith('video/') ? 'video' : 'image';
                // Compress image if > 300KB
                if (type === 'image' && dataUrl.length > 300000) {
                    compressImage(dataUrl, 1000, 0.5).then(compressed => {
                        dataUrl = compressed;
                        addToPending(dataUrl, type, file.name);
                        resolve();
                    }).catch(() => {
                        addToPending(dataUrl, type, file.name);
                        resolve();
                    });
                } else {
                    addToPending(dataUrl, type, file.name);
                    resolve();
                }
            };
            reader.readAsDataURL(file);
        });
    }

    function addToPending(dataUrl, type, fileName) {
        pendingMedia.push({
            id: genId('media'),
            type: type,
            dataUrl: dataUrl,
            fileName: fileName || ('media_'+Date.now()),
            timestamp: new Date().toISOString(),
            label: '',
            entryId: null
        });
    }

    function compressImage(dataUrl, maxW, quality) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let w=img.width, h=img.height;
                if(w>maxW){h=Math.round(h*(maxW/w));w=maxW;}
                canvas.width=w; canvas.height=h;
                canvas.getContext('2d').drawImage(img,0,0,w,h);
                resolve(canvas.toDataURL('image/jpeg',quality));
            };
            img.onerror = reject;
            img.src = dataUrl;
        });
    }

    function renderMediaPreview() {
        const container = document.getElementById('mediaPreviewContainer');
        if (!container) return;
        if (pendingMedia.length === 0) {
            container.innerHTML = '<p style="font-size:0.75rem;color:var(--muted);text-align:center;padding:12px;">📷 Tap camera or gallery button above</p>';
            return;
        }
        container.innerHTML = '<div class="media-preview">' + pendingMedia.map((m,i) =>
            '<div class="media-preview-item">' +
                (m.type==='video' ? '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:var(--bg);">🎬</div>' : '<img src="'+m.dataUrl+'" style="width:100%;height:100%;object-fit:cover;" alt="Photo">') +
                '<button class="remove-media" onclick="removePendingMedia('+i+')">✕</button>' +
            '</div>'
        ).join('') + '</div>';
    }

    function removePendingMedia(index) {
        pendingMedia.splice(index, 1);
        renderMediaPreview();
    }

    function savePendingMedia(entryId) {
        if (pendingMedia.length === 0) return [];
        const saved = [];
        pendingMedia.forEach(m => {
            m.entryId = entryId;
            mediaStore.push({...m});
            saved.push(m);
        });
        saveMedia(mediaStore);
        pendingMedia = [];
        return saved;
    }

    function viewMedia(mediaId) {
        const item = mediaStore.find(m=>m.id===mediaId);
        if(!item) return;
        const viewer = document.getElementById('mediaViewer');
        let content = item.type==='video' 
            ? '<video src="'+item.dataUrl+'" controls style="max-width:95%;max-height:70vh;border-radius:8px;"></video>'
            : '<img src="'+item.dataUrl+'" style="max-width:95%;max-height:70vh;border-radius:8px;" alt="Photo">';
        viewer.innerHTML = '<div class="media-viewer" onclick="closeMediaViewer()"><button class="close-btn">✕</button>'+content+'<div class="media-info"><p style="font-weight:600;">'+(item.label||'Site Photo')+'</p><p style="font-size:0.75rem;color:#888;">'+timeFormat(item.timestamp)+'</p><button class="btn btn-small btn-primary" style="margin-top:8px;" onclick="event.stopPropagation();shareMedia(\''+mediaId+'\')">📤 Share</button><button class="btn btn-small btn-danger" style="margin-top:8px;" onclick="event.stopPropagation();deleteMediaItem(\''+mediaId+'\')">🗑️ Delete</button></div></div>';
    }

    function closeMediaViewer() { document.getElementById('mediaViewer').innerHTML = ''; }

    function deleteMediaItem(mediaId) {
        if(!confirm('Delete this media?')) return;
        mediaStore = mediaStore.filter(m=>m.id!==mediaId);
        saveMedia(mediaStore);
        closeMediaViewer();
        renderAll();
        showToast('🗑️ Deleted');
    }

    async function shareMedia(mediaId) {
        const item = mediaStore.find(m=>m.id===mediaId);
        if(!item) return;
        if(navigator.share && item.dataUrl) {
            try {
                const res = await fetch(item.dataUrl);
                const blob = await res.blob();
                const file = new File([blob], item.fileName||'photo.jpg', {type:blob.type||'image/jpeg'});
                await navigator.share({title:item.label||'Site Photo', files:[file]});
                showToast('📤 Shared!');
            } catch(e) {
                shareViaWhatsApp('📸 Site Photo — '+timeFormat(item.timestamp));
            }
        } else {
            shareViaWhatsApp('📸 Site Photo — '+timeFormat(item.timestamp));
        }
    }

    function shareMediaGallery() {
        const recent = mediaStore.slice(-5);
        if(!recent.length){showToast('No media');return;}
        let text = '📸 Site Photos — '+(document.getElementById('projectName').value||'Project')+'\nDate: '+getToday()+'\n\n';
        recent.forEach((m,i)=>{text+=(i+1)+'. '+(m.label||'Photo')+' — '+timeFormat(m.timestamp)+'\n';});
        shareViaWhatsApp(text);
    }

    function shareViaWhatsApp(text) {
        window.open('https://wa.me/?text='+encodeURIComponent(text.substring(0,1500)),'_blank');
    }

    function addMediaToEntry(entryId) {
        pendingMedia = [];
        const c = document.getElementById('modalContainer');
        c.innerHTML = '<div class="modal-overlay" id="mo"><div class="modal"><h2>📸 Add Media</h2><div class="media-actions"><button class="btn btn-primary" id="camBtn">📷 Take Photo</button><button class="btn btn-secondary" id="galBtn">🖼️ Gallery</button></div><div id="mediaPreviewContainer" style="margin-top:12px;"></div><div class="btn-row"><button class="btn btn-secondary" id="cancelBtn">Cancel</button><button class="btn btn-primary" id="saveBtn">💾 Save</button></div></div></div>';
        setTimeout(()=>{
            document.getElementById('camBtn').addEventListener('click',triggerCamera);
            document.getElementById('galBtn').addEventListener('click',triggerGallery);
            document.getElementById('cancelBtn').addEventListener('click',closeModal);
            document.getElementById('saveBtn').addEventListener('click',()=>{savePendingMedia(entryId);closeModal();renderAll();showToast('📸 Saved!');});
            document.getElementById('mo').addEventListener('click',e=>{if(e.target.id==='mo')closeModal();});
            renderMediaPreview();
        },100);
    }

    // ============================================
    // RENDERERS
    // ============================================
    function renderDiary(filter='') {
        const container = document.getElementById('diaryEntries');
        let entries = appData.diary;
        if(filter){const q=filter.toLowerCase();entries=entries.filter(e=>e.title.toLowerCase().includes(q)||e.description.toLowerCase().includes(q)||e.location.toLowerCase().includes(q));}
        entries.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));

    function showFABMenu() {
        const c=document.getElementById('modalContainer');
        c.innerHTML='<div class="modal-overlay" id="fo" style="align-items:flex-end;justify-content:center;"><div class="modal" style="text-align:center;max-width:400px;"><h2>➕ Add New</h2><button class="btn btn-primary" style="margin-bottom:8px;width:100%;" onclick="closeModal();showDiaryForm();">📔 Diary Entry</button><button class="btn btn-primary" style="margin-bottom:8px;width:100%;background:var(--green);" onclick="closeModal();showInspectionForm();">✅ Inspection</button><button class="btn btn-primary" style="margin-bottom:8px;width:100%;background:var(--red);" onclick="closeModal();showNCRForm();">🚨 NCR</button><button class="btn btn-primary" style="margin-bottom:8px;width:100%;background:var(--yellow);color:#0d1117;" onclick="closeModal();showInstructionForm();">📋 SI</button><button class="btn btn-primary" style="margin-bottom:8px;width:100%;background:var(--purple);" onclick="closeModal();triggerCamera();">📷 Quick Photo</button><button class="btn btn-secondary" style="width:100%;" onclick="closeModal();">Cancel</button></div></div>';
        document.getElementById('fo').addEventListener('click',e=>{if(e.target.id==='fo')closeModal();});
    }

    // ============================================
    // ACTIONS
    // ============================================
    function deleteEntry(type, id) {
        if(!confirm('Delete?'))return;
        appData[type]=appData[type].filter(e=>e.id!==id);
        mediaStore=mediaStore.filter(m=>m.entryId!==id);
        saveData(appData); saveMedia(mediaStore);
        renderAll(); showToast('🗑️ Deleted');
    }
    function closeNCR(id) {
        const ncr=appData.ncrs.find(n=>n.id===id);
        if(!ncr)return;
        const c=prompt('Closeout comment:');
        if(c===null)return;
        ncr.status='closed'; ncr.closeoutComment=c; ncr.closedDate=new Date().toISOString();
        saveData(appData); renderAll(); showToast('✅ Closed');
    }
    function acknowledgeSI(id) {
        const si=appData.instructions.find(s=>s.id===id);
        if(!si)return;
        si.status='acknowledged'; si.acknowledgedDate=new Date().toISOString();
        saveData(appData); renderAll(); showToast('✍️ Acknowledged');
    }
    function copyReport() {
        navigator.clipboard.writeText(window._currentReport||'').then(()=>showToast('📋 Copied!'));
    }
    function printReport() {
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
        const rt=document.querySelector('[data-tab="report"]');
        if(rt)rt.classList.add('active');
        const rp=document.getElementById('panel-report');
        if(rp)rp.classList.add('active');
        renderReport();
        setTimeout(()=>window.print(),500);
    }
    function shareReportWhatsApp() {
        shareViaWhatsApp(window._currentReport||'No report');
    }
    function saveReport() {
        appData.dailyReports.push({id:genId('rpt'),reportNo:document.getElementById('reportNo').value,content:window._currentReport||'',date:getToday(),timestamp:new Date().toISOString()});
        const c=parseInt(settings.reportCounter||1);
        settings.reportCounter=c+1; saveSettings(settings);
        document.getElementById('reportNo').value='COW-'+String(c+1).padStart(3,'0');
        saveData(appData); showToast('💾 Saved');
    }

    // ============================================
    // INIT
    // ============================================
    function init() {
        document.getElementById('currentDate').textContent=new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        if(settings.projectName)document.getElementById('projectName').value=settings.projectName;
        if(settings.contractNo)document.getElementById('contractNo').value=settings.contractNo;
        if(settings.contractorName)document.getElementById('contractorName').value=settings.contractorName;
        if(settings.reportCounter)document.getElementById('reportNo').value='COW-'+String(settings.reportCounter).padStart(3,'0');
        ['projectName','contractNo','contractorName'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('change',()=>{settings[id]=el.value;saveSettings(settings);});});
        document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');const panel=document.getElementById('panel-'+tab.dataset.tab);if(panel)panel.classList.add('active');if(tab.dataset.tab==='report')renderReport();if(tab.dataset.tab==='photos')renderPhotos();});});
        document.getElementById('fabBtn').addEventListener('click',showFABMenu);
        document.getElementById('diarySearch').addEventListener('input',e=>renderDiary(e.target.value));
        renderAll();
    }
    document.addEventListener('DOMContentLoaded',init);
    </script>
</body>
</html>
