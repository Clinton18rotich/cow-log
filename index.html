<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🦺 CoW Log Pro</title><meta name="theme-color" content="#0d1117"><link rel="manifest" href="manifest.json">
    <style>
        :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#f78166;--green:#3fb950;--red:#f85149;--yellow:#d2991d;--blue:#58a6ff;--purple:#a371f7;--cyan:#39d2c0;--orange:#ff8c42;--pink:#f778ba}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;font-size:15px;line-height:1.5}
        .header{background:var(--card);padding:14px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}.header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}.header h1{font-size:1.1rem;color:var(--accent)}.date{font-size:.75rem;color:var(--muted)}
        .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:8px 12px}
        .stat-card{background:var(--card);padding:6px 3px;border-radius:8px;text-align:center;border:1px solid var(--border)}.stat-card .count{font-size:1.1rem;font-weight:700}.stat-card .label{font-size:.45rem;color:var(--muted);text-transform:uppercase;margin-top:1px}
        .count.red{color:var(--red)}.count.green{color:var(--green)}.count.blue{color:var(--blue)}.count.yellow{color:var(--yellow)}.count.purple{color:var(--purple)}.count.orange{color:var(--orange)}
        .tabs{display:flex;gap:1px;padding:0 8px;margin-bottom:6px;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{padding:5px 7px;border-radius:14px;font-size:.58rem;white-space:nowrap;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-weight:500}.tab.active{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:600}
        .content{padding:0 10px}.panel{display:none}.panel.active{display:block}
        .entry-card{background:var(--card);border-radius:8px;padding:8px;margin-bottom:5px;border:1px solid var(--border);border-left:3px solid var(--border)}
        .entry-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px;gap:3px}.entry-title{font-weight:600;font-size:.75rem}
        .badge{font-size:.5rem;padding:2px 5px;border-radius:6px;font-weight:600;white-space:nowrap}.badge-pass{background:rgba(63,185,80,.15);color:var(--green)}.badge-fail{background:rgba(248,81,73,.15);color:var(--red)}.badge-open{background:rgba(248,81,73,.15);color:var(--red)}.badge-closed{background:rgba(63,185,80,.15);color:var(--green)}.badge-info{background:rgba(88,166,255,.15);color:var(--blue)}.badge-ai{background:rgba(167,113,247,.2);color:var(--purple)}
        .entry-meta{font-size:.58rem;color:var(--muted);margin-bottom:3px;display:flex;flex-wrap:wrap;gap:6px}.entry-desc{font-size:.68rem;line-height:1.3;color:#c9d1d9}.entry-section{background:var(--bg);border-radius:5px;padding:5px 6px;margin-top:3px;font-size:.63rem}.section-label{font-size:.5rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
        .fab{position:fixed;bottom:18px;right:18px;width:46px;height:46px;border-radius:50%;background:var(--accent);color:#0d1117;border:none;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 14px rgba(247,129,102,.3);z-index:200;font-weight:700}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end}.modal{background:var(--card);width:100%;border-radius:16px 16px 0 0;padding:14px;max-height:85vh;overflow-y:auto;border:1px solid var(--border)}.modal h2{font-size:.85rem;margin-bottom:10px;color:var(--accent)}
        .form-group{margin-bottom:7px}.form-group label{display:block;font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;font-weight:600}.modal input,.modal textarea,.modal select{width:100%;padding:7px;border-radius:5px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.72rem;font-family:inherit}
        .btn{padding:7px 12px;border-radius:7px;border:none;font-weight:600;font-size:.7rem;cursor:pointer;flex:1}.btn-primary{background:var(--accent);color:#0d1117}.btn-secondary{background:var(--border);color:var(--text)}.btn-small{padding:3px 7px;font-size:.55rem;border-radius:4px;flex:0}.btn-ai{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff}
        .ai-result{background:linear-gradient(135deg,rgba(167,113,247,.1),rgba(247,120,186,.1));border:1px solid var(--purple);border-radius:8px;padding:10px;margin:8px 0}
        .ai-loading{text-align:center;padding:20px;color:var(--muted)}
        .ai-loading .spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .empty-state{text-align:center;padding:25px 10px;color:var(--muted)}.empty-state .icon{font-size:1.8rem;margin-bottom:6px;opacity:.5}
        .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--green);color:#0d1117;padding:5px 14px;border-radius:14px;font-weight:600;font-size:.65rem;z-index:400}
        .settings-panel{display:none;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:6px}.settings-panel.show{display:block}
        .drawing-card{border-left-color:var(--purple)!important}
        @media print{body{background:#fff;color:#000}.header,.stats-row,.tabs,.fab,.btn,.search-bar,.modal-overlay,.toast,.settings-panel{display:none!important}.panel{display:none!important}#panel-report{display:block!important}}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row"><h1>🦺 CoW Log Pro</h1><div style="display:flex;align-items:center;gap:4px;"><button class="btn btn-small btn-secondary" id="settingsToggle">⚙️</button><span class="date" id="currentDate"></span></div></div>
        <div class="settings-panel" id="settingsPanel"><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:.65rem;"><div><div class="section-label">Project</div><input type="text" id="projectName"></div><div><div class="section-label">Contract No</div><input type="text" id="contractNo"></div><div><div class="section-label">Contractor</div><input type="text" id="contractorName"></div><div><div class="section-label">Location</div><input type="text" id="defaultLocation"></div><div><div class="section-label">CoW Name</div><input type="text" id="cowName"></div><div><div class="section-label">🤖 Gemini API Key</div><input type="password" id="geminiKey" placeholder="AIzaSy... from aistudio.google.com"></div><div style="grid-column:1/-1;"><button class="btn btn-primary btn-small" onclick="saveProjectSettings()">💾 Save</button><button class="btn btn-secondary btn-small" onclick="restoreData()">📥 Restore</button></div></div></div>
        <div id="compactInfo" style="font-size:.58rem;color:var(--muted);display:flex;gap:8px;"><span>🏗️ <strong id="displayProject">—</strong></span><span>👷 <strong id="displayContractor">—</strong></span><span id="aiStatus" style="color:var(--purple);"></span></div>
    </div>
    <div class="stats-row"><div class="stat-card"><div class="count blue" id="diaryCount">0</div><div class="label">Diary</div></div><div class="stat-card"><div class="count green" id="inspectionCount">0</div><div class="label">Insp</div></div><div class="stat-card"><div class="count red" id="ncrCount">0</div><div class="label">NCRs</div></div><div class="stat-card"><div class="count orange" id="matLowCount">0</div><div class="label">Stock</div></div><div class="stat-card"><div class="count purple" id="rfiCount">0</div><div class="label">AI</div></div></div>
    <div class="tabs"><button class="tab active" data-tab="diary">📔</button><button class="tab" data-tab="inspections">✅</button><button class="tab" data-tab="ncr">🚨</button><button class="tab" data-tab="instructions">📋</button><button class="tab" data-tab="rfi">📤</button><button class="tab" data-tab="drawings">📐🤖</button><button class="tab" data-tab="materials">🧱</button><button class="tab" data-tab="concrete">🧪</button><button class="tab" data-tab="tests">🔬</button><button class="tab" data-tab="delays">🚧</button><button class="tab" data-tab="attendance">👷</button><button class="tab" data-tab="photos">📸</button><button class="tab" data-tab="report">📄</button></div>
    <div class="content">
        <div class="panel active" id="panel-diary"><div class="search-bar"><input type="text" placeholder="🔍 Search..." id="diarySearch"></div><div id="diaryEntries"></div></div>
        <div class="panel" id="panel-inspections"><div id="inspectionEntries"></div></div>
        <div class="panel" id="panel-ncr"><div id="ncrEntries"></div></div>
        <div class="panel" id="panel-instructions"><div id="instructionEntries"></div></div>
        <div class="panel" id="panel-rfi"><div id="rfiEntries"></div></div>
        <div class="panel" id="panel-drawings"><div id="drawingEntries"></div></div>
        <div class="panel" id="panel-materials"><div id="materialEntries"></div></div>
        <div class="panel" id="panel-concrete"><div id="concreteEntries"></div></div>
        <div class="panel" id="panel-tests"><div id="testEntries"></div></div>
        <div class="panel" id="panel-delays"><div id="delayEntries"></div></div>
        <div class="panel" id="panel-attendance"><div id="attendanceEntries"></div></div>
        <div class="panel" id="panel-photos"><div id="photoGallery"></div></div>
        <div class="panel" id="panel-report"><div id="reportContent"></div></div>
    </div>
    <button class="fab" id="fabBtn">+</button>
    <div id="modalContainer"></div><div id="toastContainer"></div>

    <script>
    // DATA
    const MK='cowlog_media_v11',AK='cowlog_app_v11',PK='cowlog_project_v9';
    function loadProject(){try{const r=localStorage.getItem(PK);return r?JSON.parse(r):{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'CoW',geminiKey:'',reportCounter:1,pin:''};}catch(e){return{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'CoW',geminiKey:'',reportCounter:1,pin:''};}}
    function saveProject(p){localStorage.setItem(PK,JSON.stringify(p));}
    let project=loadProject();
    function loadMedia(){try{const r=localStorage.getItem(MK);return r?JSON.parse(r):[];}catch(e){return[];}}
    function saveMedia(arr){if(arr.length>50)arr=arr.slice(-35);try{localStorage.setItem(MK,JSON.stringify(arr));}catch(e){}}
    function loadApp(){try{const r=localStorage.getItem(AK);return r?JSON.parse(r):{diary:[],inspections:[],ncrs:[],instructions:[],rfis:[],drawings:[],dimensions:[],structuralElements:[],materials:[],materialLog:[],concrete:[],materialTests:[],delays:[],attendance:[],dailyReports:[]};}catch(e){return{diary:[],inspections:[],ncrs:[],instructions:[],rfis:[],drawings:[],dimensions:[],structuralElements:[],materials:[],materialLog:[],concrete:[],materialTests:[],delays:[],attendance:[],dailyReports:[]};}}
    function saveApp(d){localStorage.setItem(AK,JSON.stringify(d));}
    let media=loadMedia(),app=loadApp(),pendingMedia=[];
    function genId(p){return p+'-'+Date.now()+'-'+Math.random().toString(36).substr(2,5);}
    function fmt(ts){return new Date(ts).toLocaleString('en-KE',{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
    function fmtDate(ts){return new Date(ts).toLocaleDateString('en-KE',{year:'numeric',month:'short',day:'numeric'});}
    function today(){return new Date().toISOString().split('T')[0];}
    function toast(msg){const c=document.getElementById('toastContainer');c.innerHTML='<div class="toast">'+msg+'</div>';setTimeout(()=>c.innerHTML='',2000);}
    function loc(){return project.defaultLocation||'Site';}
    function contractor(){return project.contractorName||'Contractor';}
    function hasAI(){return project.geminiKey&&project.geminiKey.length>10;}
    function updateStats(){document.getElementById('diaryCount').textContent=app.diary.length;document.getElementById('inspectionCount').textContent=app.inspections.length;document.getElementById('ncrCount').textContent=app.ncrs.filter(n=>n.status==='open').length;document.getElementById('matLowCount').textContent=app.materials.filter(m=>parseFloat(m.currentStock||0)<=parseFloat(m.minStock||0)).length;document.getElementById('rfiCount').textContent=app.drawings.length;}
    function populateProjectFields(){document.getElementById('projectName').value=project.projectName||'';document.getElementById('contractNo').value=project.contractNo||'';document.getElementById('contractorName').value=project.contractorName||'';document.getElementById('defaultLocation').value=project.defaultLocation||'';document.getElementById('cowName').value=project.cowName||'';document.getElementById('geminiKey').value=project.geminiKey||'';updateCompactDisplay();}
    function updateCompactDisplay(){document.getElementById('displayProject').textContent=project.projectName||'—';document.getElementById('displayContractor').textContent=project.contractorName||'—';document.getElementById('aiStatus').textContent=hasAI()?'🤖 AI Ready':'🤖 (set API key)';}
    function saveProjectSettings(){project.projectName=document.getElementById('projectName').value.trim();project.contractNo=document.getElementById('contractNo').value.trim();project.contractorName=document.getElementById('contractorName').value.trim();project.defaultLocation=document.getElementById('defaultLocation').value.trim();project.cowName=document.getElementById('cowName').value.trim()||'CoW';project.geminiKey=document.getElementById('geminiKey').value.trim();saveProject(project);updateCompactDisplay();document.getElementById('settingsPanel').classList.remove('show');toast('✅ Saved!');}
    document.addEventListener('DOMContentLoaded',()=>{document.getElementById('settingsToggle').addEventListener('click',()=>{const p=document.getElementById('settingsPanel');p.classList.toggle('show');if(p.classList.contains('show'))populateProjectFields();});});

    // ============================================
    // 🤖 AI DRAWING ANALYSIS ENGINE
    // ============================================
    async function analyzeDrawingWithAI(drawingId){
        if(!hasAI()){toast('Set Gemini API key in ⚙️ Settings first');return;}
        const drawing=app.drawings.find(d=>d.id===drawingId);
        if(!drawing||!drawing.imageData){toast('No drawing image found');return;}

        // Show loading modal
        const mc=document.getElementById('modalContainer');
        mc.innerHTML='<div class="modal-overlay" id="mo"><div class="modal"><h2>🤖 AI Analyzing Drawing...</h2><div class="ai-loading"><div class="spinner"></div><p style="font-size:.7rem;">Uploading to Gemini Vision...</p><p style="font-size:.6rem;color:var(--muted);">'+drawing.number+' — '+drawing.title+'</p></div></div></div>';

        try{
            const prompt=`You are a structural engineer analyzing a construction drawing. Extract ALL of the following in JSON format:

1. DRAWING TYPE: What type of drawing is this? (Structural, Architectural, Plumbing, Electrical, etc.)
2. SCALE: What scale is indicated? (e.g., 1:50, 1:100)
3. DIMENSIONS: List all visible dimensions with their values and what they measure (e.g., "Column spacing: 6000mm", "Slab thickness: 200mm", "Beam depth: 450mm")
4. STRUCTURAL ELEMENTS: List all columns (with size if visible), beams (with size if visible), slabs, walls, foundations
5. GRID LINES: List all grid references visible (e.g., Grid A, Grid 1, etc.)
6. NOTES: Any important notes, specifications, or references on the drawing
7. MATERIALS: Any materials specified
8. REINFORCEMENT: Any rebar details visible (bar sizes, spacing)

Return ONLY valid JSON. No markdown, no explanation — just the JSON object.`;

            const imageBase64=drawing.imageData.split(',')[1]||drawing.imageData;
            
            const response=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${project.geminiKey}`,{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({
                    contents:[{parts:[{text:prompt},{inlineData:{mimeType:'image/jpeg',data:imageBase64}}]}],
                    generationConfig:{temperature:0.1,maxOutputTokens:2000}
                })
            });

            const data=await response.json();
            closeModal();
            
            if(data.error){toast('AI Error: '+data.error.message);return;}
            
            const aiText=data.candidates[0].content.parts[0].text;
            // Extract JSON from response
            const jsonMatch=aiText.match(/\{[\s\S]*\}/);
            if(!jsonMatch){toast('AI response format error');return;}
            
            const extracted=JSON.parse(jsonMatch[0]);
            
            // Save dimensions
            if(extracted.DIMENSIONS||extracted.dimensions){
                const dims=extracted.DIMENSIONS||extracted.dimensions;
                if(Array.isArray(dims))dims.forEach(d=>{app.dimensions.push({id:genId('dim'),drawingId,label:typeof d==='string'?d:d.label||d,value:typeof d==='string'?'':d.value||'',timestamp:new Date().toISOString()});});
            }
            
            // Save structural elements
            if(extracted.STRUCTURAL_ELEMENTS||extracted.structural_elements){
                const elems=extracted.STRUCTURAL_ELEMENTS||extracted.structural_elements;
                if(Array.isArray(elems))elems.forEach(e=>{app.structuralElements.push({id:genId('se'),drawingId,name:typeof e==='string'?e:e.name||e,size:typeof e==='string'?'':e.size||'',type:typeof e==='string'?'unknown':e.type||'',timestamp:new Date().toISOString()});});
            }
            
            // Store AI analysis on drawing
            drawing.aiAnalysis={extracted,timestamp:new Date().toISOString()};
            saveApp(app);
            
            // Show results
            showAIResults(drawingId,extracted);
        }catch(err){
            closeModal();
            toast('AI Error: '+err.message);
            console.error(err);
        }
    }

    function showAIResults(drawingId,data){
        const drawing=app.drawings.find(d=>d.id===drawingId);
        let html='<h2>🤖 AI Analysis Results</h2>';
        html+='<p style="font-size:.65rem;color:var(--muted);margin-bottom:8px;">'+drawing.number+' — '+drawing.title+'</p>';
        
        if(data.DRAWING_TYPE||data.drawing_type)html+='<div class="entry-section"><div class="section-label">Drawing Type</div>'+(data.DRAWING_TYPE||data.drawing_type)+'</div>';
        if(data.SCALE||data.scale)html+='<div class="entry-section"><div class="section-label">Scale</div>'+(data.SCALE||data.scale)+'</div>';
        
        const dims=data.DIMENSIONS||data.dimensions;
        if(dims&&Array.isArray(dims)&&dims.length){
            html+='<div class="entry-section"><div class="section-label">📏 Extracted Dimensions ('+dims.length+')</div>';
            dims.forEach(d=>{html+='<div style="padding:2px 0;font-size:.65rem;">📏 '+ (typeof d==='string'?d:(d.label||d))+'</div>';});
            html+='</div>';
        }
        
        const elems=data.STRUCTURAL_ELEMENTS||data.structural_elements;
        if(elems&&Array.isArray(elems)&&elems.length){
            html+='<div class="entry-section"><div class="section-label">🏗️ Structural Elements ('+elems.length+')</div>';
            elems.forEach(e=>{html+='<div style="padding:2px 0;font-size:.65rem;">🏗️ '+ (typeof e==='string'?e:(e.name||e))+'</div>';});
            html+='</div>';
        }
        
        if(data.GRID_LINES||data.grid_lines){
            const grids=data.GRID_LINES||data.grid_lines;
            html+='<div class="entry-section"><div class="section-label">📐 Grid Lines</div>'+ (Array.isArray(grids)?grids.join(', '):grids)+'</div>';
        }
        
        if(data.NOTES||data.notes)html+='<div class="entry-section"><div class="section-label">📝 Notes</div>'+ (Array.isArray(data.NOTES||data.notes)?(data.NOTES||data.notes).join('<br>'):(data.NOTES||data.notes))+'</div>';
        if(data.MATERIALS||data.materials)html+='<div class="entry-section"><div class="section-label">🧱 Materials</div>'+ (Array.isArray(data.MATERIALS||data.materials)?(data.MATERIALS||data.materials).join(', '):(data.MATERIALS||data.materials))+'</div>';
        if(data.REINFORCEMENT||data.reinforcement)html+='<div class="entry-section"><div class="section-label">🔩 Reinforcement</div>'+ (Array.isArray(data.REINFORCEMENT||data.reinforcement)?(data.REINFORCEMENT||data.reinforcement).join('<br>'):(data.REINFORCEMENT||data.reinforcement))+'</div>';
        
        html+='<button class="btn btn-secondary" style="margin-top:10px;width:100%;" onclick="closeModal()">Close</button>';
        
        const mc=document.getElementById('modalContainer');
        mc.innerHTML='<div class="modal-overlay" id="mo" onclick="if(event.target.id==\'mo\')closeModal()"><div class="modal">'+html+'</div></div>';
    }

    function compareDrawingsWithAI(id1,id2){
        if(!hasAI()){toast('Set Gemini API key first');return;}
        const d1=app.drawings.find(d=>d.id===id1);
        const d2=app.drawings.find(d=>d.id===id2);
        if(!d1||!d2||!d1.imageData||!d2.imageData){toast('Both drawings need images');return;}

        const mc=document.getElementById('modalContainer');
        mc.innerHTML='<div class="modal-overlay" id="mo"><div class="modal"><h2>🤖 AI Comparing Drawings...</h2><div class="ai-loading"><div class="spinner"></div><p style="font-size:.7rem;">Finding differences...</p><p style="font-size:.6rem;color:var(--muted);">'+d1.number+' vs '+d2.number+'</p></div></div></div>';

        const prompt=`Compare these two construction drawings and identify ALL differences. Focus on:
1. Dimensional changes (what changed, from what to what)
2. Structural element changes (columns, beams, slabs added/removed/resized)
3. Layout changes (walls moved, openings changed)
4. Annotation/note changes
5. Material specification changes
6. Any new elements added
7. Any elements removed

Return as JSON: {"differences":[{"category":"...","description":"...","severity":"Major/Minor"}]}`;

        const img1=d1.imageData.split(',')[1]||d1.imageData;
        const img2=d2.imageData.split(',')[1]||d2.imageData;

        fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${project.geminiKey}`,{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({contents:[{parts:[{text:prompt},{inlineData:{mimeType:'image/jpeg',data:img1}},{inlineData:{mimeType:'image/jpeg',data:img2}}]}]})
        }).then(r=>r.json()).then(data=>{
            closeModal();
            if(data.error){toast('Error: '+data.error.message);return;}
            const text=data.candidates[0].content.parts[0].text;
            const json=text.match(/\{[\s\S]*\}/);
            if(!json){toast('Parse error');return;}
            const diffs=JSON.parse(json[0]);
            let html='<h2>🤖 Drawing Comparison</h2><p style="font-size:.65rem;color:var(--muted);">'+d1.number+' (Rev '+d1.revision+') vs '+d2.number+' (Rev '+d2.revision+')</p>';
            if(diffs.differences&&diffs.differences.length){
                diffs.differences.forEach(d=>{html+='<div class="entry-section" style="border-left:3px solid '+(d.severity==='Major'?'var(--red)':'var(--yellow)')+';"><div class="section-label">'+(d.severity==='Major'?'🔴':'🟡')+' '+d.category+'</div>'+d.description+'</div>';});
            }
            html+='<button class="btn btn-secondary" style="margin-top:10px;width:100%;" onclick="closeModal()">Close</button>';
            document.getElementById('modalContainer').innerHTML='<div class="modal-overlay" id="mo" onclick="if(event.target.id==\'mo\')closeModal()"><div class="modal">'+html+'</div></div>';
        }).catch(err=>{closeModal();toast('Error: '+err.message);});
    }

    // ============================================
    // DRAWING REGISTER WITH AI
    // ============================================
    function renderDrawings(){
        const c=document.getElementById('drawingEntries');
        const entries=[...app.drawings].sort((a,b)=>a.number.localeCompare(b.number));

    function uploadDrawingForAI(){
        if(!hasAI()){toast('Set Gemini API key in ⚙️ Settings first');return;}
        const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.style.display='none';document.body.appendChild(inp);
        inp.addEventListener('change',async function(){
            const file=inp.files[0];
            if(!file)return;
            const reader=new FileReader();
            reader.onload=async function(e){
                const drawing={id:genId('dw'),number:'UPLOAD-'+Date.now().toString().slice(-6),title:file.name,discipline:'Unknown',revision:'A',dateReceived:today(),timestamp:new Date().toISOString(),imageData:e.target.result,aiAnalysis:null};
                app.drawings.push(drawing);
                saveApp(app);
                refreshAll();
                toast('📐 Uploaded! Analyzing with AI...');
                await analyzeDrawingWithAI(drawing.id);
            };
            reader.readAsDataURL(file);
            document.body.removeChild(inp);
        });
        inp.click();
    }

    function captureDrawing(){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.setAttribute('capture','environment');inp.style.display='none';document.body.appendChild(inp);inp.addEventListener('change',function(){if(inp.files[0]){const reader=new FileReader();reader.onload=function(e){addPending(e.target.result,'image',inp.files[0].name);refreshDrawingPreview();};reader.readAsDataURL(inp.files[0]);}document.body.removeChild(inp);});inp.click();}
    function pickDrawingFile(){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.style.display='none';document.body.appendChild(inp);inp.addEventListener('change',function(){if(inp.files[0]){const reader=new FileReader();reader.onload=function(e){addPending(e.target.result,'image',inp.files[0].name);refreshDrawingPreview();};reader.readAsDataURL(inp.files[0]);}document.body.removeChild(inp);});inp.click();}

    function addPending(dataUrl,type,name){pendingMedia=[{id:genId('med'),type,dataUrl,fileName:name||'photo.jpg',timestamp:new Date().toISOString(),entryId:null}];}
    function commitMedia(entryId){if(!pendingMedia.length)return;pendingMedia.forEach(m=>{m.entryId=entryId;media.push({...m});});saveMedia(media);pendingMedia=[];}

    function startInspection(name,group){
        const items=ALL_CHECKLISTS[group][name];
        let h='<div class="form-group"><label>Checklist</label><input type="text" value="'+name+'" disabled></div><div class="form-group"><label>Location</label><input type="text" id="il" value="'+loc()+'"></div><div class="form-group"><label>Items</label><div style="background:var(--bg);border-radius:5px;padding:4px 6px;border:1px solid var(--border);">';
        items.forEach((item,i)=>{h+='<div style="display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid var(--border);font-size:.65rem;"><input type="checkbox" id="it'+i+'" checked><label for="it'+i+'">'+item+'</label></div>';});
        h+='</div></div><div class="form-group"><label>Notes</label><textarea id="in"></textarea></div>';
        showModal('✅ '+name,h,()=>{
            const checked=items.map((item,i)=>({label:item,passed:document.getElementById('it'+i).checked}));
            app.inspections.push({id:genId('ins'),checklistType:name,location:document.getElementById('il').value,items:checked,result:checked.every(i=>i.passed)?'pass':'fail',notes:document.getElementById('in').value,timestamp:new Date().toISOString()});
            saveApp(app);
        });
    }

    function deleteEntry(type,id){app[type]=app[type].filter(e=>e.id!==id);saveApp(app);refreshAll();}
    function copyReport(){navigator.clipboard.writeText(window._report||'').then(()=>toast('📋 Copied!'));}
    function printReport(){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelector('[data-tab="report"]').classList.add('active');document.getElementById('panel-report').classList.add('active');renderReport();setTimeout(()=>window.print(),400);}
    function backupData(){const backup={project,app,media,date:new Date().toISOString()};const blob=new Blob([JSON.stringify(backup)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='cowlog-backup-'+today()+'.json';a.click();toast('💾 Backup!');}
    function restoreData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.style.display='none';document.body.appendChild(inp);inp.addEventListener('change',function(){const reader=new FileReader();reader.onload=function(e){try{const data=JSON.parse(e.target.result);if(!data.project)return;project=data.project;app=data.app;media=data.media||[];saveProject(project);saveApp(app);saveMedia(media);refreshAll();populateProjectFields();toast('✅ Restored!');}catch(err){}};reader.readAsText(this.files[0]);document.body.removeChild(inp);});inp.click();}

    function init(){
        document.getElementById('currentDate').textContent=new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        populateProjectFields();updateCompactDisplay();
        document.querySelectorAll('.tab').forEach(tab=>{tab.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');document.getElementById('panel-'+tab.dataset.tab).classList.add('active');if(tab.dataset.tab==='report')renderReport();});});
        document.getElementById('fabBtn').addEventListener('click',showFABMenu);
        document.getElementById('diarySearch').addEventListener('input',e=>renderDiary(e.target.value));
        refreshAll();
    }
    document.addEventListener('DOMContentLoaded',init);
    </script>
</body>
</html>
