<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🦺 CoW Log</title>
    <meta name="theme-color" content="#0d1117">
    <link rel="manifest" href="manifest.json">
    <style>
        :root{--bg:#0d1117;--card:#161b22;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#f78166;--green:#3fb950;--red:#f85149;--yellow:#d2991d;--blue:#58a6ff;--purple:#a371f7}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;font-size:15px;line-height:1.5}
        .header{background:var(--card);padding:16px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border)}
        .header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
        .header h1{font-size:1.2rem;color:var(--accent)}
        .header .date{font-size:.8rem;color:var(--muted)}
        .project-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.75rem;color:var(--muted)}
        .project-info .label{font-size:.65rem;text-transform:uppercase;letter-spacing:.5px}
        .project-info input,.project-info select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:.75rem;width:100%;font-family:inherit}
        .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:12px 16px}
        .stat-card{background:var(--card);padding:12px 8px;border-radius:12px;text-align:center;border:1px solid var(--border)}
        .stat-card .count{font-size:1.5rem;font-weight:700}.stat-card .label{font-size:.6rem;color:var(--muted);text-transform:uppercase;margin-top:2px}
        .count.red{color:var(--red)}.count.green{color:var(--green)}.count.blue{color:var(--blue)}.count.yellow{color:var(--yellow)}.count.purple{color:var(--purple)}
        .tabs{display:flex;gap:4px;padding:0 16px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
        .tabs::-webkit-scrollbar{display:none}
        .tab{padding:8px 16px;border-radius:20px;font-size:.75rem;white-space:nowrap;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-weight:500}
        .tab.active{background:var(--accent);border-color:var(--accent);color:#0d1117;font-weight:600}
        .content{padding:0 16px}.panel{display:none}.panel.active{display:block}
        .entry-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border);border-left:4px solid var(--border)}
        .diary-card{border-left-color:var(--blue)}.inspection-card{border-left-color:var(--green)}.ncr-card{border-left-color:var(--red)}.instruction-card{border-left-color:var(--yellow)}
        .entry-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
        .entry-title{font-weight:600;font-size:.9rem}
        .badge{font-size:.65rem;padding:4px 10px;border-radius:12px;font-weight:600;white-space:nowrap}
        .badge-pass{background:rgba(63,185,80,.15);color:var(--green)}.badge-fail{background:rgba(248,81,73,.15);color:var(--red)}
        .badge-open{background:rgba(248,81,73,.15);color:var(--red)}.badge-closed{background:rgba(63,185,80,.15);color:var(--green)}
        .badge-pending{background:rgba(210,153,29,.15);color:var(--yellow)}.badge-info{background:rgba(88,166,255,.15);color:var(--blue)}
        .entry-meta{font-size:.7rem;color:var(--muted);margin-bottom:8px;display:flex;flex-wrap:wrap;gap:12px}
        .entry-desc{font-size:.8rem;line-height:1.6;color:#c9d1d9}
        .entry-section{background:var(--bg);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:.75rem}
        .section-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
        .fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#0d1117;border:none;font-size:1.5rem;cursor:pointer;box-shadow:0 4px 20px rgba(247,129,102,.3);z-index:200;font-weight:700}
        .fab:active{transform:scale(.92)}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;display:flex;align-items:flex-end}
        .modal{background:var(--card);width:100%;border-radius:20px 20px 0 0;padding:20px;max-height:88vh;overflow-y:auto;border:1px solid var(--border);border-bottom:none}
        .modal h2{font-size:1rem;margin-bottom:16px;color:var(--accent)}
        .form-group{margin-bottom:12px}
        .form-group label{display:block;font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
        .modal input,.modal textarea,.modal select{width:100%;padding:12px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.85rem;font-family:inherit}
        .modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--accent)}
        .modal textarea{min-height:90px;resize:vertical}
        .btn-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
        .btn{padding:12px 20px;border-radius:10px;border:none;font-weight:600;font-size:.85rem;cursor:pointer;flex:1;min-width:80px}
        .btn:active{opacity:.8}
        .btn-primary{background:var(--accent);color:#0d1117}.btn-secondary{background:var(--border);color:var(--text)}
        .btn-danger{background:var(--red);color:#fff}.btn-whatsapp{background:#25D366;color:#fff}
        .btn-small{padding:6px 12px;font-size:.7rem;border-radius:6px;flex:0}
        .media-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
        .media-thumb{aspect-ratio:1;background:var(--card);border-radius:8px;border:1px solid var(--border);overflow:hidden;cursor:pointer}
        .media-thumb img,.media-thumb video{width:100%;height:100%;object-fit:cover}
        .media-thumb .placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem}
        .media-preview{display:flex;flex-wrap:wrap;gap:6px}
        .media-preview-item{width:70px;height:70px;border-radius:8px;border:1px solid var(--border);overflow:hidden;position:relative}
        .media-preview-item img{width:100%;height:100%;object-fit:cover}
        .remove-media{position:absolute;top:2px;right:2px;background:var(--red);color:#fff;width:20px;height:20px;border-radius:50%;border:none;font-size:.6rem;cursor:pointer}
        .media-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .media-viewer{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center}
        .media-viewer img,.media-viewer video{max-width:95%;max-height:70vh;border-radius:8px}
        .close-btn{position:absolute;top:20px;right:20px;background:var(--red);color:#fff;width:40px;height:40px;border-radius:50%;border:none;font-size:1.2rem;cursor:pointer;z-index:501}
        .media-info{color:var(--text);font-size:.8rem;margin-top:16px;text-align:center}
        .report-preview{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px;font-family:monospace;font-size:.7rem;line-height:1.8;white-space:pre-wrap;max-height:60vh;overflow-y:auto}
        .search-bar{margin-bottom:12px}
        .search-bar input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.85rem}
        .empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
        .empty-state .icon{font-size:3rem;margin-bottom:12px;opacity:.5}
        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--green);color:#0d1117;padding:10px 24px;border-radius:20px;font-weight:600;font-size:.8rem;z-index:400;animation:toastIn .3s ease}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @media print{body{background:#fff;color:#000}.header,.stats-row,.tabs,.fab,.btn,.search-bar,.modal-overlay,.toast{display:none!important}.panel{display:none!important}#panel-report{display:block!important}.report-preview{background:#fff;border:none;color:#000;max-height:none;overflow:visible}}
        @media(min-width:600px){.content{max-width:600px;margin:0 auto}.stats-row{max-width:600px;margin:0 auto}}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-row"><h1>🦺 CoW Log</h1><span class="date" id="currentDate"></span></div>
        <div class="project-info">
            <div><div class="label">Project</div><input type="text" id="projectName" value="Riverside Apartments"></div>
            <div><div class="label">Contract No</div><input type="text" id="contractNo" value="RAP/CW/2026/001"></div>
            <div><div class="label">Contractor</div><input type="text" id="contractorName" value="BuildRight Construction Ltd"></div>
            <div><div class="label">Report No</div><input type="text" id="reportNo" value="COW-001"></div>
            <div style="grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr;gap:8px">
                <div><div class="label">Weather</div><select id="weatherSelect"><option>☀️ Sunny</option><option>⛅ Partly Cloudy</option><option>☁️ Overcast</option><option>🌧️ Rain</option></select></div>
                <div><div class="label">Temp</div><input type="text" id="temperature" value="26°C"></div>
            </div>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card"><div class="count blue" id="diaryCount">0</div><div class="label">Diary</div></div>
        <div class="stat-card"><div class="count green" id="inspectionCount">0</div><div class="label">Inspections</div></div>
        <div class="stat-card"><div class="count red" id="ncrCount">0</div><div class="label">Open NCRs</div></div>
        <div class="stat-card"><div class="count yellow" id="instructionCount">0</div><div class="label">SI</div></div>
        <div class="stat-card"><div class="count purple" id="photoCount">0</div><div class="label">Media</div></div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="diary">📔 Diary</button>
        <button class="tab" data-tab="inspections">✅ Inspect</button>
        <button class="tab" data-tab="ncr">🚨 NCRs</button>
        <button class="tab" data-tab="instructions">📋 SI</button>
        <button class="tab" data-tab="photos">📸 Media</button>
        <button class="tab" data-tab="report">📄 Report</button>
    </div>

    <div class="content">
        <div class="panel active" id="panel-diary"><div class="search-bar"><input type="text" placeholder="🔍 Search diary..." id="diarySearch"></div><div id="diaryEntries"></div></div>
        <div class="panel" id="panel-inspections"><div id="inspectionEntries"></div></div>
        <div class="panel" id="panel-ncr"><div id="ncrEntries"></div></div>
        <div class="panel" id="panel-instructions"><div id="instructionEntries"></div></div>
        <div class="panel" id="panel-photos"><div id="photoGallery"></div></div>
        <div class="panel" id="panel-report"><div id="reportContent"></div></div>
    </div>

    <button class="fab" id="fabBtn">+</button>
    <div id="modalContainer"></div>
    <div id="toastContainer"></div>
    <div id="mediaViewer"></div>

    <script>
    // ============================================
    // DATA — ALL IN ONE PLACE
    // ============================================
    const MK = 'cowlog_media_v2';
    const AK = 'cowlog_app_v2';
    const SK = 'cowlog_settings';

    function loadMedia() {
        try { const r = localStorage.getItem(MK); return r ? JSON.parse(r) : []; }
        catch(e) { console.error('Media load error:', e); return []; }
    }
    function saveMedia(arr) {
        try {
            if (arr.length > 50) arr = arr.slice(-40);
            localStorage.setItem(MK, JSON.stringify(arr));
            console.log('💾 Media saved:', arr.length, 'items');
            return true;
        } catch(e) {
            console.error('Media save error:', e);
            // Storage full — clear some old items
            if (arr.length > 10) {
                arr = arr.slice(-10);
                localStorage.setItem(MK, JSON.stringify(arr));
            }
            return false;
        }
    }
    function loadApp() {
        try { const r = localStorage.getItem(AK); return r ? JSON.parse(r) : { diary:[], inspections:[], ncrs:[], instructions:[], dailyReports:[] }; }
        catch(e) { return { diary:[], inspections:[], ncrs:[], instructions:[], dailyReports:[] }; }
    }
    function saveApp(d) { localStorage.setItem(AK, JSON.stringify(d)); }
    function loadSettings() {
        try { const r = localStorage.getItem(SK); return r ? JSON.parse(r) : {}; }
        catch(e) { return {}; }
    }
    function saveSettings(s) { localStorage.setItem(SK, JSON.stringify(s)); }

    let media = loadMedia();
    let app = loadApp();
    let settings = loadSettings();
    let pendingMedia = [];
    window._report = '';

    console.log('🚀 CoW Log loaded | Media:', media.length, '| Diary:', app.diary.length);

    function genId(p) { return p+'-'+Date.now()+'-'+Math.random().toString(36).substr(2,5); }
    function fmt(ts) { return new Date(ts).toLocaleString('en-KE',{weekday:'short',year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
    function today() { return new Date().toISOString().split('T')[0]; }
    function toast(msg) { const c=document.getElementById('toastContainer'); c.innerHTML='<div class="toast">'+msg+'</div>'; setTimeout(()=>c.innerHTML='',2000); }

    function updateStats() {
        document.getElementById('diaryCount').textContent = app.diary.length;
        document.getElementById('inspectionCount').textContent = app.inspections.length;
        document.getElementById('ncrCount').textContent = app.ncrs.filter(n=>n.status==='open').length;
        document.getElementById('instructionCount').textContent = app.instructions.length;
        document.getElementById('photoCount').textContent = media.length;
        console.log('📊 Stats updated | Media:', media.length);
    }

    // ============================================
    // MEDIA CAPTURE (FRESH INPUT EVERY TIME)
    // ============================================
    function openCamera() {
        console.log('📷 Opening camera...');
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'image/*,video/*';
        inp.capture = 'environment';
        inp.style.display = 'none';
        document.body.appendChild(inp);
        inp.addEventListener('change', async function() {
            const files = inp.files;
            console.log('📸 Camera returned', files.length, 'files');
            for (let f of files) await readFile(f);
            refreshMediaPreview();
            toast('📸 ' + files.length + ' captured');
            document.body.removeChild(inp);
        });
        inp.click();
    }

    function openGallery() {
        console.log('🖼️ Opening gallery...');
        const inp = document.createElement('input');
        inp.type = 'file';
        inp.accept = 'image/*,video/*';
        inp.multiple = true;
        inp.style.display = 'none';
        document.body.appendChild(inp);
        inp.addEventListener('change', async function() {
            const files = inp.files;
            console.log('🖼️ Gallery returned', files.length, 'files');
            for (let f of files) await readFile(f);
            refreshMediaPreview();
            toast('🖼️ ' + files.length + ' added');
            document.body.removeChild(inp);
        });
        inp.click();
    }

    function readFile(file) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = function(e) {
                let dataUrl = e.target.result;
                const type = file.type.startsWith('video/') ? 'video' : 'image';
                // Compress if image and large
                if (type === 'image' && dataUrl.length > 200000) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        if (w > 800) { h = Math.round(h * (800/w)); w = 800; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        dataUrl = canvas.toDataURL('image/jpeg', 0.5);
                        addPending(dataUrl, type, file.name);
                        resolve();
                    };
                    img.src = dataUrl;
                } else {
                    addPending(dataUrl, type, file.name);
                    resolve();
                }
            };
            reader.readAsDataURL(file);
        });
    }

    function addPending(dataUrl, type, name) {
        pendingMedia.push({
            id: genId('med'),
            type: type,
            dataUrl: dataUrl,
            fileName: name || 'photo.jpg',
            timestamp: new Date().toISOString(),
            label: '',
            entryId: null
        });
        console.log('➕ Pending media:', pendingMedia.length);
    }

    function refreshMediaPreview() {
        const c = document.getElementById('mediaPreviewContainer');
        if (!c) { console.log('⏳ Preview container not ready, retrying...'); setTimeout(refreshMediaPreview, 100); return; }
        if (pendingMedia.length === 0) {
            c.innerHTML = '<p style="font-size:0.7rem;color:var(--muted);text-align:center;padding:12px;">Tap 📷 or 🖼️ above</p>';
            return;
        }
        c.innerHTML = '<div class="media-preview">' + pendingMedia.map((m,i) =>
            '<div class="media-preview-item">' +
                (m.type==='video'?'<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;">🎬</div>':'<img src="'+m.dataUrl+'" style="width:100%;height:100%;object-fit:cover;">') +
                '<button class="remove-media" onclick="removePending('+i+')">✕</button>' +
            '</div>'
        ).join('') + '</div>';
        console.log('🖼️ Preview rendered:', pendingMedia.length, 'items');
    }

    function removePending(i) { pendingMedia.splice(i,1); refreshMediaPreview(); }

    function commitMedia(entryId) {
        if (pendingMedia.length === 0) return;
        console.log('💾 Committing', pendingMedia.length, 'media to entry:', entryId);
        pendingMedia.forEach(m => {
            m.entryId = entryId;
            media.push({...m});
        });
        const ok = saveMedia(media);
        console.log('💾 Save result:', ok, '| Total media:', media.length);
        pendingMedia = [];
        updateStats();
    }

    function viewMedia(mediaId) {
        const item = media.find(m => m.id === mediaId);
        if (!item) return;
        const v = document.getElementById('mediaViewer');
        let content = item.type === 'video'
            ? '<video src="'+item.dataUrl+'" controls style="max-width:95%;max-height:70vh;border-radius:8px;"></video>'
            : '<img src="'+item.dataUrl+'" style="max-width:95%;max-height:70vh;border-radius:8px;">';
        v.innerHTML = '<div class="media-viewer" onclick="closeViewer()"><button class="close-btn">✕</button>'+content+'<div class="media-info"><p>'+(item.label||'Site Photo')+'</p><p style="font-size:0.7rem;color:#888;">'+fmt(item.timestamp)+'</p><div style="margin-top:8px;display:flex;gap:8px;justify-content:center;"><button class="btn btn-small btn-primary" onclick="event.stopPropagation();shareMedia(\''+mediaId+'\')">📤 Share</button><button class="btn btn-small btn-danger" onclick="event.stopPropagation();deleteMediaItem(\''+mediaId+'\')">🗑️</button></div></div></div>';
    }
    function closeViewer() { document.getElementById('mediaViewer').innerHTML = ''; }
    function deleteMediaItem(id) {
        if (!confirm('Delete?')) return;
        media = media.filter(m => m.id !== id);
        saveMedia(media);
        closeViewer();
        refreshAll();
        toast('🗑️ Deleted');
    }
    async function shareMedia(id) {
        const item = media.find(m => m.id === id);
        if (!item) return;
        if (navigator.share) {
            try {
                const res = await fetch(item.dataUrl);
                const blob = await res.blob();
                await navigator.share({ title: 'Site Photo', files: [new File([blob], item.fileName, {type:blob.type})] });
                toast('📤 Shared!');
            } catch(e) { shareWA('📸 Site Photo — '+fmt(item.timestamp)); }
        } else { shareWA('📸 Site Photo — '+fmt(item.timestamp)); }
    }
    function shareWA(text) { window.open('https://wa.me/?text='+encodeURIComponent(text.substring(0,1000)),'_blank'); }

    // ============================================
    // RENDER
    // ============================================
    function renderDiary(filter='') {
        const c = document.getElementById('diaryEntries');
        let entries = app.diary;
        if (filter) { const q = filter.toLowerCase(); entries = entries.filter(e => e.title.toLowerCase().includes(q) || e.description.toLowerCase().includes(q)); }
        entries.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
        if (!entries.length) { c.innerHTML = '<div class="empty-state"><div class="icon">📔</div><p>No diary entries</p></div>'; return; }
        c.innerHTML = entries.map(e => {
            const em = media.filter(m => m.entryId === e.id);
            const colors = {'Work in Progress':'badge-info','Material Delivery':'badge-pending','Inspection':'badge-pass','Meeting':'badge-pending','Delay/Issue':'badge-fail','General':'badge-closed'};
            const ab = e.activityType ? '<span class="badge '+(colors[e.activityType]||'badge-info')+'">'+e.activityType+'</span>' : '';
            return '<div class="entry-card diary-card"><div class="entry-header"><span class="entry-title">📔 '+e.title+'</span>'+ab+'</div><div class="entry-meta"><span>🕐 '+fmt(e.timestamp)+'</span><span>📍 '+e.location+'</span></div><div class="entry-desc">'+e.description.replace(/\n/g,'<br>')+'</div>'+
                (em.length?'<div class="entry-section"><div class="section-label">📸 '+em.length+' Photo(s)</div><div class="media-grid">'+em.map(m=>'<div class="media-thumb" onclick="viewMedia(\''+m.id+'\')">'+(m.type==='video'?'<div class="placeholder">🎬</div>':'<img src="'+m.dataUrl+'" alt="photo">')+'</div>').join('')+'</div></div>':'')+
                (e.labourCount||e.equipmentUsed?'<div class="entry-section"><div class="section-label">Resources</div>'+(e.labourCount?'👷 '+e.labourCount+'<br>':'')+(e.equipmentUsed?'🚜 '+e.equipmentUsed:'')+'</div>':'')+
                (e.materialsDelivered?'<div class="entry-section"><div class="section-label">Materials</div>'+e.materialsDelivered.replace(/\n/g,'<br>')+'</div>':'')+
                (e.issuesIdentified?'<div class="entry-section" style="border-left:3px solid var(--red);"><div class="section-label">⚠️ Issues</div>'+e.issuesIdentified.replace(/\n/g,'<br>')+'</div>':'')+
                '<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;"><button class="btn btn-small btn-secondary" onclick="addMediaToEntry(\''+e.id+'\')">📸 Add Photo</button><button class="btn btn-small btn-primary" onclick="editDiary(\''+e.id+'\')">✏️</button><button class="btn btn-small btn-secondary" onclick="deleteEntry(\'diary\',\''+e.id+'\')">🗑️</button></div></div>';
        }).join('');
    }

    function renderInspections() {
        const c = document.getElementById('inspectionEntries');
        const entries = [...app.inspections].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
        if (!entries.length) { c.innerHTML = '<div class="empty-state"><div class="icon">✅</div><p>No inspections</p></div>'; return; }
        c.innerHTML = entries.map(e => {
            const em = media.filter(m => m.entryId === e.id);
            return '<div class="entry-card inspection-card"><div class="entry-header"><span class="entry-title">✅ '+e.checklistType+'</span><span class="badge '+(e.result==='pass'?'badge-pass':'badge-fail')+'">'+e.result.toUpperCase()+'</span></div><div class="entry-meta"><span>🕐 '+fmt(e.timestamp)+'</span><span>📍 '+e.location+'</span><span>'+e.items.filter(i=>i.passed).length+'/'+e.items.length+' OK</span></div><div class="entry-section"><div class="section-label">Items</div>'+e.items.map(i=>'<div style="padding:2px 0;font-size:0.75rem;">'+(i.passed?'✅':'❌')+' '+i.label+(i.comment?' <span style="color:var(--muted);">— '+i.comment+'</span>':'')+'</div>').join('')+'</div>'+
                (em.length?'<div class="entry-section"><div class="section-label">📸 '+em.length+' Photo(s)</div><div class="media-grid">'+em.map(m=>'<div class="media-thumb" onclick="viewMedia(\''+m.id+'\')">'+(m.type==='video'?'<div class="placeholder">🎬</div>':'<img src="'+m.dataUrl+'" alt="photo">')+'</div>').join('')+'</div></div>':'')+
                (e.notes?'<div class="entry-section"><div class="section-label">Notes</div>'+e.notes+'</div>':'')+
                '<div style="margin-top:8px;"><button class="btn btn-small btn-secondary" onclick="deleteEntry(\'inspections\',\''+e.id+'\')">🗑️</button></div></div>';
        }).join('');
    }

    function renderNCRs() {
        const c = document.getElementById('ncrEntries');
        const entries = [...app.ncrs].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
        if (!entries.length) { c.innerHTML = '<div class="empty-state"><div class="icon">🚨</div><p>No NCRs</p></div>'; return; }
        c.innerHTML = entries.map(e => '<div class="entry-card ncr-card"><div class="entry-header"><span class="entry-title">🚨 NCR-'+e.id.split('-')[1]+': '+e.title+'</span><span class="badge '+(e.status==='open'?'badge-open':'badge-closed')+'">'+e.status.toUpperCase()+'</span></div><div class="entry-meta"><span>🕐 '+fmt(e.timestamp)+'</span><span>📍 '+e.location+'</span><span>⚠️ '+e.severity+'</span></div><div class="entry-section"><div class="section-label">Description</div>'+e.description+'</div><div class="entry-section" style="border-left:3px solid var(--yellow);"><div class="section-label">Action Required</div>'+e.actionRequired+'</div>'+(e.closeoutComment?'<div class="entry-section" style="border-left:3px solid var(--green);"><div class="section-label">Closeout</div>'+e.closeoutComment+'</div>':'')+'<div style="margin-top:8px;display:flex;gap:6px;">'+(e.status!=='closed'?'<button class="btn btn-small btn-primary" onclick="closeNCR(\''+e.id+'\')">✅ Close</button>':'')+'<button class="btn btn-small btn-secondary" onclick="deleteEntry(\'ncrs\',\''+e.id+'\')">🗑️</button></div></div>').join('');
    }

    function renderInstructions() {
        const c = document.getElementById('instructionEntries');
        const entries = [...app.instructions].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
        if (!entries.length) { c.innerHTML = '<div class="empty-state"><div class="icon">📋</div><p>No instructions</p></div>'; return; }
        c.innerHTML = entries.map(e => '<div class="entry-card instruction-card"><div class="entry-header"><span class="entry-title">📋 SI-'+e.id.split('-')[1]+'</span><span class="badge '+(e.status==='acknowledged'?'badge-closed':'badge-open')+'">'+e.status.toUpperCase()+'</span></div><div class="entry-meta"><span>🕐 '+fmt(e.timestamp)+'</span><span>👷 '+e.issuedTo+'</span></div><div class="entry-desc">'+e.description.replace(/\n/g,'<br>')+'</div><div style="margin-top:8px;">'+(e.status!=='acknowledged'?'<button class="btn btn-small btn-primary" onclick="ackSI(\''+e.id+'\')">✍️ Ack</button>':'')+'<button class="btn btn-small btn-secondary" onclick="deleteEntry(\'instructions\',\''+e.id+'\')">🗑️</button></div></div>').join('');
    }

    function renderPhotos() {
        const c = document.getElementById('photoGallery');
        if (!media.length) { c.innerHTML = '<div class="empty-state"><div class="icon">📸</div><p>No media yet</p><p style="font-size:0.75rem;">Photos appear here when added to entries</p></div>'; return; }
        c.innerHTML = '<div style="display:flex;gap:8px;margin-bottom:12px;"><button class="btn btn-small btn-primary" onclick="openCamera()">📷 Camera</button><button class="btn btn-small btn-secondary" onclick="openGallery()">🖼️ Gallery</button></div><div class="media-grid">'+[...media].reverse().map(m=>'<div class="media-thumb" onclick="viewMedia(\''+m.id+'\')">'+(m.type==='video'?'<div class="placeholder">🎬</div>':'<img src="'+m.dataUrl+'" alt="photo" loading="lazy">')+'</div>').join('')+'</div>';
    }

    function renderReport() {
        const td = today();
        const dt = app.diary.filter(e => e.timestamp.startsWith(td));
        const it = app.inspections.filter(e => e.timestamp.startsWith(td));
        const no = app.ncrs.filter(e => e.status === 'open');
        const pn = document.getElementById('projectName').value||'Project';
        const rdate = new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        let r = '═══════════════════════════════════════════════\n  CLERK OF WORKS — DAILY SITE REPORT\n═══════════════════════════════════════════════\n\n';
        r += 'REPORT NO: '+ (document.getElementById('reportNo').value||'COW-001') +'\nDATE: '+rdate+'\nPROJECT: '+pn+'\n\n';
        r += '1. WORK PROGRESS\n───────────────────────────────────────────────\n';
        if(dt.length){dt.forEach((e,i)=>{r+='\n'+(i+1)+'. '+e.title+'\n   Location: '+e.location+'\n   '+e.description.replace(/\n/g,'\n   ')+'\n';if(e.issuesIdentified)r+='   ⚠️ '+e.issuesIdentified+'\n';const em=media.filter(m=>m.entryId===e.id);if(em.length)r+='   📸 '+em.length+' photo(s)\n';});}else{r+='\n   No entries today.\n';}
        r += '\n2. INSPECTIONS\n───────────────────────────────────────────────\n';
        if(it.length){it.forEach(e=>{r+='\n   '+e.checklistType+' — '+e.result.toUpperCase()+'\n';e.items.forEach(i=>{r+='   '+(i.passed?'✅':'❌')+' '+i.label+'\n';});});}else{r+='\n   No inspections today.\n';}
        r += '\n3. OUTSTANDING NCRs\n───────────────────────────────────────────────\n';
        if(no.length){no.forEach(e=>{r+='   • NCR-'+e.id.split('-')[1]+': '+e.title+' ['+e.severity+']\n';});}else{r+='\n   None.\n';}
        r += '\n═══════════════════════════════════════════════\n  REPORT END\n═══════════════════════════════════════════════\n';
        document.getElementById('reportContent').innerHTML = '<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;"><button class="btn btn-small btn-primary" onclick="copyReport()">📋 Copy</button><button class="btn btn-small btn-secondary" onclick="printReport()">🖨️ Print</button><button class="btn btn-small btn-whatsapp" onclick="shareWA(window._report)">📱 WhatsApp</button><button class="btn btn-small btn-secondary" onclick="saveReport()">💾 Save</button></div><div class="report-preview" id="reportText">'+r+'</div>';
        window._report = r;
    }

    function refreshAll() { renderDiary(); renderInspections(); renderNCRs(); renderInstructions(); renderPhotos(); updateStats(); }

    // ============================================
    // MODALS
    // ============================================
    function showModal(title, html, cb) {
        const mc = document.getElementById('modalContainer');
        mc.innerHTML = '<div class="modal-overlay" id="mo"><div class="modal"><h2>'+title+'</h2><div id="mf">'+html+'</div><div class="btn-row"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="ms">Save</button></div></div></div>';
        document.getElementById('ms').addEventListener('click', ()=>{ const r = cb(); if (r !== false) { closeModal(); refreshAll(); toast('✅ Saved!'); } });
        document.getElementById('mo').addEventListener('click', e => { if (e.target.id === 'mo') closeModal(); });
    }
    function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

    function showDiaryForm(editId) {
        const ex = editId ? app.diary.find(e => e.id === editId) : null;
        pendingMedia = [];
        const h = '<div class="form-group"><label>Title *</label><input type="text" id="dt" value="'+(ex?ex.title:'')+'"></div>'+
            '<div class="form-group"><label>Activity</label><select id="da"><option>Work in Progress</option><option>Material Delivery</option><option>Inspection</option><option>Meeting</option><option>Delay/Issue</option><option>General</option></select></div>'+
            '<div class="form-group"><label>Location</label><input type="text" id="dl" value="'+(ex?ex.location:'Block A, Floor 3')+'"></div>'+
            '<div class="form-group"><label>Description *</label><textarea id="dd">'+(ex?ex.description:'')+'</textarea></div>'+
            '<div class="form-group"><label>Labour</label><input type="text" id="dlb" value="'+(ex?ex.labourCount||'':'')+'"></div>'+
            '<div class="form-group"><label>Equipment</label><input type="text" id="deq" value="'+(ex?ex.equipmentUsed||'':'')+'"></div>'+
            '<div class="form-group"><label>Materials</label><textarea id="dmt" style="min-height:50px;">'+(ex?ex.materialsDelivered||'':'')+'</textarea></div>'+
            '<div class="form-group"><label>Issues</label><textarea id="dis" style="min-height:50px;">'+(ex?ex.issuesIdentified||'':'')+'</textarea></div>'+
            '<div class="form-group"><label>📸 Photos</label><div class="media-actions"><button type="button" class="btn btn-primary" onclick="openCamera()">📷 Camera</button><button type="button" class="btn btn-secondary" onclick="openGallery()">🖼️ Gallery</button></div><div id="mediaPreviewContainer" style="margin-top:8px;"></div></div>';
        showModal(ex?'✏️ Edit Diary':'📔 New Diary Entry', h, () => {
            const title = document.getElementById('dt').value.trim();
            const desc = document.getElementById('dd').value.trim();
            if (!title || !desc) { alert('Title and description required'); return false; }
            const entry = { id: ex?ex.id:genId('di'), title, activityType: document.getElementById('da').value, location: document.getElementById('dl').value, description: desc, labourCount: document.getElementById('dlb').value, equipmentUsed: document.getElementById('deq').value, materialsDelivered: document.getElementById('dmt').value, issuesIdentified: document.getElementById('dis').value, weather: document.getElementById('weatherSelect').value, timestamp: ex?ex.timestamp:new Date().toISOString() };
            if (ex) { const i = app.diary.findIndex(e => e.id === editId); if (i>-1) app.diary[i] = entry; }
            else { app.diary.push(entry); }
            commitMedia(entry.id);
            saveApp(app);
        });
        setTimeout(refreshMediaPreview, 200);
    }
    function editDiary(id) { showDiaryForm(id); }

    function showInspectionForm() {
        const lists = {'Concrete Pour':['Formwork checked','Reinforcement correct','Cover blocks placed','Grade confirmed','Slump test done','Vibrators ready','Curing plan ready'],'Steel':['Bar sizes correct','Spacing correct','Laps correct','Chairs placed','Clean & rust-free'],'Blockwork':['Block type correct','Mortar 1:4','Plumb & level','Wall ties','DPC in place','Openings correct'],'Excavation':['Setting out checked','Depth correct','Bottom firm','Safety batter','Dewatering']};
        window._lists = lists;
        pendingMedia = [];
        let h = '<div class="form-group"><label>Type *</label><select id="ct" onchange="window._ul()"><option value="">— Select —</option>';
        Object.keys(lists).forEach(k => h += '<option value="'+k+'">'+k+'</option>');
        h += '</select></div><div class="form-group"><label>Location</label><input type="text" id="il" value="Block A, Floor 3"></div><div class="form-group"><label>Items</label><div id="ci" style="background:var(--bg);border-radius:8px;padding:4px 12px;border:1px solid var(--border);"><p style="color:var(--muted);text-align:center;padding:16px;">Select type</p></div></div><div class="form-group"><label>Notes</label><textarea id="in"></textarea></div><div class="form-group"><label>📸 Photos</label><div class="media-actions"><button type="button" class="btn btn-primary" onclick="openCamera()">📷 Camera</button><button type="button" class="btn btn-secondary" onclick="openGallery()">🖼️ Gallery</button></div><div id="mediaPreviewContainer" style="margin-top:8px;"></div></div>';
        showModal('✅ Inspection', h, () => {
            const type = document.getElementById('ct').value;
            if (!type) { alert('Select type'); return false; }
            const cbs = document.querySelectorAll('#ci input[type=checkbox]');
            const cmts = document.querySelectorAll('#ci .ic');
            const items = Array.from(cbs).map((cb,i) => ({ label: cb.nextElementSibling.textContent.replace(/\s*$/,''), passed: cb.checked, comment: cmts[i]?cmts[i].value:'' }));
            const entry = { id: genId('ins'), checklistType: type, location: document.getElementById('il').value, items, result: items.every(i=>i.passed)?'pass':'fail', notes: document.getElementById('in').value, timestamp: new Date().toISOString() };
            app.inspections.push(entry);
            commitMedia(entry.id);
            saveApp(app);
        });
        window._ul = function() {
            const type = document.getElementById('ct').value;
            const c = document.getElementById('ci');
            if (!type || !window._lists[type]) { c.innerHTML = '<p style="color:var(--muted);text-align:center;padding:16px;">Select type</p>'; return; }
            c.innerHTML = window._lists[type].map((item,i) => '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:0.8rem;"><input type="checkbox" id="it'+i+'" checked><label for="it'+i+'" style="flex:1;">'+item+'</label><input type="text" class="ic" placeholder="Comment" style="width:35%;padding:4px;font-size:0.7rem;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text);"></div>').join('');
        };
        setTimeout(refreshMediaPreview, 200);
    }

    function showNCRForm() {
        pendingMedia = [];
        const h = '<div class="form-group"><label>Title *</label><input type="text" id="nt"></div><div class="form-group"><label>Severity</label><select id="ns"><option>Minor</option><option selected>Major</option><option>Critical</option></select></div><div class="form-group"><label>Location</label><input type="text" id="nl" value="Block A, Floor 3"></div><div class="form-group"><label>Description *</label><textarea id="nd"></textarea></div><div class="form-group"><label>Action Required *</label><textarea id="na"></textarea></div><div class="form-group"><label>📸 Evidence</label><div class="media-actions"><button type="button" class="btn btn-primary" onclick="openCamera()">📷 Camera</button><button type="button" class="btn btn-secondary" onclick="openGallery()">🖼️ Gallery</button></div><div id="mediaPreviewContainer" style="margin-top:8px;"></div></div>';
        showModal('🚨 Raise NCR', h, () => {
            const t = document.getElementById('nt').value.trim();
            const d = document.getElementById('nd').value.trim();
            const a = document.getElementById('na').value.trim();
            if (!t||!d||!a) { alert('All fields required'); return false; }
            const entry = { id: genId('ncr'), title: t, severity: document.getElementById('ns').value, location: document.getElementById('nl').value, description: d, actionRequired: a, status: 'open', timestamp: new Date().toISOString() };
            app.ncrs.push(entry);
            commitMedia(entry.id);
            saveApp(app);
        });
        setTimeout(refreshMediaPreview, 200);
    }

    function showInstructionForm() {
        const h = '<div class="form-group"><label>Issued To *</label><input type="text" id="st"></div><div class="form-group"><label>Location</label><input type="text" id="sl" value="Block A, Floor 3"></div><div class="form-group"><label>Instruction *</label><textarea id="sd"></textarea></div><div class="form-group"><label>Deadline</label><input type="text" id="sdl"></div>';
        showModal('📋 Site Instruction', h, () => {
            const to = document.getElementById('st').value.trim();
            const desc = document.getElementById('sd').value.trim();
            if (!to||!desc) { alert('All fields required'); return false; }
            app.instructions.push({ id: genId('si'), issuedTo: to, location: document.getElementById('sl').value, description: desc, deadline: document.getElementById('sdl').value, status: 'issued', timestamp: new Date().toISOString() });
            saveApp(app);
        });
    }

    function addMediaToEntry(entryId) {
        pendingMedia = [];
        const mc = document.getElementById('modalContainer');
        mc.innerHTML = '<div class="modal-overlay" id="amo"><div class="modal"><h2>📸 Add Photos</h2><div class="media-actions"><button class="btn btn-primary" id="ac">📷 Camera</button><button class="btn btn-secondary" id="ag">🖼️ Gallery</button></div><div id="mediaPreviewContainer" style="margin-top:12px;"></div><div class="btn-row"><button class="btn btn-secondary" id="ax">Cancel</button><button class="btn btn-primary" id="as">💾 Save</button></div></div></div>';
        setTimeout(() => {
            document.getElementById('ac').addEventListener('click', openCamera);
            document.getElementById('ag').addEventListener('click', openGallery);
            document.getElementById('ax').addEventListener('click', closeModal);
            document.getElementById('as').addEventListener('click', () => { commitMedia(entryId); closeModal(); refreshAll(); toast('📸 Photos added!'); });
            document.getElementById('amo').addEventListener('click', e => { if (e.target.id==='amo') closeModal(); });
            refreshMediaPreview();
        }, 100);
    }

    function showFABMenu() {
        const mc = document.getElementById('modalContainer');
        mc.innerHTML = '<div class="modal-overlay" id="fo" style="align-items:flex-end;justify-content:center;"><div class="modal" style="text-align:center;max-width:400px;"><h2>➕ Add New</h2><button class="btn btn-primary" style="margin-bottom:8px;width:100%;" onclick="closeModal();showDiaryForm();">📔 Diary Entry</button><button class="btn btn-primary" style="margin-bottom:8px;width:100%;background:var(--green);" onclick="closeModal();showInspectionForm();">✅ Inspection</button><button class="btn btn-primary" style="margin-bottom:8px;width:100%;background:var(--red);" onclick="closeModal();showNCRForm();">🚨 NCR</button><button class="btn btn-primary" style="margin-bottom:8px;width:100%;background:var(--yellow);color:#0d1117;" onclick="closeModal();showInstructionForm();">📋 SI</button><button class="btn btn-primary" style="margin-bottom:8px;width:100%;background:var(--purple);" onclick="closeModal();openCamera();">📷 Quick Photo</button><button class="btn btn-secondary" style="width:100%;" onclick="closeModal();">Cancel</button></div></div>';
        document.getElementById('fo').addEventListener('click', e => { if (e.target.id==='fo') closeModal(); });
    }

    // ============================================
    // ACTIONS
    // ============================================
    function deleteEntry(type, id) {
        if (!confirm('Delete?')) return;
        app[type] = app[type].filter(e => e.id !== id);
        media = media.filter(m => m.entryId !== id);
        saveApp(app); saveMedia(media);
        refreshAll(); toast('🗑️ Deleted');
    }
    function closeNCR(id) {
        const ncr = app.ncrs.find(n => n.id === id);
        if (!ncr) return;
        const c = prompt('Closeout comment:');
        if (c === null) return;
        ncr.status = 'closed'; ncr.closeoutComment = c; ncr.closedDate = new Date().toISOString();
        saveApp(app); refreshAll(); toast('✅ Closed');
    }
    function ackSI(id) {
        const si = app.instructions.find(s => s.id === id);
        if (!si) return;
        si.status = 'acknowledged'; si.acknowledgedDate = new Date().toISOString();
        saveApp(app); refreshAll(); toast('✍️ Acknowledged');
    }
    function copyReport() { navigator.clipboard.writeText(window._report||'').then(() => toast('📋 Copied!')); }
    function printReport() {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelector('[data-tab="report"]').classList.add('active');
        document.getElementById('panel-report').classList.add('active');
        renderReport();
        setTimeout(() => window.print(), 400);
    }
    function saveReport() {
        app.dailyReports.push({ id: genId('rpt'), content: window._report||'', date: today(), timestamp: new Date().toISOString() });
        saveApp(app); toast('💾 Saved');
    }

    // ============================================
    // INIT
    // ============================================
    function init() {
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-KE',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                const panel = document.getElementById('panel-'+tab.dataset.tab);
                if (panel) panel.classList.add('active');
                if (tab.dataset.tab === 'report') renderReport();
                if (tab.dataset.tab === 'photos') renderPhotos();
            });
        });
        document.getElementById('fabBtn').addEventListener('click', showFABMenu);
        document.getElementById('diarySearch').addEventListener('input', e => renderDiary(e.target.value));
        refreshAll();
        console.log('✅ Init complete | Media:', media.length, '| App entries:', app.diary.length);
    }
    document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
