<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CoW Log Pro</title><meta name="theme-color" content="#000000"><link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root{--bg:#000000;--sheet:#1c1c1e;--sheet2:#2c2c2e;--sep:#38383a;--text:#ffffff;--text2:#8e8e93;--text3:#636366;--accent:#0a84ff;--green:#30d158;--red:#ff453a;--orange:#ff9f0a;--purple:#bf5af2;--radius:14px;--radius-sm:10px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;font-size:17px;line-height:1.4;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
        .navbar{background:rgba(0,0,0,0.85);backdrop-filter:blur(27px);padding:12px 16px;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,0.08)}
        .navbar-content{display:flex;justify-content:space-between;align-items:center}
        .navbar-title{font-size:1.1rem;font-weight:700;letter-spacing:-0.3px}
        .navbar-subtitle{font-size:.68rem;color:var(--accent);font-weight:500}
        .navbar-actions{display:flex;gap:12px}
        .nav-btn{width:32px;height:32px;border-radius:50%;background:var(--sheet2);border:none;color:var(--text);font-size:.9rem;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .nav-btn:active{transform:scale(.9)}
        .project-strip{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;background:var(--bg);border-bottom:1px solid rgba(255,255,255,0.04)}
        .project-strip::-webkit-scrollbar{display:none}
        .chip{background:var(--sheet);padding:6px 12px;border-radius:16px;font-size:.65rem;color:var(--text2);white-space:nowrap;font-weight:500;display:flex;align-items:center;gap:4px}
        .chip-dot{width:6px;height:6px;border-radius:50%}.chip-dot.green{background:var(--green)}.chip-dot.blue{background:var(--accent)}
        .chip-ai{background:linear-gradient(135deg,rgba(191,90,242,.2),rgba(10,132,255,.2));color:#fff;font-weight:600}
        .stats-strip{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
        .stats-strip::-webkit-scrollbar{display:none}
        .stat-pill{background:var(--sheet);padding:10px 14px;border-radius:var(--radius-sm);min-width:80px;text-align:center;border:1px solid rgba(255,255,255,0.06)}
        .stat-pill .val{font-size:1.4rem;font-weight:700;letter-spacing:-0.5px}
        .stat-pill .lbl{font-size:.55rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
        .val.accent{color:var(--accent)}.val.green{color:var(--green)}.val.red{color:var(--red)}.val.orange{color:var(--orange)}.val.purple{color:var(--purple)}
        .segment-wrap{padding:0 16px;margin-bottom:10px}
        .segment{display:flex;background:var(--sheet);border-radius:8px;padding:2px;overflow-x:auto;scrollbar-width:none}
        .segment::-webkit-scrollbar{display:none}
        .seg-btn{padding:7px 14px;border-radius:6px;font-size:.68rem;white-space:nowrap;border:none;background:transparent;color:var(--text2);cursor:pointer;font-weight:500;flex-shrink:0}
        .seg-btn.active{background:var(--sheet2);color:var(--text);font-weight:600}
        .content{padding:0 16px}.panel{display:none;animation:slideUp .25s ease}.panel.active{display:block}
        @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .list-cell{background:var(--sheet);padding:14px 16px;margin-bottom:1px;display:flex;align-items:center;gap:12px}
        .list-cell:first-of-type{border-radius:var(--radius-sm) var(--radius-sm) 0 0}
        .list-cell:last-of-type{border-radius:0 0 var(--radius-sm) var(--radius-sm);margin-bottom:8px}
        .list-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
        .list-icon.blue{background:rgba(10,132,255,.15)}.list-icon.green{background:rgba(48,209,88,.15)}.list-icon.red{background:rgba(255,69,58,.15)}.list-icon.orange{background:rgba(255,159,10,.15)}.list-icon.purple{background:rgba(191,90,242,.15)}
        .list-content{flex:1;min-width:0}.list-title{font-size:.9rem;font-weight:500}.list-sub{font-size:.7rem;color:var(--text3)}
        .list-right{font-size:.75rem;color:var(--text2);text-align:right;flex-shrink:0}
        .badge{font-size:.6rem;padding:3px 8px;border-radius:10px;font-weight:600}
        .badge-success{background:rgba(48,209,88,.15);color:var(--green)}.badge-danger{background:rgba(255,69,58,.15);color:var(--red)}.badge-warning{background:rgba(255,159,10,.15);color:var(--orange)}.badge-info{background:rgba(10,132,255,.15);color:var(--accent)}.badge-ai{background:rgba(191,90,242,.15);color:var(--purple)}
        .card{background:var(--sheet);border-radius:var(--radius);padding:16px;margin-bottom:8px}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.card-title{font-weight:600;font-size:.85rem}
        .card-body{font-size:.75rem;color:var(--text2);line-height:1.5}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:12px 20px;border-radius:10px;border:none;font-weight:600;font-size:.8rem;cursor:pointer;font-family:inherit}
        .btn:active{transform:scale(.95)}.btn-primary{background:var(--accent);color:#fff;width:100%}.btn-secondary{background:var(--sheet2);color:var(--text);width:100%}.btn-ai{background:linear-gradient(135deg,var(--purple),var(--accent));color:#fff;width:100%}.btn-sm{padding:8px 14px;font-size:.68rem;border-radius:8px;width:auto}.btn-xs{padding:5px 10px;font-size:.6rem;border-radius:6px;width:auto}
        .fab{position:fixed;bottom:28px;right:20px;width:50px;height:50px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 20px rgba(10,132,255,.4);z-index:200;display:flex;align-items:center;justify-content:center}
        .fab:active{transform:scale(.88)}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;animation:fadeIn .2s}
        @keyframes fadeIn{from{opacity:0}}
        .modal{background:var(--sheet);width:100%;border-radius:20px 20px 0 0;padding:20px 16px 32px;max-height:82vh;overflow-y:auto}
        .modal-handle{width:36px;height:5px;background:var(--sep);border-radius:3px;margin:0 auto 16px}
        .modal h2{font-size:1rem;font-weight:700;margin-bottom:16px;text-align:center}
        .form-group{margin-bottom:12px}.form-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600;display:block}
        .input,.textarea,.select{width:100%;padding:12px;border-radius:8px;border:1px solid var(--sep);background:var(--sheet2);color:var(--text);font-size:.8rem;font-family:inherit}.input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--accent)}.textarea{min-height:70px;resize:vertical}
        .empty{text-align:center;padding:40px 20px}.empty-icon{font-size:2.5rem;margin-bottom:10px;opacity:.7}.empty h3{font-size:.85rem}.empty p{font-size:.68rem;color:var(--text3)}
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--sheet2);color:var(--text);padding:10px 20px;border-radius:20px;font-weight:600;font-size:.7rem;z-index:400}
        .checkbox-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:.75rem}
        .checkbox-row input[type=checkbox]{width:22px;height:22px;accent-color:var(--accent)}
        .trade-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0}
        .trade-btn{padding:14px 10px;border-radius:var(--radius-sm);background:var(--sheet2);border:none;color:var(--text);font-size:.7rem;text-align:left;cursor:pointer;font-family:inherit;font-weight:500}
        .trade-btn:active{background:var(--accent);color:#fff}
        .section-label{font-size:.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 6px;font-weight:700}
        .report-full{font-family:'SF Mono','Fira Code',monospace;font-size:.62rem;line-height:1.6;white-space:pre-wrap;max-height:55vh;overflow-y:auto;background:var(--sheet);border-radius:var(--radius-sm);padding:16px;color:var(--text2)}
        .drawing-img{width:100%;border-radius:8px;margin:8px 0;border:1px solid var(--sep)}
        @media(min-width:430px){.content{max-width:430px;margin:0 auto}.navbar{padding:12px max(16px,calc((100% - 430px)/2))}.project-strip{padding:8px max(16px,calc((100% - 430px)/2))}.stats-strip{padding:12px max(16px,calc((100% - 430px)/2))}.segment-wrap{padding:0 max(16px,calc((100% - 430px)/2))}}
    </style>
</head>
<body>
    <div class="navbar"><div class="navbar-content"><div><div class="navbar-title">CoW Log Pro</div><div class="navbar-subtitle" id="currentDate"></div></div><div class="navbar-actions"><button class="nav-btn" onclick="backupData()">рџ’ѕ</button><button class="nav-btn" id="settingsToggle">вљ™пёЏ</button></div></div></div>
    <div class="project-strip"><div class="chip"><span class="chip-dot green"></span><span id="displayProject">Project</span></div><div class="chip"><span class="chip-dot blue"></span><span id="displayContractor">Contractor</span></div><div class="chip">рџ“Ќ <span id="displayLocation">Site</span></div><span id="aiStatus"></span></div>
    <div id="settingsPanel" style="display:none;padding:0 16px 12px;"><div class="card"><div class="form-group"><label class="form-label">Project</label><input class="input" type="text" id="projectName"></div><div class="form-group"><label class="form-label">Contract No</label><input class="input" type="text" id="contractNo"></div><div class="form-group"><label class="form-label">Contractor</label><input class="input" type="text" id="contractorName"></div><div class="form-group"><label class="form-label">Location</label><input class="input" type="text" id="defaultLocation"></div><div class="form-group"><label class="form-label">CoW Name</label><input class="input" type="text" id="cowName"></div><div class="form-group"><label class="form-label">рџ¤– Gemini API Key</label><input class="input" type="password" id="geminiKey" placeholder="AIzaSy..."></div><button class="btn btn-primary" onclick="saveProjectSettings()">Save Settings</button><button class="btn btn-secondary" style="margin-top:4px;" onclick="restoreData()">рџ“Ґ Restore Backup</button></div></div>
    <div class="stats-strip"><div class="stat-pill"><div class="val accent" id="diaryCount">0</div><div class="lbl">Diary</div></div><div class="stat-pill"><div class="val green" id="inspectionCount">0</div><div class="lbl">Insp</div></div><div class="stat-pill"><div class="val red" id="ncrCount">0</div><div class="lbl">NCRs</div></div><div class="stat-pill"><div class="val orange" id="matLowCount">0</div><div class="lbl">Stock</div></div><div class="stat-pill"><div class="val purple" id="rfiCount">0</div><div class="lbl">Drawings</div></div></div>
    <div class="segment-wrap"><div class="segment"><button class="seg-btn active" data-tab="diary">рџ“” Diary</button><button class="seg-btn" data-tab="inspections">вњ… Inspect</button><button class="seg-btn" data-tab="ncr">рџљЁ NCR</button><button class="seg-btn" data-tab="instructions">рџ“‹ SI</button><button class="seg-btn" data-tab="rfi">рџ“¤ RFI</button><button class="seg-btn" data-tab="drawings">рџ“ђ DWG</button><button class="seg-btn" data-tab="materials">рџ§± Mat</button><button class="seg-btn" data-tab="concrete">рџ§Є Cube</button><button class="seg-btn" data-tab="report">рџ“„ Report</button></div></div>
    <div class="content">
        <div class="panel active" id="panel-diary"><input class="input" type="text" placeholder="рџ”Ќ Search entries..." id="diarySearch" style="margin-bottom:10px;"><div id="diaryEntries"></div></div>
        <div class="panel" id="panel-inspections"><div id="inspectionEntries"></div></div>
        <div class="panel" id="panel-ncr"><div id="ncrEntries"></div></div>
        <div class="panel" id="panel-instructions"><div id="instructionEntries"></div></div>
        <div class="panel" id="panel-rfi"><div id="rfiEntries"></div></div>
        <div class="panel" id="panel-drawings"><div id="drawingEntries"></div></div>
        <div class="panel" id="panel-materials"><div id="materialEntries"></div></div>
        <div class="panel" id="panel-concrete"><div id="concreteEntries"></div></div>
        <div class="panel" id="panel-report"><div id="reportContent"></div></div>
    </div>
    <button class="fab" id="fabBtn">+</button>
    <div id="modalContainer"></div><div id="toastContainer"></div>

    <script>
    const PK='cowlog_proj_v13',AK='cowlog_app_v15';
    function loadProject(){try{return JSON.parse(localStorage.getItem(PK))||{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'CoW',geminiKey:'',reportCounter:1};}catch(e){return{projectName:'',contractNo:'',contractorName:'',defaultLocation:'',cowName:'CoW',geminiKey:'',reportCounter:1};}}
    function saveProject(p){localStorage.setItem(PK,JSON.stringify(p));}
    let project=loadProject();
    function loadApp(){try{return JSON.parse(localStorage.getItem(AK))||{diary:[],inspections:[],ncrs:[],instructions:[],rfis:[],drawings:[],dimensions:[],structuralElements:[],materials:[],materialLog:[],concrete:[],delays:[],attendance:[],dailyReports:[]};}catch(e){return{diary:[],inspections:[],ncrs:[],instructions:[],rfis:[],drawings:[],dimensions:[],structuralElements:[],materials:[],materialLog:[],concrete:[],delays:[],attendance:[],dailyReports:[]};}}
    function saveApp(d){localStorage.setItem(AK,JSON.stringify(d));}
    let app=loadApp();
    function genId(p){return p+'-'+Date.now()+'-'+Math.random().toString(36).substr(2,5);}
    function fmt(ts){return new Date(ts).toLocaleString('en-KE',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
    function fmtDate(ts){return new Date(ts).toLocaleDateString('en-KE',{month:'short',day:'numeric'});}
    function today(){return new Date().toISOString().split('T')[0];}
    function toast(msg){document.getElementById('toastContainer').innerHTML='<div class="toast">'+msg+'</div>';setTimeout(()=>document.getElementById('toastContainer').innerHTML='',2000);}
    function loc(){return project.defaultLocation||'Site';}
    function hasAI(){return project.geminiKey&&project.geminiKey.length>10;}
    function updateStats(){document.getElementById('diaryCount').textContent=app.diary.length;document.getElementById('inspectionCount').textContent=app.inspections.length;document.getElementById('ncrCount').textContent=app.ncrs.filter(n=>n.status==='open').length;document.getElementById('matLowCount').textContent=app.materials.filter(m=>parseFloat(m.currentStock||0)<=parseFloat(m.minStock||0)).length;document.getElementById('rfiCount').textContent=app.drawings.length;}
    function populateProjectFields(){['projectName','contractNo','contractorName','defaultLocation','cowName','geminiKey'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=project[id]||'';});updateCompactDisplay();}
    function updateCompactDisplay(){document.getElementById('displayProject').textContent=project.projectName||'Project';document.getElementById('displayContractor').textContent=project.contractorName||'Contractor';document.getElementById('displayLocation').textContent=project.defaultLocation||'Site';document.getElementById('aiStatus').innerHTML=hasAI()?'<div class="chip chip-ai">рџ¤– AI Ready</div>':'';}
    function saveProjectSettings(){['projectName','contractNo','contractorName','defaultLocation','cowName','geminiKey'].forEach(id=>{const el=document.getElementById(id);if(el)project[id]=el.value.trim();});saveProject(project);updateCompactDisplay();document.getElementById('settingsPanel').style.display='none';toast('вњ… Saved');}
    function toggleSettings(){const p=document.getElementById('settingsPanel');p.style.display=p.style.display==='none'?'block':'none';if(p.style.display==='block')populateProjectFields();}

    // AI
    async function analyzeDrawingWithAI(id){
        if(!hasAI()){toast('Set API key first');return;}
        const d=app.drawings.find(dw=>dw.id===id);if(!d||!d.imageData)return;
        document.getElementById('modalContainer').innerHTML='<div class="modal-overlay"><div class="modal" style="text-align:center;"><div class="modal-handle"></div><div class="ai-spinner"></div><p style="color:var(--text2);">AI analyzing drawing...</p></div></div>';
        try{
            const img=d.imageData.split(',')[1]||d.imageData;
            const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${project.geminiKey}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:'Analyze this construction drawing. Return JSON: {drawing_type,scale,dimensions:[],structural_elements:[{name,size,type}]}. ONLY JSON.'},{inlineData:{mimeType:'image/jpeg',data:img}}]}]})});
            const j=await r.json();closeModal();
            if(j.error){toast(j.error.message);return;}
            const ex=JSON.parse(j.candidates[0].content.parts[0].text.match(/\{[\s\S]*\}/)[0]);
            if(ex.dimensions)ex.dimensions.forEach(d=>app.dimensions.push({id:genId('dim'),drawingId:id,label:d,value:'',timestamp:new Date().toISOString()}));
            if(ex.structural_elements)ex.structural_elements.forEach(e=>app.structuralElements.push({id:genId('se'),drawingId:id,name:e.name||e,size:e.size||'',type:e.type||'',timestamp:new Date().toISOString()}));
            d.aiAnalysis={extracted:ex,timestamp:new Date().toISOString()};saveApp(app);showAIResults(id,ex);
        }catch(e){closeModal();toast('Error: '+e.message);}
    }
    function showAIResults(id,data){const d=app.drawings.find(dw=>dw.id===id);let h='<div class="modal-handle"></div><h2>рџ¤– AI Results</h2><p style="color:var(--text3);text-align:center;font-size:.7rem;">'+d.number+'</p>';if(data.drawing_type)h+='<div class="card"><div class="card-title">'+data.drawing_type+'</div></div>';if(data.scale)h+='<div class="card"><div class="card-title">Scale: '+data.scale+'</div></div>';if(data.dimensions&&data.dimensions.length)h+='<div class="card"><div class="card-title">рџ“Џ '+data.dimensions.length+' Dimensions</div>'+data.dimensions.map(d=>'<div style="font-size:.68rem;color:var(--text2);padding:3px 0;">вЂў '+(typeof d==='string'?d:d.label||d)+'</div>').join('')+'</div>';if(data.structural_elements&&data.structural_elements.length)h+='<div class="card"><div class="card-title">рџЏ—пёЏ '+data.structural_elements.length+' Elements</div>'+data.structural_elements.map(e=>'<div style="font-size:.68rem;color:var(--text2);padding:3px 0;">вЂў '+(typeof e==='string'?e:e.name)+'</div>').join('')+'</div>';h+='<button class="btn btn-secondary" style="margin-top:8px;" onclick="closeModal()">Close</button>';document.getElementById('modalContainer').innerHTML='<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">'+h+'</div></div>';}

    // RENDERERS
    function renderDiary(filter=''){const c=document.getElementById('diaryEntries');let entries=app.diary;if(filter){const q=filter.toLowerCase();entries=entries.filter(e=>e.title.toLowerCase().includes(q)||e.description.toLowerCase().includes(q));}entries.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));if(!entries.length){c.innerHTML='<div class="empty"><div class="empty-icon">рџ“”</div><h3>No diary entries</h3><p>Tap + to log your first entry</p></div>';return;}c.innerHTML=entries.map(e=>'<div class="list-cell"><div class="list-icon blue">рџ“”</div><div class="list-content"><div class="list-title">'+e.title+'</div><div class="list-sub">'+fmt(e.timestamp)+' В· '+e.location+(e.labourCount?' В· рџ‘·'+e.labourCount:'')+(e.equipmentUsed?' В· рџљњ'+e.equipmentUsed.substring(0,30):'')+'</div></div><div class="list-right"><button class="btn btn-xs btn-secondary" onclick="deleteEntry(\'diary\',\''+e.id+'\')">рџ—‘пёЏ</button></div></div>').join('');}
    function renderInspections(){const c=document.getElementById('inspectionEntries');const entries=[...app.inspections].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));let h='<button class="btn btn-primary btn-sm" style="width:100%;margin-bottom:10px;" onclick="showInspectionMenu()">+ New Inspection</button>';if(!entries.length){h+='<div class="empty"><div class="empty-icon">вњ…</div><h3>No inspections</h3><p>50+ checklists ready</p></div>';}else{h+=entries.map(e=>'<div class="list-cell"><div class="list-icon green">вњ…</div><div class="list-content"><div class="list-title">'+e.checklistType+'</div><div class="list-sub">'+fmt(e.timestamp)+' В· '+e.location+' В· '+e.items.filter(i=>i.passed).length+'/'+e.items.length+' OK</div></div><div class="list-right"><span class="badge '+(e.result==='pass'?'badge-success':'badge-danger')+'">'+e.result.toUpperCase()+'</span></div></div>').join('');}c.innerHTML=h;}
    function renderNCRs(){const c=document.getElementById('ncrEntries');const entries=[...app.ncrs].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));if(!entries.length){c.innerHTML='<div class="empty"><div class="empty-icon">рџљЁ</div><h3>No NCRs</h3></div>';return;}c.innerHTML=entries.map(e=>'<div class="list-cell"><div class="list-icon red">рџљЁ</div><div class="list-content"><div class="list-title">'+e.title+'</div><div class="list-sub">'+fmt(e.timestamp)+' В· '+e.location+' В· '+e.severity+'</div></div><div class="list-right"><span class="badge '+(e.status==='open'?'badge-danger':'badge-success')+'">'+e.status+'</span></div></div>').join('');}
    function renderInstructions(){const c=document.getElementById('instructionEntries');const entries=[...app.instructions].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));if(!entries.length){c.innerHTML='<div class="empty"><div class="empty-icon">рџ“‹</div><h3>No instructions</h3></div>';return;}c.innerHTML=entries.map(e=>'<div class="list-cell"><div class="list-icon orange">рџ“‹</div><div class="list-content"><div class="list-title">SI-'+e.id.split('-')[1]+'</div><div class="list-sub">'+fmt(e.timestamp)+' В· '+e.issuedTo+'</div></div><div class="list-right"><span class="badge '+(e.status==='acknowledged'?'badge-success':'badge-warning')+'">'+e.status+'</span></div></div>').join('');}

        window.open('mailto:?subject='+encodeURIComponent('COW Daily Report вЂ” '+today()+' вЂ” '+(project.projectName||'Project'))+'&body='+encodeURIComponent(window._report||''),'_blank');

    }

    function refreshAll(){renderDiary();renderInspections();renderNCRs();renderInstructions();renderRFIs();renderDrawings();renderMaterials();renderConcrete();updateStats();}

    // MODALS
    function showModal(title,html,cb){document.getElementById('modalContainer').innerHTML='<div class="modal-overlay" id="mo"><div class="modal"><div class="modal-handle"></div><h2>'+title+'</h2>'+html+'<div style="display:flex;gap:8px;margin-top:14px;"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" id="ms">Save</button></div></div></div>';document.getElementById('ms').addEventListener('click',()=>{const r=cb();if(r!==false){closeModal();refreshAll();toast('вњ… Saved');}});document.getElementById('mo').addEventListener('click',e=>{if(e.target.id==='mo')closeModal();});}
    function closeModal(){document.getElementById('modalContainer').innerHTML='';}

    // FULL DIARY FORM вЂ” ALL FIELDS
    function showDiaryForm(){
        const h='<div class="form-group"><label class="form-label">Title *</label><input class="input" type="text" id="dt" placeholder="e.g., Concreting вЂ” 3rd Floor Slab, Grid C-D/2-5"></div>'+
        '<div class="form-group"><label class="form-label">Activity Type</label><select class="select" id="da"><option>Work in Progress</option><option>Material Delivery</option><option>Inspection</option><option>Meeting</option><option>Delay/Issue</option><option>General</option></select></div>'+
        '<div class="form-group"><label class="form-label">Location *</label><input class="input" type="text" id="dl" value="'+loc()+'"></div>'+
        '<div class="form-group"><label class="form-label">Detailed Description *</label><textarea class="textarea" id="dd" placeholder="Describe work observed, methods, quality, progress, instructions given..."></textarea></div>'+
        '<div class="form-group"><label class="form-label">Labour on Site</label><input class="input" type="text" id="dlb" placeholder="e.g., 15 skilled, 25 unskilled, 2 foremen"></div>'+
        '<div class="form-group"><label class="form-label">Equipment on Site</label><input class="input" type="text" id="deq" placeholder="e.g., 1 Tower Crane, 2 Concrete Mixers, 1 Backhoe"></div>'+
        '<div class="form-group"><label class="form-label">Materials Delivered</label><textarea class="textarea" id="dmt" placeholder="e.g., 200 bags cement (Blue Triangle OPC)\n50 tonnes reinforcement steel (Y12, Y16)\n5000 concrete blocks (6-inch solid)" style="min-height:50px;"></textarea></div>'+
        '<div class="form-group"><label class="form-label">Issues / Concerns</label><textarea class="textarea" id="dis" placeholder="e.g., Delay in steel delivery from supplier\nHoneycomb observed on Column C12 вЂ” NCR raised" style="min-height:50px;"></textarea></div>'+
        '<div class="form-group"><label class="form-label">Contractor Personnel on Site</label><input class="input" type="text" id="dcr" placeholder="e.g., Eng. Kamau вЂ” Site Agent, Mr. Otieno вЂ” Foreman"></div>';
        showModal('рџ“” New Diary Entry',h,()=>{
            const t=document.getElementById('dt').value.trim(),d=document.getElementById('dd').value.trim();
            if(!t||!d){toast('Title and description required');return false;}
            app.diary.push({id:genId('di'),title:t,activityType:document.getElementById('da').value,location:document.getElementById('dl').value,description:d,labourCount:document.getElementById('dlb').value,equipmentUsed:document.getElementById('deq').value,materialsDelivered:document.getElementById('dmt').value,issuesIdentified:document.getElementById('dis').value,contractorOnSite:document.getElementById('dcr').value,timestamp:new Date().toISOString()});
            saveApp(app);
        });
    }

    function showNCRForm(){const h='<div class="form-group"><label class="form-label">Title *</label><input class="input" type="text" id="nt" placeholder="e.g., Honeycomb on Column C12"></div><div class="form-group"><label class="form-label">Severity</label><select class="select" id="ns"><option>Minor</option><option selected>Major</option><option>Critical</option></select></div><div class="form-group"><label class="form-label">Location</label><input class="input" type="text" id="nl" value="'+loc()+'"></div><div class="form-group"><label class="form-label">Responsible Party</label><input class="input" type="text" id="nr" value="'+(project.contractorName||'Contractor')+'"></div><div class="form-group"><label class="form-label">Description *</label><textarea class="textarea" id="nd" placeholder="Describe the non-conformance in detail..."></textarea></div><div class="form-group"><label class="form-label">Required Corrective Action *</label><textarea class="textarea" id="na" placeholder="What must be done, by whom, and by when..."></textarea></div>';showModal('рџљЁ Raise NCR',h,()=>{const t=document.getElementById('nt').value.trim(),d=document.getElementById('nd').value.trim(),a=document.getElementById('na').value.trim();if(!t||!d||!a){toast('All fields required');return false;}app.ncrs.push({id:genId('ncr'),title:t,severity:document.getElementById('ns').value,location:document.getElementById('nl').value,responsibleParty:document.getElementById('nr').value,description:d,actionRequired:a,status:'open',timestamp:new Date().toISOString()});saveApp(app);});}
    function showRFIForm(){const h='<div class="form-group"><label class="form-label">Subject *</label><input class="input" type="text" id="rs" placeholder="e.g., Clarification on rebar spacing"></div><div class="form-group"><label class="form-label">Sent To *</label><input class="input" type="text" id="rt" placeholder="e.g., Structural Engineer"></div><div class="form-group"><label class="form-label">Question *</label><textarea class="textarea" id="rq"></textarea></div>';showModal('рџ“¤ New RFI',h,()=>{const s=document.getElementById('rs').value.trim(),q=document.getElementById('rq').value.trim(),t=document.getElementById('rt').value.trim();if(!s||!q||!t){toast('All fields required');return false;}app.rfis.push({id:genId('rfi'),subject:s,sentTo:t,question:q,status:'open',timestamp:new Date().toISOString()});saveApp(app);});}
    function showInstructionForm(){const h='<div class="form-group"><label class="form-label">Issued To *</label><input class="input" type="text" id="st" value="'+(project.contractorName||'Contractor')+'"></div><div class="form-group"><label class="form-label">Location</label><input class="input" type="text" id="sl" value="'+loc()+'"></div><div class="form-group"><label class="form-label">Instruction *</label><textarea class="textarea" id="sd" placeholder="Clearly state the instruction..."></textarea></div><div class="form-group"><label class="form-label">Reference (Drawing/Spec)</label><input class="input" type="text" id="srf" placeholder="e.g., Dwg S-301 Rev B"></div><div class="form-group"><label class="form-label">Deadline</label><input class="input" type="text" id="sdl" placeholder="e.g., 18 June 2026"></div>';showModal('рџ“‹ Site Instruction',h,()=>{const t=document.getElementById('st').value.trim(),d=document.getElementById('sd').value.trim();if(!t||!d)return false;app.instructions.push({id:genId('si'),issuedTo:t,location:document.getElementById('sl').value,description:d,reference:document.getElementById('srf').value,deadline:document.getElementById('sdl').value,status:'issued',timestamp:new Date().toISOString()});saveApp(app);});}
    function showMaterialForm(){const h='<div class="form-group"><label class="form-label">Name *</label><input class="input" type="text" id="mn" placeholder="e.g., Cement, Reinforcement Steel"></div><div class="form-group"><label class="form-label">Unit</label><select class="select" id="mu"><option>Bags (50kg)</option><option>Tonnes</option><option>mВі</option><option>Pieces</option><option>Litres</option><option>mВІ</option></select></div><div class="form-group"><label class="form-label">Initial Stock</label><input class="input" type="number" id="ms" value="0" step="any"></div><div class="form-group"><label class="form-label">Minimum Stock Level</label><input class="input" type="number" id="mmin" value="0" step="any"></div>';showModal('рџ§± Add Material',h,()=>{const n=document.getElementById('mn').value.trim();if(!n)return false;app.materials.push({id:genId('mat'),name:n,unit:document.getElementById('mu').value,initialStock:parseFloat(document.getElementById('ms').value)||0,currentStock:parseFloat(document.getElementById('ms').value)||0,minStock:parseFloat(document.getElementById('mmin').value)||0});saveApp(app);});}
    function showDelayForm(){const h='<div class="form-group"><label class="form-label">Date</label><input class="input" type="date" id="dyDate" value="'+today()+'"></div><div class="form-group"><label class="form-label">Cause *</label><input class="input" type="text" id="dyCause" placeholder="e.g., Late steel delivery"></div><div class="form-group"><label class="form-label">Duration (Days)</label><input class="input" type="number" id="dyDays" value="1"></div><div class="form-group"><label class="form-label">Impact</label><select class="select" id="dyImpact"><option>Minor</option><option>Moderate</option><option selected>Major</option><option>Critical</option></select></div><div class="form-group"><label class="form-label">Location</label><input class="input" type="text" id="dyLoc" value="'+loc()+'"></div><div class="form-group"><label class="form-label">Description</label><textarea class="textarea" id="dyDesc"></textarea></div>';showModal('рџљ§ Log Delay',h,()=>{const c=document.getElementById('dyCause').value.trim();if(!c)return false;app.delays.push({id:genId('dly'),date:document.getElementById('dyDate').value,cause:c,duration:document.getElementById('dyDays').value,impact:document.getElementById('dyImpact').value,location:document.getElementById('dyLoc').value,description:document.getElementById('dyDesc').value,timestamp:new Date().toISOString()});saveApp(app);});}
    function showAttendanceForm(){const h='<div class="form-group"><label class="form-label">Category</label><select class="select" id="attCat"><option>Contractor Staff</option><option>Skilled Labour</option><option>Unskilled Labour</option><option>Subcontractor</option><option>Visitor</option><option>Consultant</option></select></div><div class="form-group"><label class="form-label">Name / Trade</label><input class="input" type="text" id="attName" placeholder="e.g., Eng. Kamau or Masons"></div><div class="form-group"><label class="form-label">Company</label><input class="input" type="text" id="attCompany" value="'+(project.contractorName||'')+'"></div><div class="form-group"><label class="form-label">Count</label><input class="input" type="number" id="attCount" value="1" min="1"></div>';showModal('рџ‘· Add Personnel',h,()=>{app.attendance.push({id:genId('att'),date:today(),category:document.getElementById('attCat').value,name:document.getElementById('attName').value,company:document.getElementById('attCompany').value,count:document.getElementById('attCount').value,timestamp:new Date().toISOString()});saveApp(app);});}
    function showDrawingForm(){window._dwImg=null;const h='<div class="form-group"><label class="form-label">Number *</label><input class="input" type="text" id="dwNo"></div><div class="form-group"><label class="form-label">Title *</label><input class="input" type="text" id="dwTitle"></div><div class="form-group"><label class="form-label">Discipline</label><select class="select" id="dwDisc"><option>Structural</option><option>Architectural</option><option>Plumbing</option><option>Electrical</option></select></div><div class="form-group"><label class="form-label">Revision</label><input class="input" type="text" id="dwRev" value="A"></div><div class="form-group"><label class="form-label">Date</label><input class="input" type="date" id="dwDate" value="'+today()+'"></div><div class="form-group"><label class="form-label">Photo</label><div style="display:flex;gap:6px;"><button type="button" class="btn btn-secondary btn-sm" onclick="captureDw()">рџ“·</button><button type="button" class="btn btn-secondary btn-sm" onclick="pickDw()">рџ–јпёЏ</button></div><div id="dwPrev" style="margin-top:6px;"></div></div>';showModal('рџ“ђ Add Drawing',h,()=>{const n=document.getElementById('dwNo').value.trim(),t=document.getElementById('dwTitle').value.trim();if(!n||!t)return false;const dw={id:genId('dw'),number:n,title:t,discipline:document.getElementById('dwDisc').value,revision:document.getElementById('dwRev').value,dateReceived:document.getElementById('dwDate').value,imageData:window._dwImg||null,aiAnalysis:null,timestamp:new Date().toISOString()};app.drawings.push(dw);saveApp(app);if(dw.imageData&&hasAI())setTimeout(()=>analyzeDrawingWithAI(dw.id),600);});}
    function captureDw(){const i=document.createElement('input');i.type='file';i.accept='image/*';i.setAttribute('capture','environment');i.onchange=function(){if(this.files[0]){const r=new FileReader();r.onload=function(e){window._dwImg=e.target.result;document.getElementById('dwPrev').innerHTML='<img src="'+e.target.result+'" style="width:100%;max-height:100px;object-fit:contain;border-radius:6px;">';};r.readAsDataURL(this.files[0]);}};i.click();}
    function pickDw(){const i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=function(){if(this.files[0]){const r=new FileReader();r.onload=function(e){window._dwImg=e.target.result;document.getElementById('dwPrev').innerHTML='<img src="'+e.target.result+'" style="width:100%;max-height:100px;object-fit:contain;border-radius:6px;">';};r.readAsDataURL(this.files[0]);}};i.click();}
    function uploadDrawingForAI(){if(!hasAI()){toast('Set API key first');return;}const i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=function(){if(this.files[0]){const r=new FileReader();r.onload=async function(e){const dw={id:genId('dw'),number:'AI-'+Date.now().toString(36),title:this.files[0].name,discipline:'Unknown',revision:'A',dateReceived:today(),imageData:e.target.result,aiAnalysis:null,timestamp:new Date().toISOString()};app.drawings.push(dw);saveApp(app);refreshAll();toast('Analyzing...');await analyzeDrawingWithAI(dw.id);};r.readAsDataURL(this.files[0]);}};i.click();}
    function viewDrawing(id){const d=app.drawings.find(dw=>dw.id===id);if(!d||!d.imageData)return;document.getElementById('modalContainer').innerHTML='<div class="modal-overlay" style="align-items:center;" onclick="closeModal()"><img src="'+d.imageData+'" style="max-width:95%;max-height:80vh;border-radius:12px;"></div>';}

    // INSPECTIONS
    const ALL_CHECKLISTS={'рџЏ—пёЏ Earthworks':{'Excavation':['Setting out checked','Depth correct','Bottom firm','Safety batter','Dewatering'],'Trench':['Line & level','Width correct','Depth to invert','Bedding','Shoring'],'Backfill':['Material approved','Compaction>95%','Layers<150mm','No debris']},'рџ§± Concrete':{'Pre-Pour':['Formwork','Reinf correct','Cover blocks','Grade','Slump','Vibrators'],'Post-Pour':['Curing','Formwork time','No cracks','Cubes to lab']},'рџ”© Steel':{'Reinforcement':['Bar sizes','Spacing','Laps','Chairs','Clean']},'рџ§± Masonry':{'Blockwork':['Block type','Mortar 1:4','Plumb','Wall ties','DPC','Openings']},'рџ’§ Waterproofing':{'Membrane':['Surface prep','Primer','Membrane','Laps','Detailing','Ponding test']},'рџљї Plumbing':{'Pressure Test':['System filled','1.5x pressure','1 hour','No leaks','Certificate'],'Drainage':['Gradient','Joints','Traps','Vents','Water test']},'вљЎ Electrical':{'Containment':['Conduit type','Route','Supports','Bends'],'Cabling':['Type','No damage','Labels','IR test']},'рџЋЁ Finishes':{'Plastering':['Background','Mesh','Mix','Thickness','Curing'],'Tiling':['Type','Adhesive','Grout','Level','Falls'],'Painting':['Surface','Primer','Undercoat','Finish','No runs']},'рџљЄ Joinery':{'Doors':['Size','Plumb','Anchors','Ironmongery','Operation','Sealant']},'вњ“ Final':{'Snagging':['All rooms','Walls','Ceilings','Floors','Doors','Plumbing','Electrical','Cleaning']}};
    function showInspectionMenu(){let html='';Object.keys(ALL_CHECKLISTS).forEach(g=>{html+='<div class="section-label">'+g+'</div><div class="trade-grid">';Object.keys(ALL_CHECKLISTS[g]).forEach(n=>{html+='<button class="trade-btn" onclick="closeModal();startInsp(\''+n+'\',\''+g+'\')">'+n+'</button>';});html+='</div>';});document.getElementById('modalContainer').innerHTML='<div class="modal-overlay" id="mo" onclick="if(event.target.id==\'mo\')closeModal()"><div class="modal"><div class="modal-handle"></div><h2>Select Inspection</h2>'+html+'</div></div>';}
    function startInsp(name,group){const items=ALL_CHECKLISTS[group][name];let h='<div class="form-group"><label class="form-label">Type</label><input class="input" value="'+name+'" disabled></div><div class="form-group"><label class="form-label">Location</label><input class="input" type="text" id="il" value="'+loc()+'"></div>';items.forEach((item,i)=>{h+='<div class="checkbox-row"><input type="checkbox" id="it'+i+'" checked><label for="it'+i+'">'+item+'</label></div>';});h+='<div class="form-group"><label class="form-label">Notes</label><textarea class="textarea" id="in" placeholder="Additional observations..."></textarea></div>';showModal('вњ… '+name,h,()=>{const checked=items.map((item,i)=>({label:item,passed:document.getElementById('it'+i).checked}));app.inspections.push({id:genId('ins'),checklistType:name,location:document.getElementById('il').value,items:checked,result:checked.every(i=>i.passed)?'pass':'fail',notes:document.getElementById('in').value,timestamp:new Date().toISOString()});saveApp(app);});}

    function showFABMenu(){document.getElementById('modalContainer').innerHTML='<div class="modal-overlay" id="fo" style="align-items:flex-end;justify-content:center;"><div class="modal" style="max-width:360px;text-align:center;"><div class="modal-handle"></div><h2>New Entry</h2><button class="btn btn-primary" style="margin:3px 0;" onclick="closeModal();showDiaryForm();">рџ“” Diary Entry</button><button class="btn btn-primary" style="margin:3px 0;background:var(--green);" onclick="closeModal();showInspectionMenu();">вњ… Inspection</button><button class="btn btn-primary" style="margin:3px 0;background:var(--red);" onclick="closeModal();showNCRForm();">рџљЁ NCR</button><button class="btn btn-primary" style="margin:3px 0;background:var(--orange);color:#000;" onclick="closeModal();showInstructionForm();">рџ“‹ Site Instruction</button><button class="btn btn-primary" style="margin:3px 0;background:var(--accent);" onclick="closeModal();showRFIForm();">рџ“¤ RFI</button><button class="btn btn-primary" style="margin:3px 0;background:var(--purple);" onclick="closeModal();showDelayForm();">рџљ§ Log Delay</button><button class="btn btn-primary" style="margin:3px 0;background:var(--purple);" onclick="closeModal();showAttendanceForm();">рџ‘· Attendance</button><button class="btn btn-ai" style="margin:3px 0;" onclick="closeModal();uploadDrawingForAI();">рџ¤– AI Scan Drawing</button><button class="btn btn-secondary" style="margin-top:6px;" onclick="closeModal();">Cancel</button></div></div>';document.getElementById('fo').addEventListener('click',e=>{if(e.target.id==='fo')closeModal();});}

    function deleteEntry(type,id){app[type]=app[type].filter(e=>e.id!==id);saveApp(app);refreshAll();toast('Deleted');}
    function copyReport(){navigator.clipboard.writeText(window._report||'').then(()=>toast('рџ“‹ Copied'));}
    function printReport(){document.querySelectorAll('.seg-btn').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.querySelector('[data-tab="report"]').classList.add('active');document.getElementById('panel-report').classList.add('active');renderReport();setTimeout(()=>window.print(),400);}
    function shareWA(text){window.open('https://wa.me/?text='+encodeURIComponent(text.substring(0,1500)),'_blank');}
    function saveReport(){project.reportCounter=(project.reportCounter||1)+1;saveProject(project);app.dailyReports.push({id:genId('rpt'),content:window._report||'',date:today(),timestamp:new Date().toISOString()});saveApp(app);toast('рџ’ѕ Saved');}
    function backupData(){const backup={project,app,date:new Date().toISOString()};const blob=new Blob([JSON.stringify(backup)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cowlog-'+today()+'.json';a.click();toast('рџ’ѕ Backup saved');}
    function restoreData(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=function(){const r=new FileReader();r.onload=function(e){try{const d=JSON.parse(e.target.result);if(!d.project)return;project=d.project;app=d.app;saveProject(project);saveApp(app);refreshAll();populateProjectFields();updateCompactDisplay();toast('вњ… Restored');}catch(err){}};r.readAsText(this.files[0]);};i.click();}

    function init(){
        document.getElementById('currentDate').textContent=new Date().toLocaleDateString('en-KE',{weekday:'long',month:'long',day:'numeric'});
        populateProjectFields();updateCompactDisplay();
        document.getElementById('settingsToggle').addEventListener('click',toggleSettings);
        document.querySelectorAll('.seg-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById('panel-'+btn.dataset.tab).classList.add('active');if(btn.dataset.tab==='report')renderReport();});});
        document.getElementById('fabBtn').addEventListener('click',showFABMenu);
        document.getElementById('diarySearch').addEventListener('input',e=>renderDiary(e.target.value));
        refreshAll();
    }
    document.addEventListener('DOMContentLoaded',init);
    if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
    </script>
